    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #080A0F;
      color: #E5E7EB;
      font-family: Inter, system-ui, sans-serif;
      min-height: 100vh;
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); border-radius: 999px; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .4; }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,.12);
      border-top-color: #00E5FF;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: inline-block;
    }

    .container {
      width: 100%;
      max-width: 1480px;
      margin: 0 auto;
    }

    .section {
      padding: 14px 20px;
    }

    .card {
      background: rgba(255,255,255,.02);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 16px;
      transition: .2s ease;
      animation: fadeIn .25s ease both;
    }

    .card:hover {
      border-color: rgba(255,255,255,.12);
      transform: translateY(-1px);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      border: 1px solid rgba(255,255,255,.06);
      background: rgba(255,255,255,.03);
      color: #9CA3AF;
      cursor: pointer;
      outline: none;
    }

    .muted { color: #9CA3AF; }
    .subtle { color: #6B7280; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }

    @media (max-width: 900px) {
      .section { padding: 12px 14px; }
    }
  </style>

    async function fhQuote(sym, key) {
      try {
        const r = await fetch(`https://finnhub.io/api/v1/quote?symbol=${sym}&token=${key}`);
        if (!r.ok) return null;
        const d = await r.json();
        if (!d || !d.c) return null;
        return { price:d.c, change:d.d || 0, changePct:d.dp || 0 };
      } catch {
        return null;
      }
    }

    async function fhNews(sym, key) {
      try {
        const to = new Date().toISOString().slice(0,10);
        const from = new Date(Date.now() - 7*86400000).toISOString().slice(0,10);
        const r = await fetch(`https://finnhub.io/api/v1/company-news?symbol=${sym}&from=${from}&to=${to}&token=${key}`);
        if (!r.ok) return [];
        const d = await r.json();
        return Array.isArray(d) ? d.slice(0,8) : [];
      } catch {
        return [];
      }
    }

    function delay(ms) {
      return new Promise(r => setTimeout(r, ms));
    }

    function Badge({ children, color, bg }) {
      return (
        <span style={{
          padding:'4px 8px',
          borderRadius:'999px',
          fontSize:'11px',
          fontWeight:700,
          color: color || '#C7D2FE',
          background: bg || 'rgba(255,255,255,.05)',
          border:'1px solid rgba(255,255,255,.05)'
        }}>
          {children}
        </span>
      );
    }

    function RsiBadge({ rsi }) {
      if (rsi == null) return null;
      let color = '#6B7280', bg = 'rgba(107,114,128,.12)', label = 'Neutral';
      if (rsi >= 70) { color = '#FF6B6B'; bg = 'rgba(255,107,107,.12)'; label = 'Hot'; }
      else if (rsi >= 60) { color = '#FFD93D'; bg = 'rgba(255,217,61,.12)'; label = 'Warm'; }
      else if (rsi <= 35) { color = '#00E5A0'; bg = 'rgba(0,229,160,.12)'; label = 'Cold'; }
      return <Badge color={color} bg={bg}>RSI {rsi} · {label}</Badge>;
    }

    function StatBar({ label, value, max = 100, color = '#00E5FF' }) {
      const width = Math.min(Math.abs(value) / max * 100, 100);
      const isNeg = value < 0;
      return (
        <div style={{ marginBottom:'8px' }}>
          <div style={{ display:'flex', justifyContent:'space-between', fontSize:'11px', marginBottom:'4px' }}>
            <span className="subtle">{label}</span>
            <span className="mono" style={{ color: isNeg ? '#FF6B6B' : color, fontWeight:700 }}>
              {value > 0 ? '+' : ''}{value}
            </span>
          </div>
          <div style={{ height:'6px', borderRadius:'999px', background:'rgba(255,255,255,.05)', overflow:'hidden' }}>
            <div style={{
              width:`${width}%`,
              height:'100%',
              background:isNeg ? 'linear-gradient(90deg,#FF6B6B,#FF9D9D)' : `linear-gradient(90deg,${color}66,${color})`,
              borderRadius:'999px'
            }} />
          </div>
        </div>
      );
    }

    function MiniRangeChart({ stock, color }) {
      if (!stock.hi || !stock.lo || !stock.p) return null;
      const min = stock.lo * 0.9;
      const max = stock.hi * 1.1;
      const pos = ((stock.p - min) / (max - min)) * 180 + 20;
      const y = (v) => 90 - ((v - min) / (max - min)) * 60;

      return (
        <svg viewBox="0 0 220 110" style={{ width:'100%', maxWidth:'240px' }}>
          <line x1="20" y1={y(stock.hi)} x2="200" y2={y(stock.hi)} stroke="#00E5A0" strokeDasharray="3,3" strokeWidth="1" />
          <line x1="20" y1={y(stock.avg)} x2="200" y2={y(stock.avg)} stroke="#FFD93D" strokeDasharray="3,3" strokeWidth="1" />
          <line x1="20" y1={y(stock.lo)} x2="200" y2={y(stock.lo)} stroke="#FF6B6B" strokeDasharray="3,3" strokeWidth="1" />
          <circle cx={pos} cy={y(stock.p)} r="4" fill={color} />
          <text x="202" y={y(stock.hi)+3} fill="#00E5A0" fontSize="9" textAnchor="end">High {stock.hi}</text>
          <text x="202" y={y(stock.avg)+3} fill="#FFD93D" fontSize="9" textAnchor="end">Avg {stock.avg}</text>
          <text x="202" y={y(stock.lo)+3} fill="#FF6B6B" fontSize="9" textAnchor="end">Low {stock.lo}</text>
          <text x={Math.min(Math.max(pos, 34), 180)} y={y(stock.p)-8} fill="#FFF" fontSize="10" textAnchor="middle">{stock.p}</text>
        </svg>
      );
    }

    function Radar({ values = [], color = '#00E5FF' }) {
      const labels = ['Fwd','Val','Str','Mom','Beta','Ups'];
      const cx = 90, cy = 90, r = 62;
      const angles = labels.map((_, i) => (Math.PI * 2 * i / labels.length) - Math.PI/2);
      const pts = labels.map((_, i) => {
        const val = values[i] || 0;
        const rr = (val / 10) * r;
        return [cx + Math.cos(angles[i]) * rr, cy + Math.sin(angles[i]) * rr];
      });

      return (
        <svg viewBox="0 0 180 180" style={{ width:'100%', maxWidth:'200px' }}>
          {[.25,.5,.75,1].map((lv, idx) => (
            <polygon
              key={idx}
              points={angles.map(a => `${cx + Math.cos(a)*r*lv},${cy + Math.sin(a)*r*lv}`).join(' ')}
              fill="none"
              stroke="rgba(255,255,255,.08)"
              strokeWidth=".8"
            />
          ))}
          {angles.map((a, i) => (
            <g key={i}>
              <line x1={cx} y1={cy} x2={cx + Math.cos(a)*r} y2={cy + Math.sin(a)*r} stroke="rgba(255,255,255,.06)" />
              <text x={cx + Math.cos(a)*(r+15)} y={cy + Math.sin(a)*(r+15)} fill="#8A8F98" fontSize="8" textAnchor="middle" dominantBaseline="middle">{labels[i]}</text>
            </g>
          ))}
          <polygon points={pts.map(p => p.join(',')).join(' ')} fill={`${color}33`} stroke={color} strokeWidth="1.5" />
        </svg>
      );
    }

    function Summary({ stocks, color }) {
      const nonEtf = stocks.filter(x => x.r !== 'ETF');
      const priced = stocks.filter(x => x.p > 0);
      const avgUpside = nonEtf.length ? Math.round(nonEtf.reduce((a,x)=>a+(x.tu||0),0)/nonEtf.length) : 0;
      const avgMove = priced.length ? (priced.reduce((a,x)=>a+(x.ch||0),0)/priced.length).toFixed(2) : '0.00';
      const leader = [...nonEtf].sort((a,b)=>(b.ytd||0)-(a.ytd||0))[0];

      const items = [
        { label:'Names', value:stocks.length },
        { label:'Avg Upside', value:`${avgUpside}%` },
        { label:'Avg Day', value:`${avgMove}%` },
        { label:'Leader', value: leader ? leader.t : '—' }
      ];

      return (
        <div style={{
          display:'grid',
          gridTemplateColumns:'repeat(auto-fit,minmax(120px,1fr))',
          gap:'1px',
          background:'rgba(255,255,255,.04)',
          borderRadius:'12px',
          overflow:'hidden',
          marginBottom:'16px'

          {items.map((m, i) => (
            <div key={i} style={{ background:'#0B0E13', padding:'14px 10px', textAlign:'center' }}>
              <div style={{ fontSize:'10px', color:'#6B7280', marginBottom:'6px', textTransform:'uppercase' }}>{m.label}</div>
              <div className="mono" style={{ fontSize:'18px', fontWeight:800, color }}>{m.value}</div>
            </div>
          ))}
        </div>
      );
    }

    function App() {
      const [tab, setTab] = useState('nuclear');
      const [sort, setSort] = useState('default');
      const [q, setQ] = useState('');
      const [quick, setQuick] = useState('all');
      const [apiKey, setApiKey] = useState(localStorage.getItem('fhkey') || '');
      const [showSettings, setShowSettings] = useState(false);
      const [keyInput, setKeyInput] = useState(localStorage.getItem('fhkey') || '');
      const [stocks, setStocks] = useState(initStocks);
      const [fetching, setFetching] = useState(false);
      const [lastUpdate, setLastUpdate] = useState(null);
      const timerRef = useRef(null);

      const sec = SM[tab];
      const isSpecial = ['heatmap', 'matrix', 'perf', 'corr', 'news'].includes(tab);
      const ss = stocks.filter(s => s.sec === tab);

      const sortOptions = [
        { k:'default', l:'Default' },
        { k:'change', l:'Day Move' },
        { k:'ytd', l:'YTD' },
        { k:'targetUpside', l:'Upside' },
        { k:'rsi', l:'RSI' }
      ];

      const fetchAll = useCallback(async () => {
        if (!apiKey) return;
        setFetching(true);

        const updated = [...stocks];
        for (let i = 0; i < updated.length; i++) {
          const s = updated[i];
          if (s.r === 'ETF' || !/^[A-Z]{1,5}$/.test(s.t)) continue;
          const quote = await fhQuote(s.t, apiKey);
          if (quote && quote.price > 0) {
            updated[i] = { ...s, p: quote.price, ch: quote.changePct };
          }
          if (i % 25 === 24) await delay(1100);
        }

        setStocks(updated);
        setLastUpdate(new Date().toLocaleTimeString('en-US'));
        setFetching(false);
      }, [apiKey, stocks]);

      useEffect(() => {
        if (!apiKey) return;
        fetchAll();
        timerRef.current = setInterval(fetchAll, 5 * 60 * 1000);
        return () => timerRef.current && clearInterval(timerRef.current);
      }, [apiKey]);

      const saveKey = () => {
        localStorage.setItem('fhkey', keyInput);
        setApiKey(keyInput);
        setShowSettings(false);
      };

      const fs = useMemo(() => {
        let st = [...ss];

        if (q) {
          const ql = q.toLowerCase();
          st = st.filter(x =>
            x.t.toLowerCase().includes(ql) ||
            x.n.toLowerCase().includes(ql) ||
            (x.sub || '').toLowerCase().includes(ql)
          );
        }

        if (quick === 'strong-buy') st = st.filter(x => (x.r || '').includes('Strong'));
        if (quick === 'buy-upside') st = st.filter(x => (x.r || '').includes('Buy') && (x.tu || 0) >= 20);
        if (quick === 'new') st = st.filter(x => x.nw);
        if (quick === 'oversold') st = st.filter(x => (x.rsi || 0) <= 40);
        if (quick === 'hot') st = st.filter(x => (x.rsi || 0) >= 70);
        if (quick === 'no-etf') st = st.filter(x => x.r !== 'ETF');

        if (sort === 'change') st.sort((a,b) => b.ch - a.ch);
        else if (sort === 'ytd') st.sort((a,b) => b.ytd - a.ytd);
        else if (sort === 'targetUpside') st.sort((a,b) => b.tu - a.tu);
        else if (sort === 'rsi') st.sort((a,b) => b.rsi - a.rsi);

        return st;
      }, [tab, sort, q, stocks, quick]);

      return (
        <div style={{ minHeight:'100vh', background:'#080A0F', color:'#E5E7EB' }}>
          <div className="container">
            <div style={{
              padding:'20px 20px 14px',
              borderBottom:'1px solid rgba(255,255,255,.05)',
              display:'flex',
              justifyContent:'space-between',
              alignItems:'flex-start',
              gap:'16px',
              flexWrap:'wrap'
            }}>
              <div style={{ maxWidth:'780px' }}>
                <div style={{ display:'flex', alignItems:'center', gap:'8px', marginBottom:'6px', flexWrap:'wrap' }}>
                  <div style={{
                    width:'8px',
                    height:'8px',
                    borderRadius:'50%',
                    background:sec.color,
                    animation:'pulse 2s infinite',
                    boxShadow:`0 0 10px ${sec.color}66`
                  }} />
                  <span style={{
                    fontSize:'11px',
                    color:'#6B7280',
                    textTransform:'uppercase',
                    letterSpacing:'1.5px',
                    fontWeight:700
                  }}>
                    AI Equity Dashboard
                  </span>
                  {fetching && <span className="spinner" />}
                  {lastUpdate && (
                    <span style={{ fontSize:'11px', color:'#667085' }}>
                      Updated {lastUpdate}
                    </span>
                  )}
                </div>

                <h1 style={{
                  fontSize:'28px',
                  fontWeight:800,
                  margin:'0 0 8px',
                  color:'#F5F7FA',
                  lineHeight:1.12
                }}>
                  AI Supply Chain Tracker
                </h1>

                <p style={{
                  fontSize:'13px',
                  color:'#98A2B3',
                  lineHeight:1.65,
                  maxWidth:'740px'
                }}>
                  Track AI-linked equities across nuclear, power, photonics, infrastructure, and materials.
                  Use sector tabs for idea discovery and advanced views for relative strength, valuation framing, and theme behavior.
                </p>
              </div>

              <div style={{ display:'flex', gap:'8px', alignItems:'center', flexWrap:'wrap' }}>
                {apiKey && (
                  <button
                    onClick={fetchAll}
                    disabled={fetching}
                    className="pill"
                    style={{
                      border:'1px solid rgba(0,229,255,0.22)',
                      background:'rgba(0,229,255,0.08)',
                      color:'#00E5FF'
                    }}
                  >
                    {fetching ? 'Refreshing...' : 'Refresh Live'}
                  </button>
                )}
                <button
                  onClick={() => setShowSettings(!showSettings)}
                  className="pill"
                >
                  API Settings
                </button>
              </div>
            </div>

            {showSettings && (
              <div style={{
                padding:'12px 20px',
                background:'rgba(0,229,255,0.04)',
                borderBottom:'1px solid rgba(0,229,255,0.1)'
              }}>
                <div style={{ display:'flex', gap:'8px', alignItems:'center', flexWrap:'wrap' }}>
                  <span style={{ fontSize:'12px', color:'#00E5FF', fontWeight:700 }}>Finnhub API Key</span>
                  <input
                    value={keyInput}
                    onChange={(e) => setKeyInput(e.target.value)}
                    type="password"
                    placeholder="cxxxxxxxx"
                    style={{
                      padding:'8px 10px',
                      borderRadius:'10px',
                      border:'1px solid rgba(0,229,255,.2)',
                      background:'rgba(0,0,0,.3)',
                      color:'#E5E7EB',
                      fontSize:'12px',
                      width:'260px',
                      outline:'none'
                    }}
                  />
                  <button
                    onClick={saveKey}
                    style={{
                      padding:'8px 14px',
                      borderRadius:'10px',
                      background:'#00E5FF',
                      color:'#000',
                      border:'none',
                      fontSize:'12px',
                      fontWeight:800,
                      cursor:'pointer'
                    }}
                  >
                    Save
                  </button>
                  <span style={{ fontSize:'10px', color:'#6B7280' }}>
                    <a href="https://finnhub.io/register" target="_blank" rel="noreferrer" style={{ color:'#00E5FF' }}>finnhub.io</a> free plan rate-limits requests.
                  </span>
                </div>
              </div>
            )}

            <WinnersBar stocks={stocks} />

            <div style={{
              padding:'12px 20px',
              borderBottom:'1px solid rgba(255,255,255,.03)',
              display:'grid',
              gap:'10px'
            }}>
              {tabGroups.map(group => (
                <div key={group.label}>
                  <div style={{
                    fontSize:'11px',
                    color:'#667085',
                    fontWeight:700,
                    marginBottom:'6px',
                    textTransform:'uppercase',
                    letterSpacing:'1px'
                  }}>
                    {group.label}
                  </div>

                  <div style={{ display:'flex', gap:'6px', overflowX:'auto', paddingBottom:'2px' }}>
                    {group.items.map(k => {
                      const meta = SM[k];
                      const active = tab === k;
                      return (
                        <button
                          key={k}
                          onClick={() => {
                            setTab(k);
                            setSort('default');
                            setQ('');
                            setQuick('all');
                          }}
                          style={{
                            display:'flex',
                            alignItems:'center',
                            gap:'6px',
                            padding:'8px 12px',
                            borderRadius:'10px',
                            border: active ? `1px solid ${meta.color}44` : '1px solid transparent',
                            background: active ? meta.cd : 'rgba(255,255,255,.015)',
                            color: active ? meta.color : '#6B7280',
                            fontSize:'12px',
                            fontWeight: active ? 700 : 600,
                            cursor:'pointer',
                            whiteSpace:'nowrap',
                            outline:'none'
                          }}
                        >
                          <span style={{ fontSize:'14px' }}>{meta.icon}</span>
                          {meta.label}
                        </button>
                      );
                    })}
                  </div>
                </div>
              ))}
            </div>

            <div className="section">
              <p style={{ fontSize:'13px', color:'#9CA3AF', marginBottom:'12px', lineHeight:1.6 }}>
                <span style={{ color:sec.color, fontWeight:700 }}>{sec.icon} {sec.label}</span>
                {' — '}
                {tabHelp[tab] || sec.desc}
              </p>

              {tab === 'heatmap' ? <HeatmapView stocks={stocks} /> :
               tab === 'matrix' ? <MatrixView stocks={stocks} /> :
               tab === 'perf' ? <PerfView stocks={stocks} /> :
               tab === 'corr' ? <CorrView /> :
               tab === 'news' ? <NewsView apiKey={apiKey} /> :
               (
                <>
                  <div style={{ display:'flex', gap:'8px', flexWrap:'wrap', marginBottom:'12px' }}>
                    <div style={{ flex:'1 1 180px', position:'relative' }}>
                      <input
                        type="text"
                        placeholder="Search ticker, name, subcategory..."
                        value={q}
                        onChange={(e) => setQ(e.target.value)}
                        style={{
                          width:'100%',
                          padding:'10px 12px',
                          borderRadius:'10px',
                          border:'1px solid rgba(255,255,255,.07)',
                          background:'rgba(255,255,255,.025)',
                          color:'#E5E7EB',
                          fontSize:'13px',
                          outline:'none'
                        }}
                      />
                    </div>

                    <div style={{ display:'flex', gap:'6px', flexWrap:'wrap' }}>
                      {sortOptions.map(o => (
                        <button
                          key={o.k}
                          onClick={() => setSort(o.k)}
                          style={{
                            padding:'8px 10px',
                            borderRadius:'10px',
                            border: sort === o.k ? `1px solid ${sec.color}33` : '1px solid rgba(255,255,255,.05)',
                            background: sort === o.k ? sec.cd : 'transparent',
                            color: sort === o.k ? sec.color : '#6B7280',
                            fontSize:'11px',
                            fontWeight:700,
                            cursor:'pointer',
                            outline:'none'
                          }}
                        >
                          {o.l}
                        </button>
                      ))}
                    </div>
                  </div>

                  <div style={{ display:'flex', gap:'6px', flexWrap:'wrap', marginBottom:'16px' }}>
                    {[
                      ['all','All'],
                      ['strong-buy','Strong Buy'],
                      ['buy-upside','Buy + Upside'],
                      ['new','New'],
                      ['oversold','RSI <= 40'],
                      ['hot','RSI >= 70'],
                      ['no-etf','No ETF']
                    ].map(([k, label]) => (
                      <button
                        key={k}
                        onClick={() => setQuick(k)}
                        style={{
                          padding:'6px 10px',
                          borderRadius:'999px',
                          border: quick === k ? `1px solid ${sec.color}44` : '1px solid rgba(255,255,255,.06)',
                          background: quick === k ? sec.cd : 'rgba(255,255,255,.02)',
                          color: quick === k ? sec.color : '#8A93A2',
                          fontSize:'11px',
                          fontWeight:700,
                          cursor:'pointer',
                          outline:'none'
                        }}
                      >
                        {label}
                      </button>
                    ))}
                  </div>

                  <Summary stocks={fs} color={sec.color} />

                  <div style={{
                    display:'grid',
                    gridTemplateColumns:'repeat(auto-fill,minmax(340px,1fr))',
                    gap:'12px'
                  }}>
                    {fs.map((s, i) => (
                      <StockCard key={s.t} s={s} accent={sec.color} i={i} />
                    ))}
                  </div>
                </>
               )}
            </div>

            <div style={{
              padding:'16px 20px 22px',
              borderTop:'1px solid rgba(255,255,255,.03)',
              textAlign:'center',
              fontSize:'10px',
              color:'#4B5563'
            }}>
              AI Supply Chain Tracker · single-file React dashboard
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
