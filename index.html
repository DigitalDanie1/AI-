<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Action Desk</title>
    <meta
      name="description"
      content="Action-first AI infrastructure stock dashboard with live technical context."
    />
    <style>
      :root {
        color-scheme: dark;
        --bg: #070a0f;
        --panel: rgba(15, 20, 28, 0.92);
        --panel-2: rgba(255, 255, 255, 0.035);
        --line: rgba(203, 213, 225, 0.1);
        --text: #f7fbff;
        --muted: #9aabba;
        --buy: #3ee6ae;
        --wait: #ffd166;
        --risk: #ff7b7b;
        --info: #8bbdff;
        --blue: #60a5fa;
        --violet: #a78bfa;
        --orange: #fb923c;
        --cyan: #22d3ee;
        --green: #34d399;
        --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        color: var(--text);
        font-family: var(--sans);
        background:
          radial-gradient(circle at 20% 0%, rgba(96, 165, 250, 0.16), transparent 28%),
          radial-gradient(circle at 92% 6%, rgba(52, 211, 153, 0.11), transparent 24%),
          radial-gradient(circle at 50% 100%, rgba(251, 146, 60, 0.08), transparent 30%),
          linear-gradient(180deg, #0b1017 0%, var(--bg) 100%);
      }

      button,
      input {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      a {
        color: inherit;
      }

      .app {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 270px minmax(0, 1fr);
      }

      .rail {
        position: sticky;
        top: 0;
        height: 100vh;
        padding: 18px 14px;
        border-right: 1px solid var(--line);
        background: rgba(6, 9, 14, 0.82);
        backdrop-filter: blur(18px);
        overflow: auto;
      }

      .brand {
        padding: 6px 8px 18px;
      }

      .brand-kicker,
      .eyebrow {
        color: var(--muted);
        font-size: 11px;
        font-weight: 850;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .brand-title {
        margin-top: 8px;
        font-size: 28px;
        font-weight: 900;
        line-height: 1.02;
      }

      .status {
        margin: 12px 8px 16px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel-2);
        color: #c7d2de;
        font-size: 13px;
        line-height: 1.45;
      }

      .nav {
        display: grid;
        gap: 7px;
      }

      .nav button,
      .chip-button {
        border: 1px solid transparent;
        border-radius: 8px;
        background: transparent;
        color: #b8c5d2;
        display: flex;
        align-items: center;
        gap: 10px;
        min-height: 44px;
        padding: 10px 12px;
        font-weight: 800;
        text-align: left;
      }

      .nav button.is-active {
        border-color: rgba(139, 189, 255, 0.36);
        background: rgba(96, 165, 250, 0.13);
        color: #dcebff;
      }

      .nav-count {
        margin-left: auto;
        border-radius: 999px;
        padding: 2px 8px;
        background: rgba(255, 255, 255, 0.06);
        color: #98a9bb;
        font-size: 12px;
      }

      .icon {
        width: 30px;
        height: 30px;
        border-radius: 8px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex: 0 0 30px;
        border: 1px solid rgba(255, 255, 255, 0.11);
        background: rgba(255, 255, 255, 0.055);
        color: var(--icon-color, #dcebff);
      }

      .icon svg {
        width: 18px;
        height: 18px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2.2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .icon.small {
        width: 24px;
        height: 24px;
        flex-basis: 24px;
        border-radius: 7px;
      }

      .icon.small svg {
        width: 15px;
        height: 15px;
      }

      .icon.big {
        width: 42px;
        height: 42px;
        flex-basis: 42px;
        border-radius: 10px;
      }

      .icon.big svg {
        width: 24px;
        height: 24px;
      }

      .ticker-line {
        display: flex;
        align-items: center;
        gap: 9px;
        min-width: 0;
      }

      .sector-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        width: fit-content;
        margin-top: 9px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 999px;
        padding: 4px 8px;
        color: #b9c7d7;
        background: rgba(255, 255, 255, 0.035);
        font-size: 12px;
        font-weight: 850;
      }

      .rail-actions {
        margin-top: 14px;
        padding-top: 14px;
        border-top: 1px solid var(--line);
        display: grid;
        gap: 8px;
      }

      .primary-button,
      .secondary-button {
        min-height: 42px;
        border-radius: 8px;
        padding: 10px 12px;
        font-weight: 850;
      }

      .primary-button {
        border: 1px solid rgba(62, 230, 174, 0.28);
        background: rgba(62, 230, 174, 0.13);
        color: var(--buy);
      }

      .secondary-button {
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.04);
        color: #d8e2ee;
      }

      .main {
        min-width: 0;
        padding: 22px;
      }

      .topbar {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 18px;
        align-items: start;
        margin-bottom: 18px;
      }

      h1 {
        margin: 0;
        font-size: clamp(32px, 4.5vw, 58px);
        line-height: 0.96;
        letter-spacing: 0;
      }

      .subtitle {
        margin: 12px 0 0;
        max-width: 900px;
        color: #b8c5d2;
        font-size: 16px;
        line-height: 1.6;
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 8px;
        flex-wrap: wrap;
      }

      .search {
        width: min(280px, 100%);
        min-height: 42px;
        border-radius: 8px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        padding: 10px 12px;
        outline: none;
      }

      .scoreboard {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        margin-bottom: 18px;
      }

      .metric,
      .panel,
      .card {
        border: 1px solid var(--line);
        background: var(--panel);
        box-shadow: 0 18px 42px rgba(0, 0, 0, 0.24);
      }

      .metric {
        min-height: 106px;
        border-radius: 8px;
        padding: 14px;
      }

      .metric-value {
        margin-top: 8px;
        font-size: 30px;
        font-weight: 900;
        line-height: 1;
      }

      .metric-note {
        margin-top: 8px;
        color: #aab8c7;
        font-size: 13px;
        line-height: 1.45;
      }

      .action-grid {
        display: grid;
        grid-template-columns: 1.15fr 0.95fr 0.9fr;
        gap: 14px;
        margin-bottom: 18px;
      }

      .panel {
        border-radius: 8px;
        padding: 16px;
        min-width: 0;
      }

      .panel-head {
        display: flex;
        justify-content: space-between;
        align-items: start;
        gap: 12px;
        margin-bottom: 12px;
      }

      .panel-title {
        font-size: 20px;
        font-weight: 900;
      }

      .action-list {
        display: grid;
        gap: 10px;
      }

      .action-row {
        display: grid;
        grid-template-columns: 82px minmax(0, 1fr) auto;
        gap: 10px;
        align-items: center;
        border: 1px solid rgba(255, 255, 255, 0.07);
        border-radius: 8px;
        padding: 11px;
        background: rgba(255, 255, 255, 0.027);
      }

      .ticker {
        font-family: var(--mono);
        font-size: 22px;
        font-weight: 900;
      }

      .name {
        color: #c4cfda;
        font-size: 13px;
        line-height: 1.45;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .row-thesis {
        color: #aebccd;
        font-size: 13px;
        line-height: 1.45;
        margin-top: 3px;
      }

      .row-reason {
        color: #d5dee8;
        font-size: 13px;
        font-weight: 800;
        line-height: 1.45;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
        min-height: 28px;
        border-radius: 999px;
        padding: 5px 9px;
        font-size: 12px;
        font-weight: 900;
        white-space: nowrap;
      }

      .badge.buy {
        color: var(--buy);
        background: rgba(62, 230, 174, 0.12);
        border: 1px solid rgba(62, 230, 174, 0.24);
      }

      .badge.wait {
        color: var(--wait);
        background: rgba(255, 209, 102, 0.12);
        border: 1px solid rgba(255, 209, 102, 0.25);
      }

      .badge.risk {
        color: var(--risk);
        background: rgba(255, 123, 123, 0.12);
        border: 1px solid rgba(255, 123, 123, 0.25);
      }

      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
        gap: 14px;
      }

      .card {
        border-radius: 8px;
        padding: 16px;
        position: relative;
        overflow: hidden;
      }

      .card::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: linear-gradient(180deg, rgba(96, 165, 250, 0.05), transparent 34%);
      }

      .card-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        position: relative;
      }

      .price {
        font-family: var(--mono);
        text-align: right;
        font-size: 23px;
        font-weight: 900;
      }

      .change {
        margin-top: 4px;
        text-align: right;
        font-size: 14px;
        font-weight: 900;
      }

      .thesis {
        margin-top: 12px;
        color: #d9e2ec;
        font-size: 14px;
        line-height: 1.6;
        position: relative;
      }

      .signal-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        margin: 14px 0;
        position: relative;
      }

      .signal {
        border: 1px solid rgba(255, 255, 255, 0.07);
        border-radius: 8px;
        padding: 10px;
        background: rgba(255, 255, 255, 0.028);
      }

      .signal-label {
        color: #8fa0b2;
        font-size: 10px;
        font-weight: 900;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .signal-value {
        margin-top: 5px;
        font-family: var(--mono);
        font-size: 16px;
        font-weight: 900;
      }

      .rules {
        display: grid;
        gap: 7px;
        margin-top: 12px;
        position: relative;
      }

      .rule {
        color: #bac7d5;
        font-size: 13px;
        line-height: 1.45;
        padding-left: 13px;
        position: relative;
      }

      .rule::before {
        content: "";
        width: 5px;
        height: 5px;
        border-radius: 999px;
        background: var(--blue);
        position: absolute;
        left: 0;
        top: 7px;
      }

      .card-actions {
        margin-top: 14px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        position: relative;
      }

      .link-button {
        min-height: 36px;
        border-radius: 8px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.04);
        color: #dce7f3;
        padding: 8px 10px;
        text-decoration: none;
        font-size: 13px;
        font-weight: 850;
      }

      .empty {
        color: var(--muted);
        border: 1px dashed var(--line);
        border-radius: 8px;
        padding: 18px;
      }

      .heat {
        height: 8px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.07);
        margin-top: 10px;
      }

      .heat-fill {
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--info), var(--buy));
      }

      .source-note {
        margin-top: 18px;
        color: #8c9cae;
        font-size: 12px;
        line-height: 1.55;
      }

      @media (max-width: 1100px) {
        .app {
          grid-template-columns: 1fr;
        }

        .rail {
          position: relative;
          height: auto;
          display: block;
        }

        .nav {
          grid-template-columns: repeat(auto-fit, minmax(145px, 1fr));
        }

        .action-grid,
        .topbar {
          grid-template-columns: 1fr;
        }

        .toolbar {
          justify-content: flex-start;
        }
      }

      @media (max-width: 760px) {
        .main,
        .rail {
          padding: 14px;
        }

        .scoreboard {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .cards {
          grid-template-columns: 1fr;
        }

        .action-row {
          grid-template-columns: 72px minmax(0, 1fr);
        }

        .action-row .badge {
          grid-column: 1 / -1;
          width: fit-content;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="rail">
        <div class="brand">
          <div class="brand-kicker">Current Action UI</div>
          <div class="brand-title">AI Action Desk</div>
        </div>
        <div class="status" id="status">실시간 데이터를 불러올 준비 중입니다.</div>
        <nav class="nav" id="nav"></nav>
        <div class="rail-actions">
          <button class="primary-button" id="refreshBtn">현재 기준 새로고침</button>
          <button class="secondary-button" id="resetBtn">필터 초기화</button>
        </div>
      </aside>

      <main class="main">
        <section class="topbar">
          <div>
            <h1 id="pageTitle">오늘 액션부터 본다</h1>
            <p class="subtitle" id="subtitle">
              가격 예측보다 실행 기준을 먼저 보여줍니다. 종목은 지금 살 후보, 기다릴 후보, 줄일 후보로 자동 분류됩니다.
            </p>
          </div>
          <div class="toolbar">
            <input class="search" id="search" placeholder="티커 / 회사명 검색" />
            <button class="secondary-button" data-sort="score">액션점수</button>
            <button class="secondary-button" data-sort="momentum">상승강도</button>
            <button class="secondary-button" data-sort="pullback">눌림목</button>
          </div>
        </section>

        <section class="scoreboard" id="scoreboard"></section>
        <section class="action-grid" id="actionGrid"></section>
        <section class="cards" id="cards"></section>
        <div class="source-note">
          데이터는 브라우저에서 Yahoo Finance chart endpoint를 호출해 계산합니다. 네트워크 또는 CORS 제한 시 마지막 로컬 룰 기반으로 표시됩니다. 투자 조언이 아니라 실행 후보 정리 UI입니다.
        </div>
      </main>
    </div>

      function proxied(url) {
        return `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
      }

      async function fetchWithTimeout(url, timeoutMs = 7000) {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), timeoutMs);
        try {
          const response = await fetch(url, { signal: controller.signal });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          return response;
        } finally {
          clearTimeout(timeout);
        }
      }

      async function fetchJson(url) {
        try {
          const response = await fetchWithTimeout(url);
          return await response.json();
        } catch (error) {
          const response = await fetchWithTimeout(proxied(url), 7000);
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          return await response.json();
        }
      }

      async function fetchQuote(ticker) {
        const symbol = yahooSymbol(ticker);
        const url = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(symbol)}?range=1y&interval=1d`;
        const data = await fetchJson(url);
        const result = data && data.chart && data.chart.result && data.chart.result[0];
        if (!result) throw new Error("No chart data");
        const meta = result.meta || {};
        const quote = result.indicators && result.indicators.quote && result.indicators.quote[0];
        const closes = (quote && quote.close ? quote.close : []).map(Number).filter(Number.isFinite);
        const highs = (quote && quote.high ? quote.high : []).map(Number).filter(Number.isFinite);
        const volumes = (quote && quote.volume ? quote.volume : []).map(Number).filter(Number.isFinite);
        if (!closes.length) throw new Error("No close data");
        const price = Number(meta.regularMarketPrice || closes[closes.length - 1]);
        const prev = closes.length > 1 ? closes[closes.length - 2] : price;
        const first = closes[0] || price;
        const high52 = Math.max(...highs, price);
        const low52 = Math.min(...closes, price);
        const ma = (days) => {
          const slice = closes.slice(-days);
          return slice.length ? slice.reduce((a, b) => a + b, 0) / slice.length : null;
        };
        const vol20 = volumes.slice(-21, -1);
        const avgVol20 = vol20.length ? vol20.reduce((a, b) => a + b, 0) / vol20.length : null;
        const volume = volumes[volumes.length - 1] || null;
        const ma20 = ma(20);
        const ma50 = ma(50);
        const ma200 = ma(200);
        return {
          ticker,
          price,
          changePct: prev ? ((price - prev) / prev) * 100 : 0,
          ytdPct: first ? ((price - first) / first) * 100 : 0,
          high52,
          low52,
          distHighPct: high52 ? ((price - high52) / high52) * 100 : 0,
          distLowPct: low52 ? ((price - low52) / low52) * 100 : 0,
          ma20,
          ma50,
          ma200,
          volume,
          volumeRatio: avgVol20 && volume ? volume / avgVol20 : null,
          marketTime: meta.regularMarketTime ? new Date(meta.regularMarketTime * 1000).toLocaleString("ko-KR") : "",
          ok: true,
        };
      }

      async function fetchLocalQuotes(tickers) {
        const response = await fetchWithTimeout(`/api/quotes?symbols=${encodeURIComponent(tickers.join(","))}`, 30000);
        if (!response.ok) throw new Error(`Local quote API ${response.status}`);
        const data = await response.json();
        return Object.values(data.results || {}).filter((item) => item && item.ok);
      }

      function pct(value, digits = 1) {
        if (value == null || Number.isNaN(value)) return "-";
        const sign = value > 0 ? "+" : "";
        return `${sign}${value.toFixed(digits)}%`;
      }

      function money(value) {
        if (value == null || Number.isNaN(value)) return "-";
        return value < 100 ? `$${value.toFixed(2)}` : `$${value.toLocaleString(undefined, { maximumFractionDigits: 2, minimumFractionDigits: 2 })}`;
      }

      function scoreItem(item) {
        const q = state.quotes[item.ticker] || {};
        const price = q.price;
        const above20 = price && q.ma20 ? price > q.ma20 : false;
        const above50 = price && q.ma50 ? price > q.ma50 : false;
        const nearHigh = q.distHighPct != null ? q.distHighPct >= -7 : false;
        const notStretched = q.ma20 && price ? ((price - q.ma20) / q.ma20) * 100 < 10 : true;
        const volumePush = q.volumeRatio != null ? q.volumeRatio >= 1.15 : false;
        const pullback = q.distHighPct != null && q.distHighPct < -10 && q.distHighPct > -28;
        const breakdown = price && q.ma50 ? price < q.ma50 : false;

        const hasLive = q && q.ok && q.price;
        let score = hasLive ? 50 : 45;
        score += qualityByTicker[item.ticker] || 0;
        if (above20) score += 12;
        if (above50) score += 14;
        if (nearHigh) score += 10;
        if (volumePush) score += 8;
        if (notStretched) score += 7;
        if (pullback) score += 5;
        if (hasLive && q.changePct > 0) score += 6;
        if (hasLive && q.changePct > 1.2) score += 7;
        if (q.changePct > 2) score += 5;
        if (q.changePct < -1.5) score -= 8;
        if (q.changePct < -3) score -= 12;
        if (breakdown) score -= 20;
        if (q.distHighPct < -35) score -= 12;

        let action = "wait";
        if (score >= 76 && !breakdown && notStretched && hasLive) action = "buy";
        if (score < 48 || breakdown || (hasLive && q.changePct < -3.5)) action = "risk";

        const hasTrendData = q.ma20 || q.ma50 || q.high52;
        const reason = action === "buy"
          ? hasTrendData ? "추세와 가격 위치가 동시에 좋음" : "핵심도와 당일 강도가 동시에 좋음"
          : action === "risk"
            ? "기술적 지지 이탈 또는 약세 우선"
            : "좋지만 진입 타이밍 확인 필요";

        return { ...item, quote: q, score: Math.max(0, Math.min(100, Math.round(score))), action, reason };
      }

      function filteredItems() {

          .filter((item) => !query || item.ticker.toLowerCase().includes(query) || item.name.toLowerCase().includes(query))
          .map(scoreItem);

        if (state.sort === "momentum") {
          items.sort((a, b) => (b.quote.changePct || -999) - (a.quote.changePct || -999));
        } else if (state.sort === "pullback") {
          items.sort((a, b) => (a.quote.distHighPct || 0) - (b.quote.distHighPct || 0));
        } else {
          items.sort((a, b) => b.score - a.score);
        }
        return items;
      }

              </div>
              <div class="card-actions">
                <a class="link-button" href="${tvUrl(item.ticker)}" target="_blank" rel="noreferrer">TradingView</a>
                <a class="link-button" href="${yahooUrl(item.ticker)}" target="_blank" rel="noreferrer">Yahoo</a>
              </div>
            </article>
          `;
        }).join("");
      }

      function render() {
        const meta = sectorMeta(state.sector);
        const items = filteredItems();
        els.title.textContent = state.sector === "all" ? "오늘 액션부터 본다" : `${meta.label}: 지금 할 일`;
        els.subtitle.textContent = state.sector === "all"
          ? "전체 종목을 매수 후보, 대기 후보, 리스크 후보로 나눕니다. 초록색만 오늘 액션 후보입니다."
          : `${meta.label} 안에서 바로 볼 종목과 기다릴 종목을 분리합니다. 점수보다 실행 조건을 먼저 보세요.`;
        renderNav();
        renderScoreboard(items);
        renderActionGrid(items);
        renderCards(items);
        updateStatus();
      }

      function updateStatus(message) {
        if (message) {
          els.status.textContent = message;
          return;
        }
        const loaded = Object.keys(state.quotes).length;
        const quoteableCount = watchlist.filter(isQuoteable).length;
        const when = state.lastUpdated ? ` · ${state.lastUpdated}` : "";
        if (state.dataError && !state.loading) {
          els.status.textContent = `${loaded}/${quoteableCount}개 시세 반영 · 전체 ${watchlist.length}개 · ${state.dataError}`;
          return;
        }
        els.status.textContent = state.loading
          ? "현재 기준 데이터를 불러오는 중입니다..."
          : `${loaded}/${quoteableCount}개 시세 반영 · 전체 ${watchlist.length}개${when}`;
      }

      async function refresh() {
        if (state.loading) return;
        state.loading = true;
        state.dataError = "";
        updateStatus();
        render();
        const quoteItems = watchlist.filter(isQuoteable);
        const tickers = quoteItems.map((item) => item.ticker);
        try {
          const localQuotes = await fetchLocalQuotes(tickers);
          localQuotes.forEach((quote) => {
            state.quotes[quote.ticker] = quote;
          });
        } catch (error) {
          // Static-file fallback: use browser-side Yahoo chart calls when the local quote server is absent.
        }
        const missing = tickers.filter((ticker) => !state.quotes[ticker]);
        if (missing.length) {
          const results = await Promise.allSettled(missing.map(fetchQuote));
          results.forEach((result, index) => {
            if (result.status === "fulfilled") {
              state.quotes[missing[index]] = result.value;
            }
          });
        }
        const loaded = Object.keys(state.quotes).length;
        if (!loaded) {
          state.dataError = "실시간 호출 실패, 기본 액션 룰로 표시";
        } else if (loaded < tickers.length) {
          state.dataError = "일부 시세만 반영";
        }
        state.lastUpdated = new Date().toLocaleString("ko-KR");
        state.loading = false;
        render();
      }

      els.nav.addEventListener("click", (event) => {
        const button = event.target.closest("[data-sector]");
        if (!button) return;
        state.sector = button.dataset.sector;
        render();
      });

      els.search.addEventListener("input", (event) => {
        state.search = event.target.value;
        render();
      });

      document.querySelectorAll("[data-sort]").forEach((button) => {
        button.addEventListener("click", () => {
          state.sort = button.dataset.sort;
          render();
        });
      });

      els.refresh.addEventListener("click", refresh);
      els.reset.addEventListener("click", () => {
        state.sector = "all";
        state.sort = "score";
        state.search = "";
        els.search.value = "";
        render();
      });

      render();
      refresh();
    </script>
  </body>
</html>
