    function parseMcap(s){
      if(!s) return 0;
      const n = parseFloat(s);
      if(Number.isNaN(n)) return 0;
      if(s.includes('T')) return n * 1000;
      if(s.includes('B')) return n;
      if(s.includes('M')) return n / 1000;
      return n;
    }

    function delay(ms){
      return new Promise(r => setTimeout(r, ms));
    }

    async function fhQuote(sym, key){
      try{
        const r = await fetch(`https://finnhub.io/api/v1/quote?symbol=${sym}&token=${key}`);
        if(!r.ok) return null;
        const d = await r.json();
        if(!d || d.c === 0) return null;
        return { price: d.c, change: d.d, changePct: d.dp };
      }catch{
        return null;
      }
    }

    async function fhNews(sym, key){
      try{
        const to = new Date().toISOString().slice(0,10);
        const fr = new Date(Date.now() - 7 * 86400000).toISOString().slice(0,10);
        const r = await fetch(`https://finnhub.io/api/v1/company-news?symbol=${sym}&from=${fr}&to=${to}&token=${key}`);
        if(!r.ok) return [];
        return (await r.json()).slice(0,8);
      }catch{
        return [];
      }
    }

    function RsiBadge({rsi}){
      if(!rsi) return null;
      const ob=rsi>70, os=rsi<30, hot=rsi>60, cold=rsi<40;
      const c=ob?"#FF6B6B":os?"#00E5A0":hot?"#FFD93D":cold?"#4ECDC4":"#6B7280";
      const l=ob?"OB":os?"OS":hot?"↑":cold?"↓":"";
      return (
        <span style={{fontSize:10,padding:"2px 6px",borderRadius:4,background:`${c}18`,color:c,border:`1px solid ${c}30`,fontWeight:600}}>
          RSI {rsi} {l}
        </span>
      );
    }

    function Bar({val,mx,c,lb}){
      return (
        <div style={{marginBottom:5}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#8A8F98",marginBottom:2}}>
            <span>{lb}</span>
            <span style={{color:val>0?c:val<0?"#FF6B6B":"#555",fontWeight:600,fontFamily:"monospace"}}>
              {val>0?`+${val}`:val<0?val:"-"}
            </span>
          </div>
          <div style={{height:4,background:"rgba(255,255,255,0.04)",borderRadius:2}}>
            <div style={{height:"100%",width:`${Math.min(Math.abs(val)/mx*100,100)}%`,borderRadius:2,background:`linear-gradient(90deg,${c}88,${c})`}} />
          </div>
        </div>
      );
    }

        function Radar({f,color}){
      const lb=["FVO","VA","SI","MO","BE","OU"];
      const ks=["vo","va","si","mo","be","ou"];
      const cx=90, cy=90, r=65;
      const an=ks.map((_,i)=>Math.PI*2*i/ks.length-Math.PI/2);
      const pts=ks.map((k,i)=>({
        x:cx+Math.cos(an[i])*r*((f?.[k]||5)/10),
        y:cy+Math.sin(an[i])*r*((f?.[k]||5)/10)
      }));

      return (
        <svg viewBox="0 0 180 180" style={{width:"100%",maxWidth:200}}>
          {[.25,.5,.75,1].map((lv,li)=>(
            <polygon
              key={li}
              points={an.map(a=>`${cx+Math.cos(a)*r*lv},${cy+Math.sin(a)*r*lv}`).join(" ")}
              fill="none"
              stroke="rgba(255,255,255,0.08)"
              strokeWidth=".5"
            />
          ))}
          {an.map((a,i)=>(
            <g key={i}>
              <line x1={cx} y1={cy} x2={cx+Math.cos(a)*r} y2={cy+Math.sin(a)*r} stroke="rgba(255,255,255,0.06)" strokeWidth=".5"/>
              <text x={cx+Math.cos(a)*r*1.18} y={cy+Math.sin(a)*r*1.18} fill="#8A8F98" fontSize="8" textAnchor="middle" dominantBaseline="middle">{lb[i]}</text>
            </g>
          ))}
          <polygon points={pts.map(p=>`${p.x},${p.y}`).join(" ")} fill={`${color}25`} stroke={color} strokeWidth="1.5"/>
        </svg>
      );
    }

    function TChart({s,color}){
      if(!s.hi || !s.lo) return null;
      const mn=s.lo*.85, mx=s.hi*1.08, rng=mx-mn;
      const y=val=>100-(val-mn)/rng*100;

      return (
        <svg viewBox="0 0 220 120" style={{width:"100%",maxWidth:240}}>
          <line x1="30" y1={y(s.p)*1.15} x2="200" y2={y(s.p)*1.15} stroke="rgba(255,255,255,0.2)" strokeWidth="1"/>
          {[[s.hi,"#00E5A0","H"],[s.avg,"#FFD93D","A"],[s.lo,"#FF6B6B","L"]].map(([val,cl,lbl],i)=>(
            <g key={i}>
              <line x1="90" y1={y(val)*1.15} x2="190" y2={y(val)*1.15} stroke={cl} strokeWidth="1" strokeDasharray="4,2"/>
              <text x="195" y={y(val)*1.14} fill={cl} fontSize="8" fontWeight="700">{lbl}</text>
              <text x="195" y={y(val)*1.113} fill={cl} fontSize="9" fontFamily="monospace">{val}</text>
              <circle cx="190" cy={y(val)*1.15} r="3" fill={cl}/>
            </g>
          ))}
          <text x="35" y={y(s.p)*1.13} fill="#fff" fontSize="8">P</text>
          <text x="35" y={y(s.p)*1.114} fill="#fff" fontSize="10" fontWeight="700" fontFamily="monospace">{s.p}</text>
          <circle cx="90" cy={y(s.p)*1.15} r="3" fill="#fff"/>
        </svg>
      );
    }

        function App(){
      const [tab,setTab]=useState("nuclear");
      const [sort,setSort]=useState("default");
      const [q,setQ]=useState("");
      const [apiKey,setApiKey]=useState(localStorage.getItem("fh_key")||"");
      const [showSettings,setShowSettings]=useState(false);
      const [keyInput,setKeyInput]=useState(localStorage.getItem("fh_key")||"");
      const [stocks,setStocks]=useState(initS);
      const [fetching,setFetching]=useState(false);
      const [lastUpdate,setLastUpdate]=useState("");
      const [progress,setProgress]=useState({done:0,total:0,batch:0,batches:0,current:""});

      const sec=SM[tab]||SM.nuclear;

      const sortOptions=[
        {l:"Default",k:"default"},
        {l:"Change",k:"change"},
        {l:"YTD",k:"ytd"},
        {l:"Target Upside",k:"targetUpside"},
        {l:"RSI",k:"rsi"}
      ];

      const sectionStocks=useMemo(()=>{
        return stocks.filter(s=>s.sec===tab);
      },[stocks,tab]);

      const filteredStocks=useMemo(()=>{
        let st=[...sectionStocks];

        if(q){
          const ql=q.toLowerCase();
          st=st.filter(s=>
            s.t.toLowerCase().includes(ql) ||
            s.n.toLowerCase().includes(ql) ||
            (s.sub||"").toLowerCase().includes(ql)
          );
        }

        if(sort==="change") st.sort((a,b)=>(b.ch||0)-(a.ch||0));
        else if(sort==="ytd") st.sort((a,b)=>(b.ytd||0)-(a.ytd||0));
        else if(sort==="targetUpside") st.sort((a,b)=>(b.tu||0)-(a.tu||0));
        else if(sort==="rsi") st.sort((a,b)=>(b.rsi||0)-(a.rsi||0));

        return st;
      },[sectionStocks,q,sort]);

      const saveKey=()=>{
        const next=(keyInput||"").trim();
        localStorage.setItem("fh_key",next);
        setApiKey(next);
        setShowSettings(false);
      };

      const clearKey=()=>{
        localStorage.removeItem("fh_key");
        setApiKey("");
        setKeyInput("");
        setShowSettings(false);
      };

      const fetchAll=useCallback(async()=>{
        const cleanKey=(apiKey||"").trim();
        if(!cleanKey || fetching) return;

        const updated=[...stocks];
        const tradables=updated
          .map((s,index)=>({s,index}))
          .filter(({s})=>/^[A-Z]{1,5}$/.test(s.t));

        const batchSize=28;
        const total=tradables.length;
        const totalBatches=Math.ceil(total/batchSize);

        setFetching(true);
        setProgress({done:0,total,batch:0,batches:totalBatches,current:""});

        try{
          for(let batchIndex=0; batchIndex<totalBatches; batchIndex++){
            const batch=tradables.slice(batchIndex*batchSize,(batchIndex+1)*batchSize);

            setProgress(prev=>({
              ...prev,
              batch:batchIndex+1,
              current:batch[0]?.s?.t||""
            }));

            const results=await Promise.all(
              batch.map(async({s,index})=>{
                const quote=await fhQuote(s.t,cleanKey);
                return {index,quote};
              })
            );

            results.forEach(({index,quote})=>{
              if(quote && quote.price>0){
                updated[index]={
                  ...updated[index],
                  p:quote.price,
                  ch:quote.changePct||0
                };
              }
            });

            const done=Math.min((batchIndex+1)*batchSize,total);
            setStocks([...updated]);
            setProgress(prev=>({
              ...prev,
              done,
              current:batch[batch.length-1]?.s?.t||prev.current
            }));

            if(batchIndex<totalBatches-1){
              await delay(60000);
            }
          }

          setLastUpdate(
            new Date().toLocaleString("ko-KR",{
              year:"numeric",
              month:"2-digit",
              day:"2-digit",
              hour:"2-digit",
              minute:"2-digit",
              second:"2-digit",
              hour12:false
            })
          );
        }finally{
          setFetching(false);
          setProgress({done:0,total:0,batch:0,batches:0,current:""});
        }
      },[apiKey,stocks,fetching]);

      const renderContent=()=>{
        if(tab==="heatmap") return <HeatmapView stocks={stocks}/>;
        if(tab==="perf") return <PerfView stocks={stocks}/>;
        if(tab==="snap") return <SnapView stocks={stocks}/>;
        if(tab==="news") return <NewsView apiKey={apiKey}/>;

        return (
          <>
            <div style={{display:"flex",gap:"6px",flexWrap:"wrap",marginBottom:"16px"}}>
              <div style={{flex:"1 1 180px",position:"relative"}}>
                <input
                  type="text"
                  placeholder="티커 / 회사명 검색"
                  value={q}
                  onChange={e=>setQ(e.target.value)}
                  style={{
                    width:"100%",
                    padding:"8px 10px 8px 30px",
                    borderRadius:"8px",
                    border:"1px solid rgba(255,255,255,.07)",
                    background:"rgba(255,255,255,.025)",
                    color:"#E5E7EB",
                    fontSize:"13px",
                    outline:"none"
                  }}
                />
                <span style={{position:"absolute",left:"9px",top:"50%",transform:"translateY(-50%)",fontSize:"12px",opacity:.35}}>
                  ⌕
                </span>
              </div>

              <div style={{display:"flex",gap:"2px",flexWrap:"wrap"}}>
                {sortOptions.map(o=>(
                  <button
                    key={o.k}
                    onClick={()=>setSort(o.k)}
                    style={{
                      padding:"6px 10px",
                      borderRadius:"7px",
                      border:sort===o.k?`1px solid ${sec.color}30`:"1px solid rgba(255,255,255,.05)",
                      background:sort===o.k?sec.cd:"transparent",
                      color:sort===o.k?sec.color:"#6B7280",
                      fontSize:"11px",
                      fontWeight:600,
                      cursor:"pointer",
                      outline:"none"
                    }}
                  >
                    {o.l}
                  </button>
                ))}
              </div>
            </div>

            <Summ stocks={filteredStocks} color={sec.color}/>

            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(340px,1fr))",gap:"12px"}}>
              {filteredStocks.map((s,i)=><Card key={`${s.t}-${i}`} s={s} sc={sec.color} i={i}/>)}
            </div>
          </>
        );
      };

      return (
        <div style={{minHeight:"100vh",background:"#080A0F",color:"#E5E7EB",fontFamily:"Inter,system-ui,sans-serif"}}>
          <div
            style={{
              padding:"20px 20px 10px",
              borderBottom:"1px solid rgba(255,255,255,.04)",
              display:"flex",
              justifyContent:"space-between",
              alignItems:"flex-start",
              gap:"12px",
              flexWrap:"wrap"
            }}
          >
            <div>
              <div style={{display:"flex",alignItems:"center",gap:"7px",marginBottom:"3px",flexWrap:"wrap"}}>
                <div
                  style={{
                    width:"7px",
                    height:"7px",
                    borderRadius:"50%",
                    background:sec.color,
                    animation:"pl 2s infinite",
                    boxShadow:`0 0 8px ${sec.color}50`
                  }}
                />
                <span
                  style={{
                    fontSize:"11px",
                    color:"#6B7280",
                    textTransform:"uppercase",
                    letterSpacing:"1.5px",
                    fontWeight:600
                  }}
                >
                  AI Only
                </span>

                {fetching && <span className="spinner" />}

                {lastUpdate && (
                  <span style={{fontSize:"10px",color:"#4B5563"}}>
                    마지막 업데이트 {lastUpdate}
                  </span>
                )}
              </div>

              <h1
                style={{
                  fontSize:"24px",
                  fontWeight:800,
                  margin:"5px 0 3px",
                  background:`linear-gradient(135deg, ${sec.color}, #fff, ${sec.color})`,
                  backgroundSize:"200% 200%",
                  animation:"gl 4s ease infinite",
                  WebkitBackgroundClip:"text",
                  WebkitTextFillColor:"transparent"
                }}
              >
                {sec.icon} {sec.label}
              </h1>

              <p style={{fontSize:"13px",color:"#6B7280"}}>
                {stocks.length} stocks / manual refresh only
              </p>

              {fetching && (
                <div style={{marginTop:"8px",fontSize:"12px",color:"#9CA3AF",lineHeight:1.6}}>
                  업데이트 중: {progress.done}/{progress.total}
                  {progress.batches ? ` / batch ${progress.batch}/${progress.batches}` : ""}
                  {progress.current ? ` / ${progress.current}` : ""}
                </div>
              )}
            </div>

            <div style={{display:"flex",gap:"8px",alignItems:"center",flexWrap:"wrap"}}>
              <button
                onClick={fetchAll}
                disabled={!apiKey || fetching}
                style={{
                  padding:"6px 12px",
                  borderRadius:"8px",
                  border:"1px solid rgba(0,229,255,0.2)",
                  background:!apiKey?"rgba(255,255,255,0.04)":"rgba(0,229,255,0.08)",
                  color:!apiKey?"#6B7280":"#00E5FF",
                  fontSize:"12px",
                  fontWeight:600,
                  cursor:(!apiKey || fetching)?"not-allowed":"pointer",
                  outline:"none",
                  opacity:(!apiKey || fetching)?0.65:1
                }}
              >
                {fetching ? "업데이트 중..." : "수동 업데이트"}
              </button>

              <button
                onClick={()=>setShowSettings(v=>!v)}
                style={{
                  padding:"6px 12px",
                  borderRadius:"8px",
                  border:"1px solid rgba(255,255,255,0.08)",
                  background:"rgba(255,255,255,0.04)",
                  color:"#9CA3AF",
                  fontSize:"12px",
                  cursor:"pointer",
                  outline:"none"
                }}
              >
                API
              </button>
            </div>
          </div>

          {showSettings && (
            <div
              style={{
                padding:"12px 20px",
                background:"rgba(0,229,255,0.04)",
                borderBottom:"1px solid rgba(0,229,255,0.1)",
                animation:"fi .2s ease"
              }}
            >
              <div style={{display:"flex",gap:"8px",alignItems:"center",flexWrap:"wrap"}}>
                <span style={{fontSize:"12px",color:"#00E5FF",fontWeight:600}}>
                  Finnhub API Key
                </span>

                <input
                  value={keyInput}
                  onChange={e=>setKeyInput(e.target.value)}
                  type="password"
                  placeholder="cxxxxxxxxxx"
                  style={{
                    padding:"6px 10px",
                    borderRadius:"6px",
                    border:"1px solid rgba(0,229,255,0.2)",
                    background:"rgba(0,0,0,0.3)",
                    color:"#E5E7EB",
                    fontSize:"12px",
                    width:"260px",
                    outline:"none"
                  }}
                />

                <button
                  onClick={saveKey}
                  style={{
                    padding:"6px 14px",
                    borderRadius:"6px",
                    background:"#00E5FF",
                    color:"#000",
                    fontSize:"12px",
                    fontWeight:700,
                    cursor:"pointer",
                    border:"none"
                  }}
                >
                  저장
                </button>

                <button
                  onClick={clearKey}
                  style={{
                    padding:"6px 14px",
                    borderRadius:"6px",
                    background:"rgba(255,255,255,0.08)",
                    color:"#9CA3AF",
                    fontSize:"12px",
                    fontWeight:600,
                    cursor:"pointer",
                    border:"1px solid rgba(255,255,255,0.08)"
                  }}
                >
                  삭제
                </button>

                <span style={{fontSize:"10px",color:"#6B7280"}}>
                  한국 종목과 일부 해외 종목은 수동 관리가 더 안전
                </span>
              </div>
            </div>
          )}

          <WinnersBar stocks={stocks} />

          <div
            style={{
              display:"flex",
              gap:"2px",
              padding:"8px 20px",
              overflowX:"auto",
              borderBottom:"1px solid rgba(255,255,255,.03)"
            }}
          >
            {Object.entries(SM).map(([k,s])=>{
              const active=tab===k;
              return (
                <button
                  key={k}
                  onClick={()=>{
                    setTab(k);
                    setSort("default");
                    setQ("");
                  }}
                  style={{
                    display:"flex",
                    alignItems:"center",
                    gap:"4px",
                    padding:"7px 12px",
                    borderRadius:"8px",
                    border:active?`1px solid ${s.color}40`:"1px solid transparent",
                    background:active?s.cd:"transparent",
                    color:active?s.color:"#6B7280",
                    fontSize:"12px",
                    fontWeight:active?700:500,
                    cursor:"pointer",
                    whiteSpace:"nowrap",
                    outline:"none"
                  }}
                >
                  <span style={{fontSize:"14px"}}>{s.icon}</span>
                  {s.label}
                </button>
              );
            })}
          </div>

          <div style={{padding:"14px 20px"}}>
            <p style={{fontSize:"13px",color:"#9CA3AF",marginBottom:"12px"}}>
              <span style={{color:sec.color,fontWeight:700}}>{sec.icon} {sec.label}</span>{" "}
              {sec.desc}
            </p>

            {renderContent()}
          </div>

          <div
            style={{
              padding:"14px 20px",
              borderTop:"1px solid rgba(255,255,255,.03)",
              textAlign:"center",
              fontSize:"10px",
              color:"#4B5563"
            }}
          >
            AI Only Dashboard
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
