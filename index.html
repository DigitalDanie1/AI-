// ── Manual Price Update ──
function ManualUpdate({stocks,applyUpdates}){
  const[editTicker,setEditTicker]=useState("");
  const[editPrice,setEditPrice]=useState("");
  const[editChange,setEditChange]=useState("");
  const[msg,setMsg]=useState("");
  const apply=()=>{
    if(!editTicker){setMsg("티커를 입력하세요");return}
    const t=editTicker.toUpperCase();
    if(!stocks.some(s=>s.t===t)){setMsg(`${t} 종목 없음`);return}
    const patch={};
    if(editPrice!=="")patch.p=parseFloat(editPrice);
    if(editChange!=="")patch.ch=parseFloat(editChange);
    applyUpdates({[t]:patch});
    setMsg(`${t} 적용 완료`);
    setEditTicker("");setEditPrice("");setEditChange("");
    setTimeout(()=>setMsg(""),2500);
  };
  const bulkRef=useRef(null);
  const bulkApply=()=>{
    const text=bulkRef.current?.value;if(!text){setMsg("붙여넣을 데이터가 없습니다");return}
    const lines=text.trim().split("\n");
    const updates={};let count=0;
    lines.forEach(line=>{
      const parts=line.split(/[\t,]+/).map(s=>s.trim());
      if(parts.length>=2){
        const t=parts[0].toUpperCase().replace("$","");
        const p=parseFloat(parts[1]);
        const ch=parts[2]?parseFloat(parts[2]):null;
        if(stocks.some(s=>s.t===t)&&!isNaN(p)){
          updates[t]={p,...(ch!==null&&!isNaN(ch)?{ch}:{})};
          count++;
        }
      }
    });
    if(count===0){setMsg("유효한 행이 없습니다");return}
    applyUpdates(updates);
    setMsg(`${count}개 종목 갱신`);
    bulkRef.current.value="";
    setTimeout(()=>setMsg(""),2500);
  };
  return <div style={{borderTop:"1px solid rgba(0,229,255,0.08)",paddingTop:"12px",marginTop:"12px"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}}>
      <div style={{fontSize:"12px",color:"#F472B6",fontWeight:700}}>✏️ 수동 가격 업데이트 <span style={{color:"#6B7280",fontWeight:400,fontSize:"10px"}}>(KRX·Finnhub 미지원 종목용)</span></div>
      {msg&&<span style={{fontSize:"11px",color:"#00E5A0",fontFamily:"monospace"}}>{msg}</span>}
    </div>
    <div style={{display:"flex",gap:"6px",alignItems:"center",flexWrap:"wrap",marginBottom:"10px"}}>
      <input value={editTicker} onChange={e=>setEditTicker(e.target.value.toUpperCase())} placeholder="티커 (예: NVDA)" style={{padding:"6px 10px",borderRadius:"6px",border:"1px solid rgba(244,114,182,0.2)",background:"rgba(0,0,0,0.3)",color:"#E5E7EB",fontSize:"12px",width:"130px",outline:"none"}}/>
      <input value={editPrice} onChange={e=>setEditPrice(e.target.value)} placeholder="가격" type="number" step="0.01" style={{padding:"6px 10px",borderRadius:"6px",border:"1px solid rgba(244,114,182,0.2)",background:"rgba(0,0,0,0.3)",color:"#E5E7EB",fontSize:"12px",width:"100px",outline:"none"}}/>
      <input value={editChange} onChange={e=>setEditChange(e.target.value)} placeholder="등락%" type="number" step="0.01" style={{padding:"6px 10px",borderRadius:"6px",border:"1px solid rgba(244,114,182,0.2)",background:"rgba(0,0,0,0.3)",color:"#E5E7EB",fontSize:"12px",width:"90px",outline:"none"}}/>
      <button onClick={apply} style={{padding:"6px 14px",borderRadius:"6px",background:"#F472B6",color:"#000",fontSize:"12px",fontWeight:700,cursor:"pointer",border:"none"}}>적용</button>
    </div>
    <div style={{fontSize:"11px",color:"#6B7280",marginBottom:"6px"}}>일괄 입력 (한 줄에: 티커, 가격, 등락% · CSV/TSV OK)</div>
    <div style={{display:"flex",gap:"6px",alignItems:"flex-start"}}>
      <textarea ref={bulkRef} placeholder={"NVDA, 205.30, 2.5\nINTC, 70.12, -1.2\n047040, 23.80, 1.5"} rows={4} style={{flex:1,padding:"8px 10px",borderRadius:"6px",border:"1px solid rgba(244,114,182,0.15)",background:"rgba(0,0,0,0.3)",color:"#E5E7EB",fontSize:"11px",outline:"none",fontFamily:"monospace",resize:"vertical"}}/>
      <button onClick={bulkApply} style={{padding:"8px 14px",borderRadius:"6px",background:"#F472B6",color:"#000",fontSize:"12px",fontWeight:700,cursor:"pointer",border:"none",height:"fit-content"}}>일괄 적용</button>
    </div>
  </div>;
}
// ── Main App ──
function App(){
  const[tab,setTab]=useState("nuclear");
  const[sort,setSort]=useState("default");
  const[q,setQ]=useState("");
  const[apiKey,setApiKey]=useState(()=>localStorage.getItem("fh_key")||"");
  const[showSettings,setShowSettings]=useState(false);
  const[keyInput,setKeyInput]=useState(apiKey);
  // Load persisted overrides on mount
  const[stocks,setStocks]=useState(()=>{
    try{
      const saved=JSON.parse(localStorage.getItem("px_overrides")||"{}");
      return initS.map(s=>saved[s.t]?{...s,...saved[s.t]}:s);
    }catch{return initS}
  });
  const[fetching,setFetching]=useState(false);
  const[lastUpdate,setLastUpdate]=useState(()=>localStorage.getItem("px_lastUpdate")||null);
  const timerRef=useRef(null);
  const stocksRef=useRef(stocks);
  useEffect(()=>{stocksRef.current=stocks},[stocks]);
  const sec=SM[tab];const isSpecial=["heatmap","matrix","perf","sa","snap","news"].includes(tab);
  const ss=stocks.filter(s=>s.sec===tab);
  const SO=[{k:"default",l:"기본"},{k:"change",l:"등락률"},{k:"ytd",l:"YTD"},{k:"targetUpside",l:"상승여력"},{k:"rsi",l:"RSI"},{k:"mcap",l:"시총"}];
  // Persist overrides helper
  const saveOverrides=useCallback((updatedStocks)=>{
    const overrides={};
    updatedStocks.forEach(s=>{
      const base=initS.find(b=>b.t===s.t);
      if(base&&(s.p!==base.p||s.ch!==base.ch)){overrides[s.t]={p:s.p,ch:s.ch}}
    });
    localStorage.setItem("px_overrides",JSON.stringify(overrides));
  },[]);
  const applyUpdates=useCallback((patches)=>{
    setStocks(prev=>{
      const next=prev.map(s=>patches[s.t]?{...s,...patches[s.t]}:s);
      saveOverrides(next);
      return next;
    });
    const ts=new Date().toLocaleTimeString("ko");
    setLastUpdate("수동 "+ts);
    localStorage.setItem("px_lastUpdate","수동 "+ts);
  },[saveOverrides]);
  // Fetch live prices (uses stocksRef — no interval-reset loop)
  const fetchAll=useCallback(async()=>{
    if(!apiKey)return;
    setFetching(true);
    const current=stocksRef.current;
    const patches={};
    let reqCount=0;
    for(let i=0;i<current.length;i++){
      const s=current[i];
      if(s.r==="ETF")continue;
      if(SKIP_FETCH.has(s.t))continue;
      const quote=await fhQuote(s.t,apiKey);
      if(quote&&quote.price>0){patches[s.t]={p:quote.price,ch:quote.changePct||0}}
      reqCount++;
      if(reqCount%50===0)await delay(61000); // Finnhub free: 60 req/min
    }
    if(Object.keys(patches).length){
      setStocks(prev=>{
        const next=prev.map(s=>patches[s.t]?{...s,...patches[s.t]}:s);
        saveOverrides(next);
        return next;
      });
    }
    const ts=new Date().toLocaleTimeString("ko");
    setLastUpdate(ts);
    localStorage.setItem("px_lastUpdate",ts);
    setFetching(false);
  },[apiKey,saveOverrides]);
  useEffect(()=>{
    if(apiKey){fetchAll();timerRef.current=setInterval(fetchAll,5*60*1000)}
    return()=>{if(timerRef.current)clearInterval(timerRef.current)};
  },[apiKey,fetchAll]);
  const resetOverrides=()=>{
    if(!confirm("수동 편집한 가격을 초기화할까요?"))return;
    localStorage.removeItem("px_overrides");
    setStocks(initS);
    setLastUpdate(null);
    localStorage.removeItem("px_lastUpdate");
  };
  const saveKey=()=>{localStorage.setItem("fh_key",keyInput);setApiKey(keyInput)};
  const clearKey=()=>{localStorage.removeItem("fh_key");setApiKey("");setKeyInput("")};
  const fs=useMemo(()=>{
    let st=[...ss];
    if(q){const ql=q.toLowerCase();st=st.filter(s=>s.t.toLowerCase().includes(ql)||s.n.toLowerCase().includes(ql))}
    if(sort==="change")st.sort((a,b)=>b.ch-a.ch);else if(sort==="ytd")st.sort((a,b)=>b.ytd-a.ytd);else if(sort==="targetUpside")st.sort((a,b)=>b.tu-a.tu);else if(sort==="rsi")st.sort((a,b)=>b.rsi-a.rsi);else if(sort==="mcap")st.sort((a,b)=>parseMcap(b.mc)-parseMcap(a.mc));
    return st;
  },[tab,sort,q,stocks]);
  const dateStr=new Date().toLocaleDateString("ko",{year:"numeric",month:"2-digit",day:"2-digit"});
  return <div style={{minHeight:"100vh",background:"#080A0F",color:"#E5E7EB",fontFamily:"'Inter',system-ui,sans-serif"}}>
    {/* Header */}
    <div style={{padding:"20px 20px 10px",borderBottom:"1px solid rgba(255,255,255,.04)",display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:"12px"}}>
      <div>
        <div style={{display:"flex",alignItems:"center",gap:"7px",marginBottom:"3px",flexWrap:"wrap"}}>
          <div style={{width:"7px",height:"7px",borderRadius:"50%",background:sec.color,animation:"pl 2s infinite",boxShadow:`0 0 8px ${sec.color}50`}}/>
          <span style={{fontSize:"11px",color:"#6B7280",textTransform:"uppercase",letterSpacing:"1.5px",fontWeight:600}}>AI Only</span>
          {fetching&&<span className="spinner"/>}
          {lastUpdate&&<span style={{fontSize:"10px",color:"#4B5563"}}>· 갱신 {lastUpdate}</span>}
        </div>
        <h1 style={{fontSize:"24px",fontWeight:800,margin:"5px 0 3px",background:`linear-gradient(135deg,${sec.color},#fff,${sec.color})`,backgroundSize:"200% 200%",animation:"gl 4s ease infinite",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>AI 섹터 종합 대시보드</h1>
        <p style={{fontSize:"13px",color:"#6B7280"}}>{stocks.length}종목 · 11탭 · {dateStr}</p>
      </div>
      <div style={{display:"flex",gap:"8px",alignItems:"center"}}>
        <button onClick={fetchAll} disabled={fetching||!apiKey} title={apiKey?"Finnhub 전체 갱신":"API 키를 먼저 입력하세요"} style={{padding:"8px 16px",borderRadius:"8px",border:"1px solid rgba(0,229,255,0.3)",background:apiKey?"rgba(0,229,255,0.12)":"rgba(255,255,255,0.04)",color:apiKey?"#00E5FF":"#4B5563",fontSize:"13px",fontWeight:700,cursor:apiKey?"pointer":"not-allowed",outline:"none"}}>{fetching?"⏳ 갱신중...":"↻ 전체 업데이트"}</button>
        <button onClick={()=>setShowSettings(!showSettings)} style={{padding:"8px 12px",borderRadius:"8px",border:"1px solid rgba(255,255,255,0.08)",background:showSettings?"rgba(0,229,255,0.1)":"rgba(255,255,255,0.04)",color:"#9CA3AF",fontSize:"12px",cursor:"pointer",outline:"none"}}>⚙️</button>
      </div>
    </div>
    {/* Settings */}
    {showSettings&&<div style={{padding:"14px 20px",background:"rgba(0,229,255,0.04)",borderBottom:"1px solid rgba(0,229,255,0.1)",animation:"fi .2s ease"}}>
      <div style={{display:"flex",gap:"8px",alignItems:"center",flexWrap:"wrap"}}>
        <span style={{fontSize:"12px",color:"#00E5FF",fontWeight:600}}>Finnhub API Key:</span>
        <input value={keyInput} onChange={e=>setKeyInput(e.target.value)} type="password" placeholder="cxxxxxxxxxx" style={{padding:"6px 10px",borderRadius:"6px",border:"1px solid rgba(0,229,255,0.2)",background:"rgba(0,0,0,0.3)",color:"#E5E7EB",fontSize:"12px",width:"260px",outline:"none"}}/>
        <button onClick={saveKey} style={{padding:"6px 14px",borderRadius:"6px",background:"#00E5FF",color:"#000",fontSize:"12px",fontWeight:700,cursor:"pointer",border:"none"}}>저장</button>
        {apiKey&&<button onClick={clearKey} style={{padding:"6px 10px",borderRadius:"6px",background:"rgba(255,107,107,0.12)",color:"#FF6B6B",fontSize:"11px",fontWeight:600,cursor:"pointer",border:"1px solid rgba(255,107,107,0.2)"}}>제거</button>}
        <button onClick={resetOverrides} style={{padding:"6px 10px",borderRadius:"6px",background:"rgba(244,114,182,0.08)",color:"#F472B6",fontSize:"11px",fontWeight:600,cursor:"pointer",border:"1px solid rgba(244,114,182,0.2)",marginLeft:"auto"}}>가격 초기화</button>
        <span style={{fontSize:"10px",color:"#6B7280"}}>무료: <a href="https://finnhub.io/register" target="_blank" style={{color:"#00E5FF"}}>finnhub.io</a></span>
      </div>
      <ManualUpdate stocks={stocks} applyUpdates={applyUpdates}/>
    </div>}
    <WinnersBar stocks={stocks}/>
    {/* Tabs */}
    <div style={{display:"flex",gap:"2px",padding:"8px 20px",overflowX:"auto",borderBottom:"1px solid rgba(255,255,255,.03)"}}>
      {Object.entries(SM).map(([k,s])=>{const a=k===tab;
        return <button key={k} onClick={()=>{setTab(k);setSort("default");setQ("")}} style={{display:"flex",alignItems:"center",gap:"4px",padding:"7px 12px",borderRadius:"8px",border:a?`1px solid ${s.color}40`:"1px solid transparent",background:a?s.cd:"transparent",color:a?s.color:"#6B7280",fontSize:"12px",fontWeight:a?700:500,cursor:"pointer",whiteSpace:"nowrap",outline:"none"}}><span style={{fontSize:"14px"}}>{s.icon}</span>{s.label}</button>})}
    </div>
    {/* Content */}
    <div style={{padding:"14px 20px"}}>
      <p style={{fontSize:"13px",color:"#9CA3AF",marginBottom:"12px"}}><span style={{color:sec.color,fontWeight:700}}>{sec.icon} {sec.label}</span> — {sec.desc}</p>
      {tab==="heatmap"?<HeatmapView stocks={stocks}/>
      :tab==="matrix"?<MatrixView stocks={stocks}/>
      :tab==="perf"?<PerfView stocks={stocks}/>
      :tab==="sa"?<SAView/>
      :tab==="snap"?<SnapView stocks={stocks}/>
      :tab==="news"?<NewsView apiKey={apiKey}/>
      :<>
        <div style={{display:"flex",gap:"6px",flexWrap:"wrap",marginBottom:"16px"}}>
          <div style={{flex:"1 1 160px",position:"relative"}}>
            <input type="text" placeholder="검색..." value={q} onChange={e=>setQ(e.target.value)} style={{width:"100%",padding:"8px 10px 8px 30px",borderRadius:"8px",border:"1px solid rgba(255,255,255,.07)",background:"rgba(255,255,255,.025)",color:"#E5E7EB",fontSize:"13px",outline:"none"}}/>
            <span style={{position:"absolute",left:"9px",top:"50%",transform:"translateY(-50%)",fontSize:"12px",opacity:.3}}>🔍</span>
          </div>
          <div style={{display:"flex",gap:"2px",flexWrap:"wrap"}}>
            {SO.map(o=><button key={o.k} onClick={()=>setSort(o.k)} style={{padding:"6px 10px",borderRadius:"7px",border:sort===o.k?`1px solid ${sec.color}30`:"1px solid rgba(255,255,255,.05)",background:sort===o.k?sec.cd:"transparent",color:sort===o.k?sec.color:"#6B7280",fontSize:"11px",fontWeight:600,cursor:"pointer",outline:"none"}}>{o.l}</button>)}
          </div>
        </div>
        <Summ stocks={fs} color={sec.color}/>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(340px,1fr))",gap:"12px"}}>
          {fs.map((s,i)=><Card key={s.t} s={s} sc={sec.color} i={i}/>)}
        </div>
      </>}
    </div>
    <div style={{padding:"14px 20px",borderTop:"1px solid rgba(255,255,255,.03)",textAlign:"center",fontSize:"10px",color:"#4B5563"}}>{dateStr} · 투자 조언 아님</div>
  </div>;
}
ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
