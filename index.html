<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Sector Stocks Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: #080A0F;
      color: #E5E7EB;
      font-family: 'Inter', system-ui, sans-serif;
    }
    button, input { font-family: inherit; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    @keyframes gradShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .app {
      min-height: 100vh;
      background: #080A0F;
    }

    .header {
      padding: 28px 24px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      background: linear-gradient(180deg, rgba(255,255,255,0.015) 0%, transparent 100%);
    }

    .header-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .pulse-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    .eyebrow {
      font-size: 10px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 600;
    }

    .title {
      font-size: 24px;
      font-weight: 800;
      margin: 4px 0;
      background-size: 200% 200%;
      animation: gradShift 5s ease infinite;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 12px;
      color: #555;
      margin: 0;
    }

    .tabs {
      display: flex;
      gap: 3px;
      padding: 12px 24px;
      overflow-x: auto;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }

    .tab-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 9px;
      border: 1px solid transparent;
      background: transparent;
      color: #555;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s ease;
    }

    .tab-count {
      font-size: 10px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      padding: 1px 6px;
      border-radius: 5px;
      background: rgba(255,255,255,0.04);
    }

    .controls {
      padding: 16px 24px;
    }

    .sector-desc {
      font-size: 12px;
      color: #7A7F88;
      margin-bottom: 12px;
      line-height: 1.6;
    }

    .controls-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-wrap {
      flex: 1 1 180px;
      position: relative;
    }

    .search-input {
      width: 100%;
      padding: 8px 12px 8px 30px;
      border-radius: 9px;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.025);
      color: #E5E7EB;
      font-size: 12px;
      outline: none;
    }

    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 13px;
      opacity: 0.3;
    }

    .sort-buttons {
      display: flex;
      gap: 3px;
      flex-wrap: wrap;
    }

    .sort-btn {
      padding: 6px 10px;
      border-radius: 7px;
      font-size: 10px;
      font-weight: 600;
      border: 1px solid rgba(255,255,255,0.05);
      background: transparent;
      color: #555;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .stats-wrap {
      padding: 0 24px;
    }

    .stats-grid {
      display: grid;
      gap: 1px;
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .stat-card {
      background: #0A0C12;
      padding: 14px 10px;
      text-align: center;
    }

    .stat-label {
      font-size: 9px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 5px;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 800;
      font-family: 'JetBrains Mono', monospace;
    }

    .stat-sub {
      font-size: 10px;
      color: #555;
      margin-top: 2px;
    }

    .grid {
      padding: 0 24px 32px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 14px;
    }

    .card {
      background: rgba(255,255,255,0.015);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 14px;
      padding: 18px;
      transition: all 0.25s ease;
      animation: fadeIn 0.4s ease both;
    }

    .card:hover {
      transform: translateY(-2px);
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
      gap: 10px;
    }

    .ticker-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 2px;
      flex-wrap: wrap;
    }

    .ticker {
      font-size: 17px;
      font-weight: 800;
      color: #F0F0F0;
      font-family: 'JetBrains Mono', monospace;
    }

    .company {
      font-size: 11px;
      color: #7A7F88;
      font-weight: 500;
    }

    .badge {
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    .price-box {
      text-align: right;
    }

    .price {
      font-size: 16px;
      font-weight: 700;
      color: #E5E7EB;
      font-family: 'JetBrains Mono', monospace;
    }

    .daychg {
      font-size: 11px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
    }

    .sub-tag {
      display: inline-block;
      margin-bottom: 12px;
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 10px;
      font-weight: 600;
    }

    .metric {
      margin-bottom: 5px;
    }

    .metric-row {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: #6B7280;
      margin-bottom: 2px;
    }

    .metric-value {
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
    }

    .metric-track {
      height: 3px;
      background: rgba(255,255,255,0.04);
      border-radius: 2px;
      overflow: hidden;
    }

    .metric-fill {
      height: 100%;
      border-radius: 2px;
    }

    .analyst-row {
      display: flex;
      align-items: center;
      gap: 5px;
      margin: 8px 0;
    }

    .analyst-label {
      font-size: 9px;
      color: #555;
      white-space: nowrap;
    }

    .analyst-bars {
      flex: 1;
      display: flex;
      gap: 1.5px;
    }

    .analyst-bar {
      flex: 1;
      height: 5px;
      border-radius: 2px;
      background: rgba(255,255,255,0.04);
    }

    .analyst-num {
      font-size: 10px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
    }

    .catalyst {
      font-size: 11px;
      color: #8A8F98;
      line-height: 1.5;
      padding: 8px 10px;
      background: rgba(255,255,255,0.015);
      border-radius: 8px;
    }

    .catalyst-label {
      font-weight: 700;
      font-size: 8px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 50px;
      color: #555;
      font-size: 13px;
    }

    @media (max-width: 640px) {
      .header, .tabs, .controls, .stats-wrap, .grid { padding-left: 16px; padding-right: 16px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="header-top">
        <div class="pulse-dot" id="pulseDot"></div>
        <span class="eyebrow">Market Intelligence · April 17, 2026</span>
      </div>
      <h1 class="title" id="title">AI Sector Stocks Dashboard</h1>

    </div>

    <div class="tabs" id="tabs"></div>

    <div class="controls">
      <p class="sector-desc" id="sectorDesc"></p>
      <div class="controls-row">
        <div class="search-wrap">
          <input id="searchInput" class="search-input" type="text" placeholder="Search ticker / name..." />
          <span class="search-icon">🔍</span>
        </div>
        <div class="sort-buttons" id="sortButtons"></div>
      </div>
    </div>

    <div class="stats-wrap">
      <div class="stats-grid" id="statsGrid"></div>
    </div>

    <div class="grid" id="grid"></div>
  </div>

          { ticker: "NBIS", name: "Nebius Group", sub: "GPU Cloud", price: 165.26, dayChg: -0.91, rating: "Buy", analysts: 70, targetUpside: 45, revGrowth: 830, epsGrowth: 0, catalyst: "AI cloud growth" },

          { ticker: "BTDR", name: "Bitdeer Technologies", sub: "Compute / Mining", price: null, dayChg: null, rating: "Buy", analysts: 0, targetUpside: 0, revGrowth: 0, epsGrowth: 0, catalyst: "Added from holdings list" },
          { ticker: "CLSK", name: "CleanSpark", sub: "Compute / Energy", price: null, dayChg: null, rating: "Buy", analysts: 0, targetUpside: 0, revGrowth: 0, epsGrowth: 0, catalyst: "Added from holdings list" },
          { ticker: "SNDK", name: "Sandisk", sub: "Storage", price: null, dayChg: null, rating: "Buy", analysts: 0, targetUpside: 0, revGrowth: 0, epsGrowth: 0, catalyst: "Added from holdings list" },
          { ticker: "WYFI", name: "WYFI", sub: "Technology", price: null, dayChg: null, rating: "Buy", analysts: 0, targetUpside: 0, revGrowth: 0, epsGrowth: 0, catalyst: "Added from holdings list" },
          { ticker: "KEEL", name: "KEEL", sub: "Technology", price: null, dayChg: null, rating: "Buy", analysts: 0, targetUpside: 0, revGrowth: 0, epsGrowth: 0, catalyst: "Added from holdings list" },
          { ticker: "INFY", name: "Infosys", sub: "IT Services", price: null, dayChg: null, rating: "Hold", analysts: 0, targetUpside: 0, revGrowth: 0, epsGrowth: 0, catalyst: "Added from holdings list" }

      }
    };

    const SORT_OPTIONS = [
      { key: "default", label: "Default" },
      { key: "dayChg", label: "Day %" },
      { key: "targetUpside", label: "Upside" },
      { key: "epsGrowth", label: "EPS Grw" },
      { key: "revGrowth", label: "Rev Grw" },
      { key: "analysts", label: "Analyst" }
    ];

    let currentTab = "nuclear";
    let currentSort = "default";
    let currentSearch = "";

    const tabsEl = document.getElementById("tabs");
    const gridEl = document.getElementById("grid");
    const statsGridEl = document.getElementById("statsGrid");
    const searchInputEl = document.getElementById("searchInput");
    const sortButtonsEl = document.getElementById("sortButtons");
    const sectorDescEl = document.getElementById("sectorDesc");
    const subtitleEl = document.getElementById("subtitle");
    const titleEl = document.getElementById("title");
    const pulseDotEl = document.getElementById("pulseDot");

    function totalStocks() {
      return Object.values(SECTORS).reduce((acc, s) => acc + s.stocks.length, 0);
    }

    function getSector() {
      return SECTORS[currentTab];
    }

    function getFilteredStocks() {
      const sector = getSector();
      let stocks = [...sector.stocks];

      if (currentSearch) {
        const q = currentSearch.toLowerCase();
        stocks = stocks.filter(x =>
          x.ticker.toLowerCase().includes(q) ||
          x.name.toLowerCase().includes(q) ||
          x.sub.toLowerCase().includes(q)
        );
      }

      if (currentSort !== "default") {
        stocks.sort((a, b) => {
          const av = a[currentSort] ?? -999;
          const bv = b[currentSort] ?? -999;
          return bv - av;
        });
      }

      return stocks;
    }

    function getBadgeStyle(rating) {
      const isStrong = rating.includes("Strong");
      const isEtf = rating === "ETF";
      const bg = isEtf
        ? "rgba(120,120,140,0.15)"
        : isStrong
        ? "rgba(0,229,160,0.18)"
        : rating === "Buy"
        ? "rgba(0,229,160,0.10)"
        : "rgba(255,200,50,0.10)";
      const color = isEtf
        ? "#9CA3AF"
        : isStrong
        ? "#00E5A0"
        : rating === "Buy"
        ? "#5EDFB0"
        : "#E5C84C";

      return { bg, color };
    }

    function metricBar(label, value, max, color, suffix = "%") {
      const pct = Math.min(Math.max((value / max) * 100, 0), 100);
      const display = value > 0 ? `+${value}${suffix}` : "—";
      const valueColor = value > 0 ? color : "#555";

      return `
        <div class="metric">
          <div class="metric-row">
            <span>${label}</span>
            <span class="metric-value" style="color:${valueColor}">${display}</span>
          </div>
          <div class="metric-track">
            <div class="metric-fill" style="width:${pct}%; background:linear-gradient(90deg, ${color}66, ${color})"></div>
          </div>
        </div>
      `;
    }

    function renderHeader() {
      const sector = getSector();
      subtitleEl.textContent = `${totalStocks()} stocks across sectors`;
      sectorDescEl.innerHTML = `<span style="color:${sector.color};font-weight:700">${sector.icon} ${sector.label}</span> — ${sector.description}`;
      titleEl.style.backgroundImage = `linear-gradient(135deg, ${sector.color}, #E5E7EB, ${sector.color})`;
      pulseDotEl.style.background = sector.color;
      pulseDotEl.style.boxShadow = `0 0 10px ${sector.color}50`;
    }

    function renderTabs() {
      tabsEl.innerHTML = Object.entries(SECTORS).map(([key, sector]) => {
        const active = key === currentTab;
        return `
          <button
            class="tab-btn"
            data-tab="${key}"
            style="
              border:${active ? `1px solid ${sector.color}40` : "1px solid transparent"};
              background:${active ? sector.colorDim : "transparent"};
              color:${active ? sector.color : "#555"};
              font-weight:${active ? 700 : 500};
            "
          >
            <span style="font-size:14px">${sector.icon}</span>
            <span>${sector.label}</span>
            <span class="tab-count" style="background:${active ? sector.color + "20" : "rgba(255,255,255,0.04)"}">${sector.stocks.length}</span>
          </button>
        `;
      }).join("");

      tabsEl.querySelectorAll("[data-tab]").forEach(btn => {
        btn.addEventListener("click", () => {
          currentTab = btn.dataset.tab;
          currentSort = "default";
          currentSearch = "";
          searchInputEl.value = "";
          renderAll();
        });
      });
    }

    function renderSortButtons() {
      const sector = getSector();

      sortButtonsEl.innerHTML = SORT_OPTIONS.map(opt => {
        const active = opt.key === currentSort;
        return `
          <button
            class="sort-btn"
            data-sort="${opt.key}"
            style="
              border:${active ? `1px solid ${sector.color}35` : "1px solid rgba(255,255,255,0.05)"};
              background:${active ? sector.colorDim : "transparent"};
              color:${active ? sector.color : "#555"};
            "
          >
            ${opt.label}
          </button>
        `;
      }).join("");

      sortButtonsEl.querySelectorAll("[data-sort]").forEach(btn => {
        btn.addEventListener("click", () => {
          currentSort = btn.dataset.sort;
          renderAll();
        });
      });
    }

    function renderStats() {
      const sector = getSector();
      const real = sector.stocks;
      const withPrice = sector.stocks.filter(s => s.price !== null);
      const avgUpside = real.length ? Math.round(real.reduce((a, s) => a + (s.targetUpside || 0), 0) / real.length) : 0;
      const avgAnalyst = real.length ? Math.round(real.reduce((a, s) => a + (s.analysts || 0), 0) / real.length) : 0;
      const topGrower = [...real].sort((a, b) => (b.revGrowth || 0) - (a.revGrowth || 0))[0];
      const gainers = withPrice.filter(s => s.dayChg > 0).length;
      const losers = withPrice.filter(s => s.dayChg < 0).length;

      const stats = [
        { label: "Avg Upside", value: `+${avgUpside}%`, sub: "consensus" },
        { label: "Analyst Score", value: `${avgAnalyst}`, sub: "/ 100" },
        { label: "Top Rev Grower", value: topGrower ? topGrower.ticker : "—", sub: topGrower ? `+${topGrower.revGrowth}%` : "" }
      ];

      if (withPrice.length > 0) {
        stats.push({ label: "Today", value: `${gainers}↑ ${losers}↓`, sub: `of ${withPrice.length}` });
      }

      statsGridEl.style.gridTemplateColumns = `repeat(${stats.length}, 1fr)`;
      statsGridEl.innerHTML = stats.map(stat => `
        <div class="stat-card">
          <div class="stat-label">${stat.label}</div>
          <div class="stat-value" style="color:${sector.color}">${stat.value}</div>
          ${stat.sub ? `<div class="stat-sub">${stat.sub}</div>` : ""}
        </div>
      `).join("");
    }

    function renderGrid() {
      const sector = getSector();
      const stocks = getFilteredStocks();

      if (!stocks.length) {
        gridEl.innerHTML = `<div class="empty">No stocks match "${currentSearch}"</div>`;
        return;
      }

      gridEl.innerHTML = stocks.map((stock, idx) => {
        const badge = getBadgeStyle(stock.rating);
        const hasPrice = stock.price !== null;

        return `
          <div class="card"
               style="animation-delay:${idx * 0.04}s"
               onmouseenter="this.style.borderColor='${sector.color}35';this.style.boxShadow='0 8px 24px ${sector.color}10';this.style.background='rgba(255,255,255,0.035)'"
               onmouseleave="this.style.borderColor='rgba(255,255,255,0.05)';this.style.boxShadow='none';this.style.background='rgba(255,255,255,0.015)'">
            <div class="card-head">
              <div>
                <div class="ticker-row">
                  <span class="ticker">${stock.ticker}</span>
                  <span class="badge" style="background:${badge.bg};color:${badge.color};border:1px solid ${badge.color}30">${stock.rating}</span>
                </div>
                <div class="company">${stock.name}</div>
              </div>

              ${hasPrice ? `
                <div class="price-box">
                  <div class="price">$${Number(stock.price).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</div>
                  <div class="daychg" style="color:${stock.dayChg >= 0 ? "#00E5A0" : "#FF6B6B"}">
                    ${stock.dayChg >= 0 ? "▲" : "▼"} ${Math.abs(stock.dayChg).toFixed(2)}%
                  </div>
                </div>
              ` : ``}
            </div>

            <div class="sub-tag" style="background:${sector.color}12;border:1px solid ${sector.color}25;color:${sector.color}">
              ${stock.sub}
            </div>

            ${metricBar("Target Upside", stock.targetUpside || 0, 80, sector.color)}
            ${metricBar("Rev Growth", stock.revGrowth || 0, 150, "#4ECDC4")}
            ${metricBar("EPS Growth", Math.min(stock.epsGrowth || 0, 200), 200, "#FFD93D", stock.epsGrowth > 200 ? "%+" : "%")}

            <div class="analyst-row">
              <span class="analyst-label">Analysts</span>
              <div class="analyst-bars">
                ${Array.from({ length: 10 }).map((_, i) => `
                  <div class="analyst-bar" style="background:${i < Math.round((stock.analysts || 0) / 10) ? sector.color : "rgba(255,255,255,0.04)"}"></div>
                `).join("")}
              </div>
              <span class="analyst-num" style="color:${sector.color}">${stock.analysts || 0}</span>
            </div>

            <div class="catalyst" style="border-left:2px solid ${sector.color}35">
              <span class="catalyst-label" style="color:${sector.color}">Catalyst</span>
              ${stock.catalyst}
            </div>
          </div>
        `;
      }).join("");
    }

    function renderAll() {
      renderHeader();
      renderTabs();
      renderSortButtons();
      renderStats();
      renderGrid();
    }

    searchInputEl.addEventListener("input", (e) => {
      currentSearch = e.target.value.trim().toLowerCase();
      renderGrid();
    });

    renderAll();
  </script>
</body>
</html>
