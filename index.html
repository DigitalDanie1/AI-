    .stat-card { background: #0A0C12; padding: 14px 10px; text-align: center; }
    .stat-label { font-size: 9px; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
    .stat-value { font-size: 18px; font-weight: 800; font-family: 'JetBrains Mono', monospace; }
    .stat-sub { font-size: 10px; color: #555; margin-top: 2px; }

    .grid { padding: 0 24px 32px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
    .card { background: rgba(255,255,255,0.015); border: 1px solid rgba(255,255,255,0.05); border-radius: 14px; padding: 18px; transition: all 0.25s ease; animation: fadeIn 0.4s ease both; }

    .card-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; gap: 10px; }

    .ticker { font-size: 17px; font-weight: 800; color: #F0F0F0; font-family: 'JetBrains Mono', monospace; }
    .company { font-size: 11px; color: #7A7F88; font-weight: 500; }
    .badge { padding: 2px 8px; border-radius: 6px; font-size: 9px; font-weight: 700; letter-spacing: 0.4px; text-transform: uppercase; }
    .price-box { text-align: right; }
    .price { font-size: 16px; font-weight: 700; color: #E5E7EB; font-family: 'JetBrains Mono', monospace; }
    .daychg { font-size: 11px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
    .sub-tag { display: inline-block; margin-bottom: 12px; border-radius: 6px; padding: 2px 8px; font-size: 10px; font-weight: 600; }

    .metric { margin-bottom: 5px; }

    .metric-value { font-weight: 600; font-family: 'JetBrains Mono', monospace; font-size: 10px; }

    const SORT_OPTIONS = [
      { key: "default", label: "Default" },
      { key: "dayChg", label: "Day %" },
      { key: "targetUpside", label: "Upside" },
      { key: "epsGrowth", label: "EPS Grw" },
      { key: "revGrowth", label: "Rev Grw" },
      { key: "analysts", label: "Analyst" }
    ];

    let currentTab = "situational";
    let currentSort = "default";
    let currentSearch = "";

    const tabsEl = document.getElementById("tabs");
    const gridEl = document.getElementById("grid");
    const statsGridEl = document.getElementById("statsGrid");
    const searchInputEl = document.getElementById("searchInput");
    const sortButtonsEl = document.getElementById("sortButtons");
    const sectorDescEl = document.getElementById("sectorDesc");
    const subtitleEl = document.getElementById("subtitle");
    const titleEl = document.getElementById("title");
    const pulseDotEl = document.getElementById("pulseDot");

    function totalStocks() {
      return Object.values(SECTORS).reduce((acc, s) => acc + s.stocks.length, 0);
    }

    function getSector() {
      return SECTORS[currentTab];
    }

    function getFilteredStocks() {
      const sector = getSector();
      let stocks = [...sector.stocks];

      if (currentSearch) {
        const q = currentSearch.toLowerCase();
        stocks = stocks.filter(x =>
          String(x.ticker).toLowerCase().includes(q) ||
          x.name.toLowerCase().includes(q) ||
          x.sub.toLowerCase().includes(q)
        );
      }

      if (currentSort !== "default") {
        stocks.sort((a, b) => {
          const av = a[currentSort] ?? -999;
          const bv = b[currentSort] ?? -999;
          return bv - av;
        });
      }

      return stocks;
    }

    function getBadgeStyle(rating) {
      const isStrong = String(rating).includes("Strong");
      const isEtf = rating === "ETF";
      const isSpec = rating === "Spec";
      const bg = isEtf
        ? "rgba(120,120,140,0.15)"
        : isStrong
        ? "rgba(0,229,160,0.18)"
        : isSpec
        ? "rgba(244,114,182,0.12)"
        : rating === "Buy"
        ? "rgba(0,229,160,0.10)"
        : "rgba(255,200,50,0.10)";
      const color = isEtf
        ? "#9CA3AF"
        : isStrong
        ? "#00E5A0"
        : isSpec
        ? "#F472B6"
        : rating === "Buy"
        ? "#5EDFB0"
        : "#E5C84C";

      return { bg, color };
    }

    function metricBar(label, value, max, color, suffix = "%") {
      const n = Number(value || 0);
      const pct = Math.min(Math.max((n / max) * 100, 0), 100);
      const display = n > 0 ? `+${n}${suffix}` : "—";
      const valueColor = n > 0 ? color : "#555";

      return `
        <div class="metric">
          <div class="metric-row">
            <span>${label}</span>
            <span class="metric-value" style="color:${valueColor}">${display}</span>
          </div>
          <div class="metric-track">
            <div class="metric-fill" style="width:${pct}%; background:linear-gradient(90deg, ${color}66, ${color})"></div>
          </div>
        </div>
      `;
    }

    function formatPrice(stock) {
      if (stock.price === null || stock.price === undefined) return "";
      const isKorea = currentTab === "korea";
      const n = Number(stock.price);
      return isKorea ? `₩${n.toLocaleString("ko-KR")}` : `$${n.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
    }

    function renderHeader() {
      const sector = getSector();
      subtitleEl.textContent = `${totalStocks()} stocks across ${Object.keys(SECTORS).length} sectors`;
      sectorDescEl.innerHTML = `<span style="color:${sector.color};font-weight:700">${sector.icon} ${sector.label}</span> — ${sector.description}`;
      titleEl.style.backgroundImage = `linear-gradient(135deg, ${sector.color}, #E5E7EB, ${sector.color})`;
      pulseDotEl.style.background = sector.color;
      pulseDotEl.style.boxShadow = `0 0 10px ${sector.color}50`;
    }

    function renderTabs() {
      tabsEl.innerHTML = Object.entries(SECTORS).map(([key, sector]) => {
        const active = key === currentTab;
        return `
          <button
            class="tab-btn"
            data-tab="${key}"
            style="
              border:${active ? `1px solid ${sector.color}40` : "1px solid transparent"};
              background:${active ? sector.colorDim : "transparent"};
              color:${active ? sector.color : "#555"};
              font-weight:${active ? 700 : 500};
            "
          >
            <span style="font-size:14px">${sector.icon}</span>
            <span>${sector.label}</span>
            <span class="tab-count" style="background:${active ? sector.color + "20" : "rgba(255,255,255,0.04)"}">${sector.stocks.length}</span>
          </button>
        `;
      }).join("");

      tabsEl.querySelectorAll("[data-tab]").forEach(btn => {
        btn.addEventListener("click", () => {
          currentTab = btn.dataset.tab;
          currentSort = "default";
          currentSearch = "";
          searchInputEl.value = "";
          renderAll();
        });
      });
    }

    function renderSortButtons() {
      const sector = getSector();

      sortButtonsEl.innerHTML = SORT_OPTIONS.map(opt => {
        const active = opt.key === currentSort;
        return `
          <button
            class="sort-btn"
            data-sort="${opt.key}"
            style="
              border:${active ? `1px solid ${sector.color}35` : "1px solid rgba(255,255,255,0.05)"};
              background:${active ? sector.colorDim : "transparent"};
              color:${active ? sector.color : "#555"};
            "
          >
            ${opt.label}
          </button>
        `;
      }).join("");

      sortButtonsEl.querySelectorAll("[data-sort]").forEach(btn => {
        btn.addEventListener("click", () => {
          currentSort = btn.dataset.sort;
          renderAll();
        });
      });
    }

    function renderStats() {
      const sector = getSector();
      const real = sector.stocks.filter(s => s.rating !== "ETF");
      const withPrice = sector.stocks.filter(s => s.price !== null && s.price !== undefined);
      const avgUpside = real.length ? Math.round(real.reduce((a, s) => a + Number(s.targetUpside || 0), 0) / real.length) : 0;
      const avgAnalyst = real.length ? Math.round(real.reduce((a, s) => a + Number(s.analysts || 0), 0) / real.length) : 0;
      const topGrower = [...real].sort((a, b) => Number(b.revGrowth || 0) - Number(a.revGrowth || 0))[0];
      const gainers = withPrice.filter(s => Number(s.dayChg) > 0).length;
      const losers = withPrice.filter(s => Number(s.dayChg) < 0).length;

      const stats = [
        { label: "Avg Upside", value: `+${avgUpside}%`, sub: "consensus" },
        { label: "Analyst Score", value: `${avgAnalyst}`, sub: "/ 100" },
        { label: "Top Rev Grower", value: topGrower ? topGrower.ticker : "—", sub: topGrower ? `+${topGrower.revGrowth}%` : "" }
      ];

      if (withPrice.length > 0) {
        stats.push({ label: "Today", value: `${gainers}↑ ${losers}↓`, sub: `of ${withPrice.length}` });
      }

      statsGridEl.style.gridTemplateColumns = `repeat(${stats.length}, 1fr)`;
      statsGridEl.innerHTML = stats.map(stat => `
        <div class="stat-card">
          <div class="stat-label">${stat.label}</div>
          <div class="stat-value" style="color:${sector.color}">${stat.value}</div>
          ${stat.sub ? `<div class="stat-sub">${stat.sub}</div>` : ""}
        </div>
      `).join("");
    }

    function renderGrid() {
      const sector = getSector();
      const stocks = getFilteredStocks();

      if (!stocks.length) {
        gridEl.innerHTML = `<div class="empty">No stocks match "${currentSearch}"</div>`;
        return;
      }

      gridEl.innerHTML = stocks.map((stock, idx) => {
        const badge = getBadgeStyle(stock.rating);
        const hasPrice = stock.price !== null && stock.price !== undefined;
        const chg = Number(stock.dayChg || 0);

        return `
          <div class="card"
               style="animation-delay:${idx * 0.04}s"
               onmouseenter="this.style.borderColor='${sector.color}35';this.style.boxShadow='0 8px 24px ${sector.color}10';this.style.background='rgba(255,255,255,0.035)'"
               onmouseleave="this.style.borderColor='rgba(255,255,255,0.05)';this.style.boxShadow='none';this.style.background='rgba(255,255,255,0.015)'">
            <div class="card-head">
              <div>
                <div class="ticker-row">
                  <span class="ticker">${stock.ticker}</span>
                  <span class="badge" style="background:${badge.bg};color:${badge.color};border:1px solid ${badge.color}30">${stock.rating}</span>
                </div>
                <div class="company">${stock.name}</div>
              </div>

              ${hasPrice ? `
                <div class="price-box">
                  <div class="price">${formatPrice(stock)}</div>
                  <div class="daychg" style="color:${chg >= 0 ? "#00E5A0" : "#FF6B6B"}">
                    ${chg >= 0 ? "▲" : "▼"} ${Math.abs(chg).toFixed(2)}%
                  </div>
                </div>
              ` : ``}
            </div>

            <div class="sub-tag" style="background:${sector.color}12;border:1px solid ${sector.color}25;color:${sector.color}">
              ${stock.sub}
            </div>

            ${stock.rating !== "ETF" ? `
              ${metricBar("Target Upside", stock.targetUpside || 0, 80, sector.color)}
              ${metricBar("Rev Growth", stock.revGrowth || 0, 150, "#4ECDC4")}
              ${metricBar("EPS Growth", Math.min(stock.epsGrowth || 0, 200), 200, "#FFD93D", (stock.epsGrowth || 0) > 200 ? "%+" : "%")}

              <div class="analyst-row">
                <span class="analyst-label">Analysts</span>
                <div class="analyst-bars">
                  ${Array.from({ length: 10 }).map((_, i) => `
                    <div class="analyst-bar" style="background:${i < Math.round((stock.analysts || 0) / 10) ? sector.color : "rgba(255,255,255,0.04)"}"></div>
                  `).join("")}
                </div>
                <span class="analyst-num" style="color:${sector.color}">${stock.analysts || 0}</span>
              </div>
            ` : ``}

            <div class="catalyst" style="border-left:2px solid ${sector.color}35">
              <span class="catalyst-label" style="color:${sector.color}">${stock.rating === "ETF" ? "ETF" : "Catalyst"}</span>
              ${stock.catalyst}
            </div>
          </div>
        `;
      }).join("");
    }

    function renderAll() {
      renderHeader();
      renderTabs();
      renderSortButtons();
      renderStats();
      renderGrid();
    }

    searchInputEl.addEventListener("input", (e) => {
      currentSearch = e.target.value.trim().toLowerCase();
      renderGrid();
    });

    renderAll();
  </script>
