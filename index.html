        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: center;
        padding: 8px 10px;
        border-bottom: 1px solid rgba(196,213,230,0.06);
        color: #BFD0E4;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: .08em;
        text-transform: uppercase;
      }
      .live-chart-link {
        color: #9CC4FF;
        font-size: 11px;
        font-weight: 800;
        text-decoration: none;
        letter-spacing: 0;
        text-transform: none;
      }
      .live-chart-frame {
        display: block;
        width: 100%;
        height: 220px;
        border: 0;
        background: #0b0f14;
      }
      .live-ticker-trigger {
        appearance: none;
        border: 0;
        background: transparent;
        padding: 0;
        margin: 0;
        color: inherit;
        font: inherit;
        text-align: inherit;
        cursor: pointer;
      }
      .live-ticker-trigger:hover {
        opacity: 0.92;
      }
      .live-ticker-trigger:focus-visible {
        outline: 2px solid rgba(156,196,255,0.7);
        outline-offset: 4px;
        border-radius: 10px;
      }
      .chart-modal {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: rgba(3, 7, 12, 0.76);
        backdrop-filter: blur(14px);
      }
      .chart-modal.is-open {
        display: flex;
      }
      .chart-modal-panel {
        width: min(1160px, 100%);
        height: min(82vh, 760px);
        border-radius: 24px;
        overflow: hidden;
        border: 1px solid rgba(196,213,230,0.14);
        background: linear-gradient(180deg, rgba(19,24,33,0.98), rgba(7,11,16,0.98));
        box-shadow: 0 24px 80px rgba(0,0,0,0.42);
      }
      .chart-modal-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 16px 18px;
        border-bottom: 1px solid rgba(196,213,230,0.08);
      }
      .chart-modal-kicker {
        font-size: 11px;
        letter-spacing: .1em;
        text-transform: uppercase;
        color: #8FA3BF;
        font-weight: 800;
      }
      .chart-modal-title {
        margin-top: 4px;
        font-size: 26px;
        font-weight: 800;
        color: #F8FBFF;
      }
      .chart-modal-actions {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .chart-modal-link,
      .chart-modal-close {
        appearance: none;
        border-radius: 999px;
        padding: 10px 14px;
        font-size: 13px;
        font-weight: 800;
        cursor: pointer;
        text-decoration: none;
      }
      .chart-modal-link {
        border: 1px solid rgba(156,196,255,0.24);
        background: rgba(96,165,250,0.12);
        color: #B8D6FF;
      }
      .chart-modal-close {
        border: 1px solid rgba(255,255,255,0.08);
        background: rgba(255,255,255,0.04);
        color: #E7EEF8;
      }
      .chart-modal-frame {
        display: block;
        width: 100%;
        height: calc(100% - 70px);
        border: 0;
        background: #0b0f14;
      }
      .report-forecast-panel {
        margin-top: 14px;
        padding: 18px;
        border-radius: 20px;
        border: 1px solid rgba(244,114,182,0.18);
        background:
          linear-gradient(180deg, rgba(244,114,182,0.075), rgba(255,255,255,0.018)),
          radial-gradient(circle at top right, rgba(244,114,182,0.14), transparent 32%);
      }
      .report-forecast-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: flex-start;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }
      .report-forecast-kicker {
        color: #F9A8D4;
        font-size: 11px;
        font-weight: 900;
        letter-spacing: .14em;
        text-transform: uppercase;
        margin-bottom: 6px;
      }
      .report-forecast-title {
        color: #F8FBFF;
        font-size: 22px;
        font-weight: 800;
        line-height: 1.2;
      }
      .report-forecast-meta {
        color: #FBCFE8;
        border: 1px solid rgba(244,114,182,0.20);
        background: rgba(244,114,182,0.10);
        border-radius: 999px;
        padding: 6px 10px;
        font-size: 12px;
        font-weight: 800;
      }
      .report-forecast-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }
      .report-forecast-card {
        padding: 13px;
        border-radius: 14px;
        border: 1px solid rgba(255,255,255,0.07);
        background: rgba(255,255,255,0.030);
      }
      .report-forecast-label {
        color: #F9A8D4;
        font-size: 12px;
        font-weight: 900;
        margin-bottom: 7px;
      }
      .report-forecast-copy {
        color: #DCE6F2;
        font-size: 14px;
        line-height: 1.62;
      }
      .forecast-mark {
        display: inline;
        padding: 1px 5px 2px;
        border-radius: 7px;
        font-size: 1.18em;
        font-weight: 950;
        text-decoration-line: underline;
        text-decoration-thickness: 2px;
        text-underline-offset: 3px;
      }
      .key-mark {
        display: inline;
        padding: 1px 5px 2px;
        border-radius: 7px;
        font-size: 1.14em;
        font-weight: 950;
        text-decoration-line: underline;
        text-decoration-thickness: 2px;
        text-underline-offset: 3px;
      }
      .key-mark.buy {
        color: #86EFAC;
        background: rgba(34,197,94,0.12);
        text-decoration-color: rgba(134,239,172,0.76);
      }
      .key-mark.warn {
        color: #FCA5A5;
        background: rgba(248,113,113,0.13);
        text-decoration-color: rgba(252,165,165,0.78);
      }
      .key-mark.wait {
        color: #FDE68A;
        background: rgba(245,158,11,0.13);
        text-decoration-color: rgba(253,230,138,0.78);
      }
      .key-mark.info {
        color: #BFDBFE;
        background: rgba(96,165,250,0.14);
        text-decoration-color: rgba(191,219,254,0.78);
      }
      .sector-summary-value,
      .market-metric-value,
      .bottoms-card-score {
        font-size: 1.16em;
        font-weight: 950;
        text-decoration-line: underline;
        text-decoration-thickness: 2px;
        text-underline-offset: 3px;
      }
      .bottoms-signal,
      .bottoms-card-metric,
      .card-action-chip {
        font-size: 1.02em;
        text-decoration-line: underline;
        text-decoration-thickness: 2px;
        text-underline-offset: 3px;
      }
      .forecast-mark.up {
        color: #86EFAC;
        background: rgba(34,197,94,0.12);
        text-decoration-color: rgba(134,239,172,0.72);
      }
      .forecast-mark.warn {
        color: #FCA5A5;
        background: rgba(248,113,113,0.13);
        text-decoration-color: rgba(252,165,165,0.78);
      }
      .forecast-mark.action {
        color: #FDE68A;
        background: rgba(245,158,11,0.13);
        text-decoration-color: rgba(253,230,138,0.78);
      }
      .forecast-mark.focus {
        color: #BFDBFE;
        background: rgba(96,165,250,0.14);
        text-decoration-color: rgba(191,219,254,0.78);
      }
      .live-controls {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 8px;
        padding-left: 12px;
      }
      .live-status {
        font-size: 12px;
        color: #8FA3BF;
        white-space: nowrap;
      }
      .live-status.is-live {
        color: #52E0C4;
      }
      .live-status.is-loading {
        color: #B8D6FF;
      }
      .live-control-btn {
        appearance: none;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,0.08);
        background: rgba(255,255,255,0.04);
        color: #DDE7F3;
        padding: 8px 12px;
        font-size: 12px;
        font-weight: 800;
        cursor: pointer;
        white-space: nowrap;
      }
      .live-control-btn.is-live {
        border-color: rgba(82,224,196,0.24);
        background: rgba(82,224,196,0.12);
        color: #52E0C4;
      }
      .live-control-btn:disabled {
        opacity: 0.6;
        cursor: wait;
      }
      article.panel .live-chart-wrap {
        margin-top: 14px;
        margin-bottom: 4px;
      }
      .bottoms-card-ticker .live-ticker-trigger,
      .performer-ticker .live-ticker-trigger,
      .portfolio-card-ticker .live-ticker-trigger {
        font-size: inherit;
        font-weight: inherit;
        letter-spacing: inherit;
      }
      @media (max-width: 900px) {
        .live-controls {
          width: 100%;
          padding-left: 0;
          justify-content: flex-end;
        }
      }
      .ai-refined {
        color-scheme: dark;
      }
      .ai-refined body {
        background:
          radial-gradient(circle at 0% 0%, rgba(96,165,250,0.10), transparent 24%),
          radial-gradient(circle at 100% 0%, rgba(20,184,166,0.10), transparent 22%),
          radial-gradient(circle at 50% 100%, rgba(249,115,22,0.05), transparent 28%),
          linear-gradient(180deg, #0a0f15 0%, #070b10 100%);
      }
      .ai-refined .panel {
        border-color: rgba(196,213,230,0.08);
        background: linear-gradient(180deg, rgba(14,19,27,0.92), rgba(10,14,20,0.96));
        box-shadow: 0 20px 48px rgba(0,0,0,0.26);
      }
      .ai-refined .tabs-shell {
        position: fixed !important;
        left: 0;
        top: 0;
        bottom: 0;
        width: 246px;
        z-index: 80;
        display: flex !important;
        flex-direction: column !important;
        align-items: stretch !important;
        gap: 8px !important;
        padding: 16px 12px !important;
        overflow-x: hidden !important;
        overflow-y: auto !important;
        background: rgba(7,10,15,0.88);
        border-right: 1px solid rgba(255,255,255,0.06);
        border-bottom: 0 !important;
        box-shadow: 18px 0 34px rgba(0,0,0,0.22);
      }
      .ai-refined .tabs-shell::before {
        content: "Views";
        display: block;
        padding: 2px 8px 6px;
        color: #8FA3BF;
        font-size: 11px;
        font-weight: 900;
        letter-spacing: .16em;
        text-transform: uppercase;
      }
      .ai-refined .tabs-shell > button {
        width: 100% !important;
        justify-content: flex-start !important;
        min-height: 46px;
      }
      .ai-refined .tabs-shell > button span:last-child {
        margin-left: auto !important;
      }
      .ai-refined #root {
        padding-left: 246px;
      }
      .ai-refined .hero-grid {
        padding-top: 20px;
      }
      .ai-refined .live-controls {
        width: 100%;
        margin-left: 0 !important;
        margin-top: auto;
        padding: 14px 4px 0 !important;
        border-top: 1px solid rgba(255,255,255,0.06);
        flex-direction: column;
        align-items: stretch;
      }
      .ai-refined .live-status {
        white-space: normal;
        line-height: 1.35;
        padding: 0 4px;
      }
      .ai-refined .live-control-btn {
        width: 100%;
        text-align: center;
      }
      .ai-refined .tabs-shell button[draggable="true"] {
        cursor: grab;
      }
      .ai-refined .tabs-shell button[draggable="true"]:active {
        cursor: grabbing;
      }
      .ai-refined .tabs-shell button.tab-dragging {
        opacity: .45;
        transform: scale(.98);
      }
      .ai-refined .tabs-shell button.tab-drag-over {
        outline: 1px dashed rgba(156,196,255,0.45);
        outline-offset: 2px;
      }
      .ai-refined .hero-grid {
        align-items: start;
      }
      .ai-refined .hero-grid > * {
        align-self: start;
      }
      @media (max-width: 640px) {
        .ai-refined #root {
          padding-left: 76px;
        }
        .ai-refined .tabs-shell {
          width: 76px;
          padding: 12px 8px !important;
        }
        .ai-refined .tabs-shell::before,
        .ai-refined .tabs-shell > button span:not(:first-child),
        .ai-refined .live-status,
        .ai-refined .live-control-btn:not([data-live-state]) {
          display: none !important;
        }
        .ai-refined .tabs-shell > button {
          justify-content: center !important;
          padding: 11px 8px !important;
          font-size: 0 !important;
        }
        .ai-refined .tabs-shell > button span:first-child {
          font-size: 18px !important;
        }
        .ai-refined .live-controls {
          padding-top: 10px !important;
        }
      }
      .ai-refined .pill,
      .ai-refined .panel-soft {
        background: rgba(255,255,255,0.024);
        border-color: rgba(196,213,230,0.07);
      }
      .ai-refined h1 {
        letter-spacing: -.035em;
      }
      .ai-refined input {
        background: rgba(255,255,255,0.035) !important;
        border-color: rgba(196,213,230,0.1) !important;
      }
      .ai-refined button {
        transition: background .18s ease,border-color .18s ease,color .18s ease,transform .18s ease;
      }
      .ai-refined button:hover {
        transform: translateY(-1px);
      }
      .ai-refined .sector-summary-card,
      .ai-refined .sector-breadth-card,
      .ai-refined .market-frame {
        border-color: rgba(196,213,230,0.08);
        background:
          linear-gradient(180deg, rgba(255,255,255,0.026), rgba(255,255,255,0.014)),
          radial-gradient(circle at top right, rgba(96,165,250,0.09), transparent 32%);
      }
      .ai-refined .sector-summary-title,
      .ai-refined .market-frame-title {
        color: #9cc4ff;
      }
      .ai-refined .sector-summary-item,
      .ai-refined .sector-breadth-item,
      .ai-refined .market-metric,
      .ai-refined .market-note-box {
        background: rgba(255,255,255,0.024);
        border-color: rgba(196,213,230,0.06);
      }
      .ai-refined .card-fact,
      .ai-refined .card-action-chip {
        background: rgba(255,255,255,0.03);
        border-color: rgba(196,213,230,0.08);
      }
      .ai-refined article.panel {
        overflow: hidden;
      }
      .ai-refined article.panel::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: linear-gradient(180deg, rgba(96,165,250,0.05), transparent 24%);
      }
      .ai-refined article.panel:hover {
        border-color: rgba(96,165,250,0.18);
        box-shadow: 0 24px 50px rgba(0,0,0,0.28);
      }
      .ai-refined .card-action-chip.buy {
        color: #8ce3c7;
      }
      .ai-refined .card-action-chip.watch {
        color: #f4d27e;
      }
      .ai-refined .card-action-chip.sell {
        color: #f1a3a3;
      }
      @media (max-width: 760px) {
        .sector-summary-card { margin-left: 14px; margin-right: 14px; }
        .sector-summary-line { font-size: 16px; }
        .sector-summary-grid { grid-template-columns: 1fr 1fr; }
        .sector-breadth-card { margin-left: 14px; margin-right: 14px; }
        .sector-breadth-grid { grid-template-columns: 1fr 1fr 1fr; }
        .market-frame { margin-left: 14px; margin-right: 14px; }
        .market-frame-grid { grid-template-columns: 1fr; }
        .market-metric-grid { grid-template-columns: 1fr 1fr; }
        .bottom-checklist { margin-left: 14px; margin-right: 14px; padding: 18px; }
        .bottom-checklist-grid { grid-template-columns: 1fr; }
        .bottom-checklist-title { font-size: 24px; }
        .bottoms-view { margin-left: 14px; margin-right: 14px; padding: 18px; }
        .bottoms-view-title { font-size: 24px; }
        .performers-view { margin-left: 14px; margin-right: 14px; padding: 18px; }
        .performers-view-title { font-size: 24px; }
        .portfolio-view { margin-left: 14px; margin-right: 14px; padding: 18px; }
        .portfolio-view-title { font-size: 24px; }
        .report-forecast-grid { grid-template-columns: 1fr; }
      }
    </style>

    <script>
      function classifyActionFromText(text) {
        const upper = (text || '').toUpperCase();
        const rsiMatch = upper.match(/RSI\s*(\d+)/);
        const ytdMatch = upper.match(/YTD\s*([+\-]?\d+(?:\.\d+)?)%/);
        const rsi = rsiMatch ? Number(rsiMatch[1]) : null;
        const ytd = ytdMatch ? Number(ytdMatch[1]) : null;

        if (upper.includes('STRONG BUY')) return rsi !== null && rsi >= 70 ? 'watch' : 'buy';
        if (upper.includes('BUY')) {
          if (rsi !== null && rsi >= 68) return 'watch';
          return 'buy';
        }
        if (upper.includes('HOLD')) {
          if ((rsi !== null && rsi <= 40) || (ytd !== null && ytd < -20)) return 'watch';
          return 'sell';
        }
        if (upper.includes('AVOID')) return 'sell';
        return 'watch';
      }

      function actionLabel(action) {
        if (action === 'buy') return '분할매수';
        if (action === 'sell') return '매도해';
        return '관찰';
      }

      function escapeHtml(text) {
        return String(text).replace(/[&<>"']/g, (ch) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
      }

      function emphasizeKeyText(text) {
        const rules = [
          [/분할매수|Buy Count|Strongest|당일 강도|주도|리더|기대수익률|업사이드|자금 유입|위험선호|강한 종목/g, 'buy'],
          [/리스크|주의|매도해|Weakest|약한 이름|낙오주|하락|과열|변동성|금리|밸류에이션|갭 리스크/g, 'warn'],
          [/관찰|기다림|눌림목|선별|타이밍|확인|보유|분리|현금 비중|진입가/g, 'wait'],
          [/AI 인프라|RSI|YTD|Score|Local bottom|Technical|Bollinger|Capitulation|ATH drawdown|ETF|CVD|Orderbook|Options/g, 'info'],
        ];
        let html = escapeHtml(text);
        rules.forEach(([pattern, cls]) => {
          html = html.replace(pattern, (match) => `<span class="key-mark ${cls}">${match}</span>`);
        });
        return html;
      }

      function buildSectorTake(line, items) {
        return `
          <div class="sector-summary-title">Sector Take</div>
          <div class="sector-summary-line">${emphasizeKeyText(line)}</div>
          <div class="sector-summary-grid">
            ${items.map((item) => `
              <div class="sector-summary-item">
                <div class="sector-summary-label">${item.label}</div>
                <div class="sector-summary-value">${emphasizeKeyText(item.value)}</div>
              </div>
            `).join('')}
          </div>
        `;
      }

      function injectCardActions() {
        const cards = Array.from(document.querySelectorAll('article.panel'));
        if (!cards.length) return false;
        cards.forEach((card) => {
          const existing = card.querySelector('.card-action-chip');
          if (existing) return;

          const header = Array.from(card.querySelectorAll('div')).find((el) => {
            return (el.style && el.style.display === 'flex' && el.style.justifyContent === 'space-between');
          });
          if (!header) return;

          const text = card.innerText || '';
          const action = classifyActionFromText(text);
          const chip = document.createElement('span');
          chip.className = `card-action-chip ${action}`;
          chip.textContent = actionLabel(action);

          const rightBox = header.lastElementChild;
          if (rightBox) {
            rightBox.prepend(chip);
          } else {
            header.appendChild(chip);
          }
        });
        return true;
      }

      function metricText(card, label) {
        const target = Array.from(card.querySelectorAll('div')).find((el) => {
          return (el.textContent || '').trim() === label;
        });
        if (!target || !target.parentElement) return null;
        const lines = target.parentElement.innerText.split('\n').map((v) => v.trim()).filter(Boolean);
        return lines[1] || null;
      }

      function regexMetric(text, pattern) {
        const match = text.match(pattern);
        return match ? match[1] : null;
      }

      function extractCardSnapshot(card) {
        const text = card.innerText || '';
        const lines = text.split('\n').map((v) => v.trim()).filter(Boolean);
        const tickerLine = lines.find((line) => /^[A-Z0-9]{2,8}$/.test(line)) || '';
        const ticker = tickerLine.replace(/[^A-Z0-9]/g, '');
        const action = classifyActionFromText(text);
        const ytd = Number(regexMetric(text, /YTD\s*([+\-]?\d+(?:\.\d+)?)%/i) || 0);
        const rsi = Number(regexMetric(text, /RSI\s*(\d+)/i) || 0);
        const upside = Number((metricText(card, 'Upside') || '0').replace('%', '')) || 0;
        const growth = Number((metricText(card, 'Growth') || '0').replace('%', '')) || 0;
        const analyst = Number(regexMetric(text, /Analyst\s+(\d+)/i) || 0);
        const changeText = Array.from(card.querySelectorAll('div')).find((el) => {
          return el.style && el.style.fontSize === '16px' && el.style.fontWeight === '700';
        });
        const daily = changeText ? parseFloat((changeText.textContent || '0').replace(/[^\d\.\-]/g, '')) || 0 : 0;
        return { ticker, action, ytd, rsi, upside, growth, analyst, daily, text };
      }

      function pickRelativeStrengthLeader(cards) {
        const parsed = cards.map(extractCardSnapshot).filter((item) => item.ticker);
        if (!parsed.length) return null;

        const preferred = parsed.filter((item) => item.ytd > 0 && item.daily >= 0 && item.rsi < 72);
        const pool = preferred.length ? preferred : parsed;

        return [...pool]
          .map((item) => {
            const heatPenalty = Math.max(item.rsi - 65, 0) * 1.5;
            const score = item.ytd + item.daily * 4 + item.upside * 0.2 + item.growth * 0.05 - heatPenalty;
            return { ...item, score };
          })
          .sort((a, b) => {
            if (b.score !== a.score) return b.score - a.score;
            if (b.ytd !== a.ytd) return b.ytd - a.ytd;
            return b.daily - a.daily;
          })[0];
      }

      function relabelTopIdea() {
        const cards = Array.from(document.querySelectorAll('.panel-soft'));
        cards.forEach((card) => {
          const eyebrow = Array.from(card.querySelectorAll('div')).find((el) => {
            return (el.textContent || '').trim() === 'Top Idea';
          });
          if (eyebrow) eyebrow.textContent = 'Top Setup';
        });
        return true;
      }

      function injectCardFactRows() {
        const cards = Array.from(document.querySelectorAll('article.panel'));
        if (!cards.length) return false;
        cards.forEach((card) => {
          if (card.querySelector('.card-fact-row')) return;

            return (el.style && el.style.fontSize === '16px' && el.style.color === 'rgb(175, 192, 212)');
          });
          if (!titleBlock) return;

          const text = card.innerText || '';
          const upside = metricText(card, 'Upside');
          const rsi = metricText(card, 'RSI');
          const growth = metricText(card, 'Growth');
          const analyst = regexMetric(text, /Analyst\s+(\d+)/i);
          const ytd = regexMetric(text, /YTD\s*([+\-]?\d+(?:\.\d+)?)%/i);

          const facts = [
            upside ? `Upside ${upside}` : null,
            rsi ? `RSI ${rsi}` : null,
            growth ? `Growth ${growth}` : null,
            analyst ? `Analyst ${analyst}` : null,
            ytd ? `YTD ${ytd}%` : null,
          ].filter(Boolean).slice(0, 4);

          if (!facts.length) return;

          const row = document.createElement('div');
          row.className = 'card-fact-row';
          row.innerHTML = facts.map((fact) => `<div class="card-fact">${fact}</div>`).join('');

        }
        if (snapshot.ytd <= -25) {
          signals.push({ key: 'drawdown', weight: 2, label: '큰 조정', reason: `Technicals proxy: YTD ${snapshot.ytd}%로 ATH drawdown > 25%+ 조건에 가까움` });
        } else if (snapshot.ytd <= -15) {
          signals.push({ key: 'drawdown', weight: 1, label: '큰 조정', reason: `Technicals proxy: YTD ${snapshot.ytd}%로 큰 조정` });
        }
        if (snapshot.daily <= -3) {
          signals.push({ key: 'capitulation', weight: 2, label: '급락·항복', reason: `Technicals proxy: 1D ${snapshot.daily}% 급락, capitulation volume/Bollinger 이탈 확인 후보` });
        } else if (snapshot.daily <= -1.5) {
          signals.push({ key: 'capitulation', weight: 1, label: '급락·항복', reason: `Technicals proxy: 1D ${snapshot.daily}% 하락으로 압박 지속` });
        }
        if (snapshot.upside >= 25) {
          signals.push({ key: 'reward', weight: 1, label: '리워드 있음', reason: `Upside ${snapshot.upside}%로 기대 보상 존재` });
        }
        if (snapshot.action === 'watch') {
          signals.push({ key: 'watch', weight: 1, label: '관찰 액션', reason: `액션은 관찰로 분류돼 타이밍 확인 필요` });
        }
        if (snapshot.action === 'sell' && snapshot.upside >= 20) {
          signals.push({ key: 'reward', weight: 1, label: '약세 반등', reason: `약한 흐름이지만 반등 후보로 감시 가능` });
        }
        return signals;
      }

      function bottomReasons(snapshot) {
        return bottomSignals(snapshot).map((signal) => signal.reason);
      }

      function bottomScore(snapshot) {
        return bottomSignals(snapshot).reduce((sum, signal) => sum + signal.weight, 0);
      }

      function bottomMatchesFilter(item) {
        if (bottomsConditionFilter === 'all') return true;
        return (item.signals || []).some((signal) => signal.key === bottomsConditionFilter);
      }

      function parseMarketCap(raw) {
        if (!raw) return 0;
        const text = String(raw).toUpperCase();
        const num = parseFloat(text.replace(/[^0-9.]/g, ''));
        if (Number.isNaN(num)) return 0;
        if (text.includes('T')) return num * 1000;
        if (text.includes('B')) return num;
        if (text.includes('M')) return num / 1000;
        return num;
      }

      function parseCardMarketCap(card) {
        const line = (card.innerText || '').split('\n').map((v) => v.trim()).find((value) => value.includes('시총 $') || /^\$[\d.]+[TBM]$/i.test(value));
        return parseMarketCap(line || '');
      }

      function sectorSortLabel(mode) {
        return {
          score: '추천순',
          mcap: '시총순',
          up: '상승순',
          down: '하락순',
          highbreak: '신고가 돌파순',
        }[mode] || '추천순';
      }

      function visibleSectorCards() {
        if (isCustomPanelView()) return [];
        return Array.from(document.querySelectorAll('.section-shell article.panel')).filter((card) => extractCardSnapshot(card).ticker);
      }

      function cardHighBreakCount(card) {
        const ticker = extractCardSnapshot(card).ticker;
        return ticker && highBreakCache[ticker] ? highBreakCache[ticker].count : 0;
      }

      function sortSectorCards(cards) {
        const sorted = [...cards];
        if (sectorCardSortMode === 'mcap') {
          sorted.sort((a, b) => parseCardMarketCap(b) - parseCardMarketCap(a));
        } else if (sectorCardSortMode === 'up') {
          sorted.sort((a, b) => extractCardSnapshot(b).daily - extractCardSnapshot(a).daily);
        } else if (sectorCardSortMode === 'down') {
          sorted.sort((a, b) => extractCardSnapshot(a).daily - extractCardSnapshot(b).daily);
        } else if (sectorCardSortMode === 'highbreak') {
          sorted.sort((a, b) => {
            const diff = cardHighBreakCount(b) - cardHighBreakCount(a);
            if (diff) return diff;
            return extractCardSnapshot(b).daily - extractCardSnapshot(a).daily;
          });
        } else {
          sorted.sort((a, b) => {
            const bs = extractCardSnapshot(b);
            const as = extractCardSnapshot(a);
            const bScore = bs.ytd + bs.daily * 4 + bs.upside * 0.2 - Math.max(bs.rsi - 70, 0);
            const aScore = as.ytd + as.daily * 4 + as.upside * 0.2 - Math.max(as.rsi - 70, 0);
            return bScore - aScore;
          });
        }
        return sorted;
      }

      function applySectorCardSort() {
        const cards = visibleSectorCards();
        if (!cards.length) return false;
        const grid = cards[0].parentElement;
        if (!grid) return false;
        sortSectorCards(cards).forEach((card) => grid.appendChild(card));
        return true;
      }

      function highBreakBadgeText(ticker) {
        const item = highBreakCache[ticker];
        if (!item) return '52W 돌파 계산중';
        return `52W 돌파 ${item.count}회`;
      }

      function injectHighBreakBadges() {
        visibleSectorCards().forEach((card) => {
          const snapshot = extractCardSnapshot(card);
          if (!snapshot.ticker) return;
          let chip = card.querySelector('.high-break-chip');
          if (!chip) {

            if (facts) facts.insertAdjacentElement('afterend', chip);
            else card.appendChild(chip);
          }
          chip.textContent = highBreakBadgeText(snapshot.ticker);
        });
        return true;
      }

      function countHighBreaks(closes) {
        let rollingHigh = 0;
        let count = 0;
        closes.forEach((close, index) => {
          if (!Number.isFinite(close)) return;
          if (index >= 252 && close > rollingHigh) count += 1;
          rollingHigh = Math.max(rollingHigh, close);
        });
        return count;
      }

      async function fetchHighBreakCount(ticker) {
        const url = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(ticker)}?range=2y&interval=1d`;
        const data = await fetchJsonWithCorsFallback(url);
        const result = data?.chart?.result?.[0];
        const closes = (result?.indicators?.quote?.[0]?.close || []).map(Number).filter(Number.isFinite);
        if (closes.length < 260) throw new Error('No 52W close history');
        return { ticker, count: countHighBreaks(closes), updatedAt: Date.now() };
      }

      async function ensureVisibleHighBreakCounts() {
        if (highBreakLoading || isCustomPanelView()) return false;
        const tickers = visibleSectorCards()
          .map((card) => extractCardSnapshot(card).ticker)
          .filter((ticker) => ticker && !highBreakCache[ticker])
          .slice(0, 8);
        if (!tickers.length) {
          injectHighBreakBadges();
          return true;
        }
        highBreakLoading = true;
        try {
          const values = await Promise.all(tickers.map((ticker) => fetchHighBreakCount(ticker).catch(() => ({ ticker, count: 0, updatedAt: Date.now() }))));
          values.forEach((item) => { highBreakCache[item.ticker] = item; });
        } finally {
          highBreakLoading = false;
          injectHighBreakBadges();
          if (sectorCardSortMode === 'highbreak') applySectorCardSort();
        }
        return true;
      }

      function sortBottomItems(items) {
        const sorted = [...items];
        if (bottomsSort === 'mcap') {
          sorted.sort((a, b) => parseMarketCap(b.marketCap) - parseMarketCap(a.marketCap));
        } else if (bottomsSort === 'ytd') {
          sorted.sort((a, b) => b.ytd - a.ytd);
        } else {
          sorted.sort((a, b) => {
            if (b.score !== a.score) return b.score - a.score;
            if (a.rsi !== b.rsi) return a.rsi - b.rsi;
            return a.ytd - b.ytd;
          });
        }
        return sorted;
      }

      function numberOrNull(value) {
        const num = Number(value);
        return Number.isFinite(num) ? num : null;
      }

      function breakoutUniverse() {
        return Array.from(KNOWN_TICKERS);
      }

      function quoteForTicker(ticker) {
        return liveQuoteCache[ticker] || null;
      }

      function breakoutVolumeText(item) {
        const ratio = numberOrNull(item.volumeRatio);
        if (ratio != null) return `${ratio.toFixed(1)}x volume`;
        const volume = numberOrNull(item.volume);
        const avgVolume = numberOrNull(item.avgVolume);
        if (volume != null && avgVolume) return `${(volume / avgVolume).toFixed(1)}x volume`;
        return '거래량 데이터 대기';
      }

      function breakoutScore(item) {
        const change = numberOrNull(item.changePct) || 0;
        const dist52 = numberOrNull(item.dist52Pct);
        const distEma = numberOrNull(item.distEmaPct);
        const volumeRatio = numberOrNull(item.volumeRatio);
        let score = 0;
        if (dist52 != null && dist52 >= -1) score += 36;
        else if (dist52 != null && dist52 >= -5) score += 24;
        else if (dist52 != null && dist52 >= -10) score += 12;
        if (change > 0) score += Math.min(22, change * 4);
        if (item.aboveEma100 === true) score += 18;
        if (distEma != null && distEma > 8) score += 10;
        if (volumeRatio != null && volumeRatio >= 2) score += 18;
        else if (volumeRatio != null && volumeRatio >= 1.4) score += 10;
        return Math.round(score);
      }

      function breakoutReasons(item) {
        const reasons = [];
        const dist52 = numberOrNull(item.dist52Pct);
        const change = numberOrNull(item.changePct);
        const distEma = numberOrNull(item.distEmaPct);
        if (dist52 != null && dist52 >= -1) reasons.push('52주 신고가 달성/초근접');
        else if (dist52 != null && dist52 >= -5) reasons.push(`52주 고점까지 ${Math.abs(dist52).toFixed(1)}%`);
        if (change != null && change > 0) reasons.push(`오늘도 ${change.toFixed(2)}% 상승 지속`);
        if (item.aboveEma100 === true) reasons.push(`100EMA 위 ${distEma != null ? `${distEma.toFixed(1)}%` : ''}`);
        reasons.push(breakoutVolumeText(item));
        return reasons;
      }

      function breakoutItems() {
        return breakoutUniverse()
          .map((ticker) => ({ ticker, ...(quoteForTicker(ticker) || {}) }))
          .filter((item) => {
            const dist52 = numberOrNull(item.dist52Pct);
            const change = numberOrNull(item.changePct);
            return dist52 != null && change != null && (dist52 >= -8 || (change > 0 && item.aboveEma100 === true));
          })
          .sort((a, b) => breakoutScore(b) - breakoutScore(a))
          .slice(0, 12);
      }

      function labelTabButton(button) {
        const text = (button.textContent || '').trim();

        if (text.includes('Daily')) return 'daily';
        if (text.includes('Nuclear')) return 'nuclear';
        if (text.includes('AI Power')) return 'power';
        if (text.includes('Photonics')) return 'photonics';
        if (text.includes('AI Infra')) return 'infra';

      const DEFAULT_TAB_ORDER = ['daily', 'nuclear', 'power', 'photonics', 'infra', 'materials', 'bottoms', 'performers', 'portfolios', 'breakouts'];

      function applySavedTabOrder() {
        const shell = document.querySelector('.tabs-shell');
        if (!shell) return false;
        const buttons = Array.from(shell.querySelectorAll(':scope > button'));
        if (!buttons.length) return false;

        buttons.forEach((button) => {
          if (!button.dataset.tabId) button.dataset.tabId = labelTabButton(button);
        });

        const currentIds = buttons.map((button) => button.dataset.tabId).filter(Boolean);
        const merged = [
          ...DEFAULT_TAB_ORDER.filter((id) => currentIds.includes(id)),
          ...currentIds.filter((id) => !DEFAULT_TAB_ORDER.includes(id)),
        ];

        merged.forEach((id) => {
          const button = shell.querySelector(`:scope > button[data-tab-id="${id}"]`);
          if (button) shell.insertBefore(button, shell.querySelector(':scope > .live-controls'));
        });

        localStorage.setItem('ai_tab_order_v1', JSON.stringify(merged));
        return true;
      }

        let line = `${currentSector}에서는 ${leader}를 상대강도 리더로 먼저 보고, Top Setup은 별도로 실행 우선순위를 읽으면 됩니다.`;
        if (action === 'watch') {
          line = `${currentSector}에서는 ${leader}가 상대강도 리더지만, 과열 여부를 확인하면서 Top Setup 진입 타이밍을 고르는 쪽이 좋습니다.`;
        } else if (action === 'sell') {
          line = `${currentSector}에서는 강한 이름보다 리스크 관리가 먼저입니다. 약한 종목은 정리 기준으로 분리하세요.`;
        }

        const getSecondLine = (card) => {
          if (!card) return '-';
          const lines = card.innerText.split('\n').map((v) => v.trim()).filter(Boolean);
          return lines[1] || '-';
        };

        const items = [
          { label: 'Leader', value: leader },
          { label: 'Action', value: actionText },
          { label: 'Momentum', value: getSecondLine(bestCard) },
          { label: 'Risk', value: getSecondLine(riskCard) },
          { label: 'Avg Upside', value: getSecondLine(avgUpsideCard) },
          { label: 'Hot RSI', value: getSecondLine(hotRsiCard) },
        ];
        items.push({ label: 'Why', value: why });

        const summary = document.createElement('section');
        summary.className = 'sector-summary-card';
        summary.innerHTML = buildSectorTake(line, items);

        container.insertAdjacentElement('afterend', summary);
        return true;
      }

      function injectLiveCharts() {
        const articleCards = Array.from(document.querySelectorAll('article.panel'));
        articleCards.forEach((card) => {
          const snapshot = extractCardSnapshot(card);
          if (!snapshot.ticker) return;
          const tickerNode = Array.from(card.querySelectorAll('div, span, button')).find((el) => {
            return (el.textContent || '').trim() === snapshot.ticker && !el.closest('.live-chart-wrap');
          });
          if (tickerNode) {
            tickerNode.dataset.liveTicker = snapshot.ticker;
            tickerNode.style.cursor = 'pointer';
          }
          if (card.querySelector('.live-chart-wrap')) return;
          const actionBasis = Array.from(card.querySelectorAll('.panel-soft')).find((el) => {
            return (el.textContent || '').includes('Action Basis');
          });
          const chart = document.createElement('div');
          chart.innerHTML = liveChartHtml(snapshot.ticker);
          const chartEl = chart.firstElementChild;
          if (!chartEl) return;
          if (actionBasis && actionBasis.parentElement) {
            actionBasis.parentElement.insertAdjacentElement('afterend', chartEl);
          } else {
            card.appendChild(chartEl);
          }
        });
        return true;
      }

      function injectSummaryTickerLinks() {
        const panels = Array.from(document.querySelectorAll('.panel-soft'));
        panels.forEach((panel) => {
          const values = Array.from(panel.querySelectorAll('div, span')).filter((el) => {
            const text = (el.textContent || '').trim();
            return /^[A-Z]{2,6}$/.test(text);
          });
          values.forEach((el) => {
            const ticker = (el.textContent || '').trim();
            if (!KNOWN_TICKERS.has(ticker)) return;
            el.dataset.liveTicker = ticker;
            el.style.cursor = 'pointer';
          });
        });
        return true;
      }

      const LIVE_KEY_STORAGE = 'fh_key';
      const LIVE_PROXY_URL = 'https://matrix-ruddy-ten.vercel.app/api/market';
      let liveRefreshLoading = false;
      let liveRefreshTimer = null;
      let liveLastUpdated = localStorage.getItem('live_last_updated_at') || '';
      let liveLastSource = localStorage.getItem('live_last_source') || '';
      let liveQuoteCache = {};
      let breakoutVolumeCache = {};
      let breakoutVolumeLoading = false;

      function getLiveApiKey() {
        return localStorage.getItem(LIVE_KEY_STORAGE) || '';
      }

      function setLiveApiKey(key) {
        if (!key) {
          localStorage.removeItem(LIVE_KEY_STORAGE);
          return;
        }
        localStorage.setItem(LIVE_KEY_STORAGE, key);
      }

      function visibleTickers() {
        const set = new Set();
        if (document.body.dataset.customView === 'breakouts') {
          return breakoutUniverse();
        }
        if (document.body.dataset.customView) {
          Array.from(document.querySelectorAll('[data-live-ticker]')).forEach((node) => {
            const ticker = node.dataset.liveTicker;
            if (ticker && KNOWN_TICKERS.has(ticker)) set.add(ticker);
          });
        } else {
          Array.from(document.querySelectorAll('article.panel')).forEach((card) => {
            const snapshot = extractCardSnapshot(card);
            if (snapshot.ticker && KNOWN_TICKERS.has(snapshot.ticker)) set.add(snapshot.ticker);
          });
        }
        return Array.from(set);
      }

      async function fetchFinnhubQuote(ticker, key) {
        const url = `https://finnhub.io/api/v1/quote?symbol=${encodeURIComponent(ticker)}&token=${encodeURIComponent(key)}`;
        const response = await fetch(url);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        if (!data || !data.c) throw new Error('No quote');
        return {
          ticker,
          price: Number(data.c),
          changePct: Number(data.dp || 0),
          changeAbs: Number(data.d || 0),
        };
      }

      function chunkTickers(items, size) {
        const out = [];
        for (let i = 0; i < items.length; i += size) out.push(items.slice(i, i + size));
        return out;
      }

      async function fetchJsonWithCorsFallback(url) {
        try {
          const response = await fetch(url);
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          return await response.json();
        } catch (error) {
          const wrapped = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
          const response = await fetch(wrapped);
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          return await response.json();
        }
      }

      async function fetchProxyQuotes(tickers) {
        const quotes = [];
        for (const group of chunkTickers(tickers, 25)) {
          const url = `${LIVE_PROXY_URL}?symbols=${encodeURIComponent(group.join(','))}`;
          const data = await fetchJsonWithCorsFallback(url);
          Object.entries(data.results || {}).forEach(([ticker, item]) => {
            if (!item || item.error || !Number.isFinite(Number(item.last))) return;
            quotes.push({
              ticker,
              price: Number(item.last),
              changePct: Number(item.changePct || 0),
              changeAbs: Number(item.last || 0) - Number(item.prev || item.last || 0),
              high52: numberOrNull(item.high52),
              dist52Pct: numberOrNull(item.dist52Pct),
              ema100: numberOrNull(item.ema100),
              aboveEma100: typeof item.aboveEma100 === 'boolean' ? item.aboveEma100 : null,
              distEmaPct: numberOrNull(item.distEmaPct),
              volume: numberOrNull(item.volume),
              avgVolume: numberOrNull(item.avgVolume),
              volumeRatio: numberOrNull(item.volumeRatio),
              marketTime: item.marketTime || '',
            });
          });
        }
        return quotes;
      }

      async function fetchYahooVolumeSignal(ticker) {
        const url = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(ticker)}?range=3mo&interval=1d`;
        const data = await fetchJsonWithCorsFallback(url);
        const result = data?.chart?.result?.[0];
        const volumes = (result?.indicators?.quote?.[0]?.volume || []).filter((value) => Number.isFinite(Number(value)));
        if (volumes.length < 8) throw new Error('No volume history');
        const latestVolume = Number(volumes[volumes.length - 1]);
        const base = volumes.slice(Math.max(0, volumes.length - 21), volumes.length - 1);
        const avgVolume = base.reduce((sum, value) => sum + Number(value), 0) / Math.max(1, base.length);
        return {
          ticker,
          volume: latestVolume,
          avgVolume,
          volumeRatio: avgVolume ? latestVolume / avgVolume : null,
        };
      }

      async function ensureBreakoutVolumes(items) {
        if (breakoutVolumeLoading) return false;
        const targets = items
          .map((item) => item.ticker)
          .filter((ticker) => ticker && !breakoutVolumeCache[ticker])
          .slice(0, 18);
        if (!targets.length) return true;
        breakoutVolumeLoading = true;
        try {
          const signals = await Promise.all(targets.map((ticker) => fetchYahooVolumeSignal(ticker).catch(() => null)));
          signals.filter(Boolean).forEach((signal) => {
            breakoutVolumeCache[signal.ticker] = signal;
            liveQuoteCache[signal.ticker] = { ...(liveQuoteCache[signal.ticker] || {}), ...signal };
          });
        } finally {
          breakoutVolumeLoading = false;
          if (document.body.dataset.customView === 'breakouts') renderBreakoutsView();
        }
        return true;
      }

      function formatPrice(value) {
        if (value == null || Number.isNaN(value)) return '-';
        return value < 100
          ? `$${value.toFixed(2)}`
          : `$${value.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
      }

      function formatPct(value) {
        if (value == null || Number.isNaN(value)) return '-';
        const abs = Math.abs(value).toFixed(2);
        if (value > 0) return `▲+${abs}%`;
        if (value < 0) return `▼${abs}%`;
        return `${abs}%`;
      }

      function patchCardNode(card, quote) {
        const nodes = Array.from(card.querySelectorAll('div'));
        const priceNode = nodes.find((node) => /^\$[\d,.]+/.test((node.textContent || '').trim()));
        const changeNode = nodes.find((node) => {
          const text = (node.textContent || '').trim();
          return /^(▲\+|▼|\+|\-)?\d+(\.\d+)?%$/.test(text);
        });
        if (priceNode) {
          priceNode.textContent = formatPrice(quote.price);
        }
        if (changeNode) {
          changeNode.textContent = formatPct(quote.changePct);
          changeNode.style.color = quote.changePct > 0 ? '#52E0C4' : quote.changePct < 0 ? '#FF8A8A' : '#9BB0C8';
        }
      }

      function applyLiveQuotes(quotes) {
        quotes.forEach((quote) => {
          if (!quote || !quote.ticker) return;
          liveQuoteCache[quote.ticker] = { ...(liveQuoteCache[quote.ticker] || {}), ...quote };
          Array.from(document.querySelectorAll('article.panel')).forEach((card) => {
            const snapshot = extractCardSnapshot(card);
            if (snapshot.ticker === quote.ticker) patchCardNode(card, quote);
          });
        });
        injectSectorSummary();
        injectBreadthSummary();
        injectMarketFrame();
        injectBottomChecklist();
        if (document.body.dataset.customView === 'breakouts') renderBreakoutsView();
      }

      function updateLiveControlsUi(message) {
        const status = document.querySelector('.live-status');
        const refreshBtn = document.querySelector('[data-live-refresh]');
        const connectBtn = document.querySelector('[data-live-connect]');
        const liveBtn = document.querySelector('[data-live-state]');
        const hasKey = !!getLiveApiKey();
        if (status) {
          status.textContent = message || (liveLastUpdated ? `Last ${liveLastUpdated}${liveLastSource ? ` · ${liveLastSource}` : ''}` : hasKey ? 'Finnhub ready' : 'Live proxy ready');
          status.classList.toggle('is-loading', liveRefreshLoading);
          status.classList.toggle('is-live', !liveRefreshLoading);
        }
        if (refreshBtn) refreshBtn.disabled = liveRefreshLoading;
        if (connectBtn) connectBtn.textContent = hasKey ? 'API Key' : 'Add API Key';
        if (liveBtn) {
          liveBtn.classList.toggle('is-live', true);
          liveBtn.textContent = hasKey ? 'Finnhub Live' : 'Proxy Live';
        }
      }

      async function refreshLiveQuotes(manual) {
        const key = getLiveApiKey();
        if (liveRefreshLoading) return;
        const tickers = visibleTickers();
        if (!tickers.length) {
          updateLiveControlsUi('No visible tickers');
          return;
        }
        liveRefreshLoading = true;
        updateLiveControlsUi(`Refreshing ${tickers.length}`);
        try {
          let source = key ? 'Finnhub' : 'Proxy';
          let quotes = [];
          if (key) {
            quotes = (await Promise.all(tickers.map((ticker) => fetchFinnhubQuote(ticker, key).catch(() => null)))).filter(Boolean);
          }
          const missing = tickers.filter((ticker) => !quotes.some((quote) => quote.ticker === ticker));
          if (missing.length) {
            const fallbackQuotes = await fetchProxyQuotes(missing).catch(() => []);
            if (fallbackQuotes.length) {
              quotes = [...quotes, ...fallbackQuotes];
              if (!key || fallbackQuotes.length === tickers.length) source = 'Proxy';
              else source = 'Finnhub+Proxy';
            }
          }
          if (!quotes.length) throw new Error('No live quotes');
          applyLiveQuotes(quotes);
          liveLastUpdated = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
          liveLastSource = source;
          localStorage.setItem('live_last_updated_at', liveLastUpdated);
          localStorage.setItem('live_last_source', liveLastSource);
          updateLiveControlsUi(`Last ${liveLastUpdated} · ${source}`);
        } catch (error) {
          updateLiveControlsUi('Refresh failed');
        } finally {
          liveRefreshLoading = false;
          updateLiveControlsUi();
        }
      }

      function scheduleLiveRefresh() {
        if (liveRefreshTimer) clearInterval(liveRefreshTimer);
        liveRefreshTimer = setInterval(() => {
          refreshLiveQuotes(false);
        }, 5 * 60 * 1000);
      }

      function injectLiveControls() {
        const shell = document.querySelector('.tabs-shell');
        if (!shell) return false;
        if (shell.dataset.liveBound !== '1') {
          shell.dataset.liveBound = '1';
          shell.addEventListener('click', (event) => {
            const button = event.target.closest('button');
            if (!button) return;
            if (button.closest('.live-controls')) return;
            setTimeout(() => refreshLiveQuotes(false), 450);
          });
        }
        let controls = shell.querySelector('.live-controls');
        if (!controls) {
          controls = document.createElement('div');
          controls.className = 'live-controls';
          controls.innerHTML = `
            <button type="button" class="live-control-btn" data-live-state>Live Off</button>
            <button type="button" class="live-control-btn" data-live-refresh>Refresh</button>
            <button type="button" class="live-control-btn" data-live-connect>Connect</button>
            <div class="live-status">API key needed</div>
          `;
          shell.appendChild(controls);
          const refreshBtn = controls.querySelector('[data-live-refresh]');
          const connectBtn = controls.querySelector('[data-live-connect]');
          const liveBtn = controls.querySelector('[data-live-state]');
          if (refreshBtn) refreshBtn.addEventListener('click', () => refreshLiveQuotes(true));
          if (connectBtn) {
            connectBtn.addEventListener('click', () => {
              const current = getLiveApiKey();
              const entered = window.prompt('Finnhub API key', current);
              if (entered === null) return;
              setLiveApiKey(entered.trim());
              updateLiveControlsUi('API key saved');
              refreshLiveQuotes(false);
            });
          }
          if (liveBtn) {
            liveBtn.addEventListener('click', () => {
              if (!getLiveApiKey()) {
                const entered = window.prompt('Finnhub API key');
                if (!entered) return;
                setLiveApiKey(entered.trim());
              }
              refreshLiveQuotes(true);
            });
          }
        }
        updateLiveControlsUi();
        return true;
      }

      function dailyMetric(label) {
        const cards = Array.from(document.querySelectorAll('.hero-grid .panel-soft'));
        const card = cards.find((el) => (el.textContent || '').includes(label));
        if (!card) return '-';
        const lines = (card.innerText || '').split('\n').map((value) => value.trim()).filter(Boolean);
        return lines[1] || '-';
      }

      function currentReportPeriod() {
        const buttons = Array.from(document.querySelectorAll('.hero-grid button'));
        const active = buttons.find((button) => {
          const text = (button.textContent || '').trim().toLowerCase();
          return ['daily', 'weekly', 'monthly'].includes(text) && (button.style.color || '').includes('244');
        });
        const text = (active?.textContent || 'daily').trim().toLowerCase();
        return ['daily', 'weekly', 'monthly'].includes(text) ? text : 'daily';
      }

      function forecastCopy(period, leader, laggard) {
        const map = {
          daily: {
            title: '일간 보고 결론',
            horizon: '오늘-내일',
            expect: `${leader} 같은 당일 리더가 장중 힘을 유지하면 AI 인프라 쪽 단기 위험선호는 아직 살아 있다고 봅니다.`,
            warning: `${laggard}가 계속 밀리거나 리더와 낙오주의 격차가 커지면 추격보다 현금 비중과 진입가를 먼저 관리해야 합니다.`,
            action: '나는 오늘 강한 이름을 쫓기보다, 리더가 버티는지와 약한 종목의 추가 이탈 여부를 보고 분할 접근하겠습니다.'
          },
          weekly: {
            title: '주간 보고 결론',
            horizon: '이번 주',
            expect: `${leader}가 주간 리더로 남으면 섹터 순환보다 기존 주도주 연장이 더 유력하다고 봅니다.`,
            warning: `${laggard} 같은 약한 축이 늘어나면 지수는 버텨도 내부 폭은 나빠질 수 있습니다. 주간 말에는 리밸런싱 압력이 나올 수 있습니다.`,
            action: '나는 이번 주 리더 보유는 유지하되, 새 매수는 눌림목과 거래량 둔화를 기다리는 쪽으로 보겠습니다.'
          },
          monthly: {
            title: '월간 보고 결론',
            horizon: '이번 달',
            expect: `${leader}가 월간 기준으로도 위에 있으면 AI 인프라 장기 테마의 자금 유입은 아직 꺾이지 않았다고 봅니다.`,
            warning: '월간으로는 밸류에이션, 실적 가이던스, 금리 재상승이 가장 큰 리스크입니다. 강한 종목도 과열 구간에서는 수익 보호가 먼저입니다.',
            action: '나는 이번 달 핵심 테마는 유지하되, 과열 RSI와 실적 전후 갭 리스크가 큰 종목은 비중을 줄여 대응하겠습니다.'
          }
        };
        return map[period] || map.daily;
      }

      function emphasizeForecast(text, tone) {
        const cls = tone === 'warning' ? 'warn' : tone === 'action' ? 'action' : 'up';
        const patterns = [
          [/AI 인프라/g, 'focus'],
          [/위험선호/g, 'up'],
          [/기존 주도주 연장/g, 'up'],
          [/자금 유입/g, 'up'],
          [/추격보다 현금 비중과 진입가/g, 'warn'],
          [/내부 폭은 나빠질 수 있습니다/g, 'warn'],
          [/밸류에이션|실적 가이던스|금리 재상승|갭 리스크/g, 'warn'],
          [/분할 접근|눌림목|거래량 둔화|수익 보호|비중을 줄여 대응/g, 'action'],
        ];
        let html = String(text).replace(/[&<>"']/g, (ch) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
        patterns.forEach(([pattern, markCls]) => {
          html = html.replace(pattern, (match) => `<span class="forecast-mark ${markCls || cls}">${match}</span>`);
        });
        return html;
      }

      function injectReportForecast() {
        const heroTitle = document.querySelector('.hero-grid h1');
        const isDailyView = heroTitle && (heroTitle.textContent || '').includes('Daily');
        const section = document.querySelector('.section-shell');
        const prev = document.querySelector('.report-forecast-panel');
        if (!isDailyView || !section) {
          if (prev) prev.remove();
          return false;
        }

        const period = currentReportPeriod();
        if (prev && prev.dataset.period === period) return true;
        if (prev) prev.remove();

        const leader = dailyMetric('Top Leader');
        const laggard = dailyMetric('Top Laggard');
        const copy = forecastCopy(period, leader, laggard);
        const panel = document.createElement('section');
        panel.className = 'report-forecast-panel';
        panel.dataset.period = period;
        panel.innerHTML = `
          <div class="report-forecast-head">
            <div>
              <div class="report-forecast-kicker">My Read</div>
              <div class="report-forecast-title">${copy.title}</div>
            </div>
            <div class="report-forecast-meta">${copy.horizon}</div>
          </div>
          <div class="report-forecast-grid">
            <div class="report-forecast-card">
              <div class="report-forecast-label">난 이렇게 예상한다</div>
              <div class="report-forecast-copy">${emphasizeForecast(copy.expect, 'expect')}</div>
            </div>
            <div class="report-forecast-card">
              <div class="report-forecast-label">이거 주의해라</div>
              <div class="report-forecast-copy">${emphasizeForecast(copy.warning, 'warning')}</div>
            </div>
            <div class="report-forecast-card">
              <div class="report-forecast-label">내 액션</div>
              <div class="report-forecast-copy">${emphasizeForecast(copy.action, 'action')}</div>
            </div>
          </div>
        `;
        section.appendChild(panel);
        return true;
      }

      function bindReportPeriodClicks() {
        const buttons = Array.from(document.querySelectorAll('.hero-grid button')).filter((button) => {
          const text = (button.textContent || '').trim().toLowerCase();
          return ['daily', 'weekly', 'monthly'].includes(text);
        });
        buttons.forEach((button) => {
          if (button.dataset.reportForecastBound === '1') return;
          button.dataset.reportForecastBound = '1';
          button.addEventListener('click', () => {
            setTimeout(() => injectReportForecast(), 120);
          });
        });
        return buttons.length > 0;
      }

      let tries = 0;
      const timer = setInterval(() => {
        tries += 1;
        applyGlobalRefinement();
        liftTabsToTop();
        ensureBottomsTab();
        ensurePerformersTab();
        ensurePortfoliosTab();
        ensureBreakoutsTab();
        ensureChartModal();
        bindTickerClicks();
        injectLiveControls();
        scheduleLiveRefresh();
        applySavedTabOrder();
        setupTabDrag();
        syncBottomsTabState();
        renderBottomsView(false);
        renderPerformersView();
        renderPortfoliosView();
        renderBreakoutsView();
        relabelTopIdea();
        injectCardActions();
        injectCardFactRows();
        injectSectorSortControls();
        injectHighBreakBadges();
        applySectorCardSort();
        ensureVisibleHighBreakCounts();
        injectLiveCharts();
        injectSummaryTickerLinks();
        injectSectorSummary();
        injectReportForecast();
        bindReportPeriodClicks();
        injectBreadthSummary();
        injectMarketFrame();
        injectBottomChecklist();
        if (tries === 1) {
          setTimeout(() => refreshLiveQuotes(false), 700);
        }
        if (tries > 30) clearInterval(timer);
      }, 500);
    </script>
