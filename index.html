  power:{label:"AI Power",icon:"⚡",color:"#FFD93D",cd:"rgba(255,217,61,0.12)",desc:"연료전지·가스터빈·DC 전력·산업가스"},
  photonics:{label:"Photonics",icon:"🔬",color:"#7B61FF",cd:"rgba(123,97,255,0.12)",desc:"레이저·광학 트랜시버·실리콘 포토닉스"},
  infra:{label:"AI Infra",icon:"🏗️",color:"#FF6B35",cd:"rgba(255,107,53,0.12)",desc:"GPU·서버·냉각·클라우드·네트워킹"},
  materials:{label:"Materials",icon:"⛏️",color:"#4ECDC4",cd:"rgba(78,205,196,0.12)",desc:"구리·리튬·팔라듐·에너지 서비스"},
  matrix:{label:"Matrix",icon:"🎯",color:"#00E5FF",cd:"rgba(0,229,255,0.12)",desc:"Quality × Valuation 투자 매트릭스"},
};

const MA={
  "3-3":{label:"Strong Buy",sub:"The Jackpot",color:"#00E5A0",bg:"rgba(0,229,160,0.08)"},
  "3-2":{label:"Buy",sub:"",color:"#10b981",bg:"rgba(16,185,129,0.06)"},
  "3-1":{label:"Patience",sub:"Wait for drop",color:"#f59e0b",bg:"rgba(245,158,11,0.06)"},
  "2-3":{label:"Buy",sub:"",color:"#10b981",bg:"rgba(16,185,129,0.06)"},
  "2-2":{label:"Hold",sub:"",color:"#a78bfa",bg:"rgba(167,139,250,0.06)"},
  "2-1":{label:"Avoid",sub:"",color:"#ef4444",bg:"rgba(239,68,68,0.05)"},
  "1-3":{label:"Speculative",sub:"",color:"#f59e0b",bg:"rgba(245,158,11,0.05)"},
  "1-2":{label:"Avoid",sub:"",color:"#ef4444",bg:"rgba(239,68,68,0.05)"},
  "1-1":{label:"Avoid",sub:"The Worst",color:"#ef4444",bg:"rgba(239,68,68,0.08)"},
};

function Radar({factors,color}){
  const lb=["변동성","밸류","사이즈","모멘텀","베타","전망"],ks=["volatility","value","size","momentum","beta","outlook"],cx=90,cy=90,r=65;
  const an=ks.map((_,i)=>(Math.PI*2*i)/ks.length-Math.PI/2);
  const pts=ks.map((k,i)=>({x:cx+Math.cos(an[i])*r*((factors[k]||5)/10),y:cy+Math.sin(an[i])*r*((factors[k]||5)/10)}));
  return <svg viewBox="0 0 180 180" style={{width:"100%",maxWidth:"200px"}}>
    {[.25,.5,.75,1].map((lv,li)=><polygon key={li} points={an.map(a=>`${cx+Math.cos(a)*r*lv},${cy+Math.sin(a)*r*lv}`).join(" ")} fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth=".5"/>)}
    {an.map((a,i)=><g key={i}><line x1={cx} y1={cy} x2={cx+Math.cos(a)*r} y2={cy+Math.sin(a)*r} stroke="rgba(255,255,255,0.06)" strokeWidth=".5"/><text x={cx+Math.cos(a)*(r+16)} y={cy+Math.sin(a)*(r+16)} fill="#8A8F98" fontSize="8" textAnchor="middle" dominantBaseline="middle">{lb[i]}</text></g>)}
    <polygon points={pts.map(p=>`${p.x},${p.y}`).join(" ")} fill={color+"25"} stroke={color} strokeWidth="1.5"/>
    {pts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r="2.5" fill={color}/>)}
  </svg>;
}

function TChart({stock:s,color}){
  if(!s.hi||!s.lo) return null;
  const mn=s.lo*.85,mx=s.hi*1.08,rng=mx-mn,y=v=>100-((v-mn)/rng)*100;
  return <svg viewBox="0 0 220 120" style={{width:"100%",maxWidth:"240px"}}>
    <line x1="30" y1={y(s.price)*1.1+5} x2="200" y2={y(s.price)*1.1+5} stroke="rgba(255,255,255,0.2)" strokeWidth="1"/>
    <line x1="90" y1={y(s.price)*1.1+5} x2="190" y2={y(s.hi)*1.1+5} stroke="#00E5A0" strokeWidth="1" strokeDasharray="4,2"/>
    <line x1="90" y1={y(s.price)*1.1+5} x2="190" y2={y(s.avg)*1.1+5} stroke="#FFD93D" strokeWidth="1" strokeDasharray="4,2"/>
    <line x1="90" y1={y(s.price)*1.1+5} x2="190" y2={y(s.lo)*1.1+5} stroke="#FF6B6B" strokeWidth="1" strokeDasharray="4,2"/>
    <text x="195" y={y(s.hi)*1.1+4} fill="#00E5A0" fontSize="8" fontWeight="700">최고</text>
    <text x="195" y={y(s.hi)*1.1+13} fill="#00E5A0" fontSize="9" fontFamily="monospace">${s.hi}</text>
    <text x="195" y={y(s.avg)*1.1+4} fill="#FFD93D" fontSize="8" fontWeight="700">평균</text>
    <text x="195" y={y(s.avg)*1.1+13} fill="#FFD93D" fontSize="9" fontFamily="monospace">${s.avg}</text>
    <text x="195" y={y(s.lo)*1.1+4} fill="#FF6B6B" fontSize="8" fontWeight="700">최저</text>
    <text x="195" y={y(s.lo)*1.1+13} fill="#FF6B6B" fontSize="9" fontFamily="monospace">${s.lo}</text>
    <text x="35" y={y(s.price)*1.1+3} fill="#fff" fontSize="8">현재가</text>
    <text x="35" y={y(s.price)*1.1+14} fill="#fff" fontSize="10" fontWeight="700" fontFamily="monospace">${s.price}</text>
    <circle cx="90" cy={y(s.price)*1.1+5} r="3" fill="#fff"/><circle cx="190" cy={y(s.hi)*1.1+5} r="3" fill="#00E5A0"/><circle cx="190" cy={y(s.avg)*1.1+5} r="3" fill="#FFD93D"/><circle cx="190" cy={y(s.lo)*1.1+5} r="3" fill="#FF6B6B"/>
  </svg>;
}

function Bar({v,mx,c,lb}){
  return <div style={{marginBottom:"5px"}}>
    <div style={{display:"flex",justifyContent:"space-between",fontSize:"11px",color:"#8A8F98",marginBottom:"2px"}}>
      <span>{lb}</span><span style={{color:v>0?c:v===0?"#555":"#FF6B6B",fontWeight:600,fontFamily:"monospace"}}>{v>0?`+${v}%`:v===0?"—":`${v}%`}</span>
    </div>
    <div style={{height:"4px",background:"rgba(255,255,255,0.04)",borderRadius:"2px"}}>
      <div style={{height:"100%",width:`${Math.min((Math.abs(v)/mx)*100,100)}%`,borderRadius:"2px",background:`linear-gradient(90deg,${c}88,${c})`,transition:"width .5s"}}/>
    </div>
  </div>;
}

function Card({s,sc,i}){
  const[ex,setEx]=useState(false);
  const etf=s.rating==="ETF";
  const rc=s.rating.includes("Strong")?"#00E5A0":s.rating==="Buy"?"#5EDFB0":s.rating==="ETF"?"#4ECDC4":"#E5C84C";
  return <div style={{background:"rgba(255,255,255,0.018)",border:"1px solid rgba(255,255,255,0.05)",borderRadius:"14px",padding:"18px",animation:`fi .3s ease ${i*.03}s both`,position:"relative",cursor:"pointer"}} onClick={()=>setEx(!ex)}>
    {s.isNew&&<div style={{position:"absolute",top:"8px",right:"8px",background:"rgba(255,107,53,0.18)",border:"1px solid rgba(255,107,53,0.3)",borderRadius:"4px",padding:"2px 6px",fontSize:"9px",fontWeight:800,color:"#FF6B35"}}>NEW</div>}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"8px"}}>
      <div>
        <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
          <span style={{fontSize:"20px",fontWeight:800,color:"#F0F0F0",fontFamily:"monospace"}}>{s.ticker}</span>
          <span style={{padding:"3px 8px",borderRadius:"6px",fontSize:"11px",fontWeight:700,background:rc+"18",color:rc,border:`1px solid ${rc}40`}}>{s.rating}</span>
        </div>
        <div style={{fontSize:"13px",color:"#9CA3AF",marginTop:"3px"}}>{s.name}</div>
      </div>
      {s.price>0&&<div style={{textAlign:"right"}}>
        <div style={{fontSize:"18px",fontWeight:700,color:"#E5E7EB",fontFamily:"monospace"}}>${s.price<100?s.price.toFixed(2):s.price.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
        <div style={{fontSize:"13px",fontWeight:600,fontFamily:"monospace",color:s.change>0?"#00E5A0":s.change<0?"#FF6B6B":"#6B7280"}}>{s.change>0?"▲+":s.change<0?"▼":""}{s.change.toFixed(2)}%</div>
      </div>}
    </div>
    <div style={{display:"flex",gap:"6px",marginBottom:"10px",flexWrap:"wrap"}}>
      <span style={{background:sc+"14",border:`1px solid ${sc}22`,borderRadius:"5px",padding:"2px 8px",fontSize:"11px",color:sc,fontWeight:600}}>{s.sub}</span>
      <span style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:"5px",padding:"2px 8px",fontSize:"11px",color:"#9CA3AF",fontFamily:"monospace"}}>시총 ${s.mcap}</span>
    </div>
    {!etf&&<><Bar v={s.targetUpside} mx={100} c={sc} lb="목표 상승률"/><Bar v={s.revGrowth} mx={200} c="#4ECDC4" lb="매출 성장"/><Bar v={s.epsGrowth} mx={200} c="#FFD93D" lb="EPS 성장"/>
      <div style={{display:"flex",alignItems:"center",gap:"5px",margin:"6px 0"}}>
        <span style={{fontSize:"11px",color:"#6B7280"}}>신뢰</span>
        <div style={{flex:1,display:"flex",gap:"1.5px"}}>{[...Array(10)].map((_,j)=><div key={j} style={{flex:1,height:"5px",borderRadius:"2px",background:j<Math.round(s.analysts/10)?sc:"rgba(255,255,255,0.04)"}}/>)}</div>
        <span style={{fontSize:"11px",color:sc,fontWeight:700,fontFamily:"monospace"}}>{s.analysts}</span>
      </div>
    </>}
    <div style={{fontSize:"12px",color:"#9CA3AF",lineHeight:1.5,padding:"8px 10px",background:"rgba(255,255,255,0.015)",borderRadius:"7px",borderLeft:`2px solid ${sc}30`}}>
      <span style={{color:sc,fontWeight:700,fontSize:"9px",textTransform:"uppercase"}}>촉매 </span>{s.catalyst}
    </div>
    {ex&&<div style={{marginTop:"14px",padding:"16px",background:"rgba(0,0,0,0.3)",borderRadius:"12px",border:`1px solid ${sc}20`,animation:"fi .25s ease both"}}>
      <div style={{fontSize:"13px",color:"#D1D5DB",lineHeight:1.7,marginBottom:"16px"}}>{s.desc}</div>
      {s.hi>0&&s.lo>0&&<div style={{display:"flex",flexWrap:"wrap",gap:"16px"}}>
        <div style={{flex:"1 1 220px"}}><div style={{fontSize:"12px",color:"#6B7280",marginBottom:"8px",fontWeight:600}}>📊 12개월 전망</div><TChart stock={s} color={sc}/></div>
        <div style={{flex:"1 1 180px"}}><div style={{fontSize:"12px",color:"#6B7280",marginBottom:"8px",fontWeight:600}}>🕸️ 팩터 분석</div><Radar factors={s.factors} color={sc}/></div>
      </div>}
      {(!s.hi||!s.lo)&&s.factors&&<div style={{maxWidth:"200px"}}><div style={{fontSize:"12px",color:"#6B7280",marginBottom:"8px",fontWeight:600}}>🕸️ 팩터</div><Radar factors={s.factors} color={sc}/></div>}
    </div>}
    <div style={{textAlign:"center",marginTop:"8px",fontSize:"10px",color:"#555"}}>{ex?"▲ 접기":"▼ 상세보기"}</div>
  </div>;
}

function MatrixView(){
  const ms=ALL_STOCKS.filter(s=>s.quality>0&&s.valuation>0);
  const grid={};
  for(let q=1;q<=3;q++) for(let v=1;v<=3;v++) grid[`${q}-${v}`]=[];
  ms.forEach(s=>{const k=`${s.quality}-${s.valuation}`;if(grid[k])grid[k].push(s)});
  const ql=["","Bad Co.","Good Co.","Great Co."],vl=["","비싼 가격","적정 가격","좋은 가격"];
  return <div>
    <div style={{display:"flex",gap:"8px",flexWrap:"wrap",marginBottom:"20px"}}>
      {Object.entries(MA).filter(([k])=>grid[k]?.length).map(([k,a])=><div key={k} style={{background:a.bg,border:`1px solid ${a.color}25`,borderRadius:"8px",padding:"8px 14px"}}>
        <div style={{fontSize:"11px",color:a.color,fontWeight:700}}>{a.label} {a.sub&&<span style={{fontWeight:400,opacity:.7}}>({a.sub})</span>}</div>
        <div style={{fontSize:"13px",color:"#D1D5DB",marginTop:"4px"}}>{grid[k].map(s=>s.ticker).join(", ")}</div>
      </div>)}
    </div>
    <div style={{fontSize:"11px",color:"#6B7280",marginBottom:"6px",textAlign:"center"}}>← VALUATION (가격 매력도) →</div>
    <div style={{display:"grid",gridTemplateColumns:"60px 1fr 1fr 1fr",gap:"2px"}}>
      <div/>{[1,2,3].map(v=><div key={v} style={{textAlign:"center",padding:"8px",fontSize:"12px",fontWeight:700,color:v===3?"#00E5A0":v===2?"#a78bfa":"#ef4444"}}>{vl[v]}</div>)}
      {[3,2,1].map(q=><React.Fragment key={q}>
        <div style={{writingMode:"vertical-rl",textOrientation:"mixed",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"12px",fontWeight:700,color:q===3?"#00E5A0":q===2?"#f59e0b":"#ef4444",transform:"rotate(180deg)"}}>{ql[q]}</div>
        {[1,2,3].map(v=>{const k=`${q}-${v}`,a=MA[k];return <div key={k} style={{background:a.bg,border:`1px solid ${a.color}15`,borderRadius:"10px",padding:"10px",minHeight:"90px"}}>
          <div style={{fontSize:"11px",fontWeight:700,color:a.color,marginBottom:"6px"}}>{a.label}</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:"4px"}}>
            {grid[k].map(s=>{const sc=SM[s.sector]?.color||"#888";return <div key={s.ticker} style={{background:"rgba(0,0,0,0.3)",border:`1px solid ${sc}30`,borderRadius:"6px",padding:"4px 8px",fontSize:"12px",fontWeight:700,color:"#E5E7EB",fontFamily:"monospace"}} title={`${s.name} — ${s.desc}`}>
              <span style={{color:sc,marginRight:"3px",fontSize:"8px"}}>●</span>{s.ticker}
              {s.price>0&&<span style={{fontSize:"9px",color:s.change>0?"#00E5A0":s.change<0?"#FF6B6B":"#6B7280",marginLeft:"4px"}}>{s.change>0?"+":""}{s.change.toFixed(1)}%</span>}
            </div>})}
          </div>
        </div>})}
      </React.Fragment>)}
    </div>
    <div style={{display:"flex",gap:"12px",flexWrap:"wrap",marginTop:"20px",justifyContent:"center"}}>
      {Object.entries(SM).filter(([k])=>k!=="matrix").map(([k,m])=><div key={k} style={{display:"flex",alignItems:"center",gap:"4px",fontSize:"11px",color:"#9CA3AF"}}><span style={{color:m.color,fontSize:"10px"}}>●</span>{m.icon} {m.label}</div>)}
    </div>
  </div>;
}

function Summ({stocks,color}){
  const ne=stocks.filter(x=>x.rating!=="ETF"),wp=stocks.filter(x=>x.price>0);
  const au=ne.length?Math.round(ne.reduce((a,x)=>a+x.targetUpside,0)/ne.length):0;
  const ac=wp.length?(wp.reduce((a,x)=>a+x.change,0)/wp.length).toFixed(2):"—";
  const tg=[...ne].sort((a,b)=>b.revGrowth-a.revGrowth)[0];
  const nc=stocks.filter(x=>x.isNew).length;
  return <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(100px,1fr))",gap:"1px",background:"rgba(255,255,255,0.035)",borderRadius:"10px",overflow:"hidden",marginBottom:"16px"}}>
    {[{l:"종목",v:`${stocks.length}`,s:nc>0?`+${nc}`:""},{l:"평균 상승여력",v:`+${au}%`},{l:"오늘 평균",v:`${Number(ac)>0?"+":""}${ac}%`},{l:"Top",v:tg?tg.ticker:"—"}].map((m,i)=><div key={i} style={{background:"#0C0E13",padding:"12px 8px",textAlign:"center"}}>
      <div style={{fontSize:"10px",color:"#6B7280",marginBottom:"4px",textTransform:"uppercase",letterSpacing:".5px"}}>{m.l}</div>
      <div style={{fontSize:"18px",fontWeight:800,color,fontFamily:"monospace"}}>{m.v}</div>
      {m.s&&<div style={{fontSize:"9px",color:"#FF6B35",fontWeight:700}}>{m.s} new</div>}
    </div>)}
  </div>;
}

function App(){
  const[tab,setTab]=useState("nuclear"),[sort,setSort]=useState("default"),[q,setQ]=useState("");
  const sec=SM[tab],isMx=tab==="matrix",ss=ALL_STOCKS.filter(s=>s.sector===tab);
  const tot=ALL_STOCKS.length,tn=ALL_STOCKS.filter(x=>x.isNew).length;
  const SO=[{key:"default",label:"기본"},{key:"change",label:"등락률"},{key:"targetUpside",label:"상승여력"},{key:"epsGrowth",label:"EPS"},{key:"revGrowth",label:"매출"}];
  const fs=useMemo(()=>{
    let st=[...ss];
    if(q){const ql=q.toLowerCase();st=st.filter(s=>s.ticker.toLowerCase().includes(ql)||s.name.toLowerCase().includes(ql))}
    if(sort==="change")st.sort((a,b)=>b.change-a.change);else if(sort!=="default")st.sort((a,b)=>b[sort]-a[sort]);
    return st;
  },[tab,sort,q]);

  return <div style={{minHeight:"100vh",background:"#080A0F",color:"#E5E7EB",fontFamily:"'Inter',system-ui,sans-serif"}}>
    <div style={{padding:"24px 20px 14px",borderBottom:"1px solid rgba(255,255,255,.04)"}}>
      <div style={{display:"flex",alignItems:"center",gap:"7px",marginBottom:"3px"}}>
        <div style={{width:"7px",height:"7px",borderRadius:"50%",background:sec.color,animation:"pl 2s infinite",boxShadow:`0 0 8px ${sec.color}50`}}/>
        <span style={{fontSize:"11px",color:"#6B7280",textTransform:"uppercase",letterSpacing:"1.5px",fontWeight:600}}>Market Intelligence</span>
      </div>
      <h1 style={{fontSize:"24px",fontWeight:800,margin:"5px 0 3px",background:`linear-gradient(135deg,${sec.color},#fff,${sec.color})`,backgroundSize:"200% 200%",animation:"gl 4s ease infinite",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>AI 섹터 종합 대시보드</h1>
      <p style={{fontSize:"13px",color:"#6B7280"}}>총 {tot}종목 · 6개 탭 · <span style={{color:"#FF6B35"}}>+{tn} 신규</span> · 2026.04.18</p>
    </div>
    <div style={{display:"flex",gap:"3px",padding:"10px 20px",overflowX:"auto",borderBottom:"1px solid rgba(255,255,255,.03)"}}>
      {Object.entries(SM).map(([k,s])=>{const a=k===tab,cnt=k==="matrix"?ALL_STOCKS.filter(x=>x.quality>0).length:ALL_STOCKS.filter(x=>x.sector===k).length;
        return <button key={k} onClick={()=>{setTab(k);setSort("default");setQ("")}} style={{display:"flex",alignItems:"center",gap:"5px",padding:"8px 14px",borderRadius:"9px",border:a?`1px solid ${s.color}40`:"1px solid transparent",background:a?s.cd:"transparent",color:a?s.color:"#6B7280",fontSize:"13px",fontWeight:a?700:500,cursor:"pointer",whiteSpace:"nowrap",outline:"none",transition:"all .2s"}}>
          <span style={{fontSize:"15px"}}>{s.icon}</span>{s.label}
          <span style={{fontSize:"11px",fontWeight:700,padding:"1px 6px",borderRadius:"5px",background:a?s.color+"20":"rgba(255,255,255,.04)",fontFamily:"monospace"}}>{cnt}</span>
        </button>})}
    </div>
    <div style={{padding:"14px 20px"}}>
      <p style={{fontSize:"14px",color:"#9CA3AF",marginBottom:"12px"}}><span style={{color:sec.color,fontWeight:700}}>{sec.icon} {sec.label}</span> — {sec.desc}</p>
      {isMx?<MatrixView/>:<>
        <div style={{display:"flex",gap:"6px",flexWrap:"wrap",marginBottom:"16px"}}>
          <div style={{flex:"1 1 160px",position:"relative"}}>
            <input type="text" placeholder="검색..." value={q} onChange={e=>setQ(e.target.value)} style={{width:"100%",padding:"8px 10px 8px 30px",borderRadius:"8px",border:"1px solid rgba(255,255,255,.07)",background:"rgba(255,255,255,.025)",color:"#E5E7EB",fontSize:"13px",outline:"none"}}/>
            <span style={{position:"absolute",left:"9px",top:"50%",transform:"translateY(-50%)",fontSize:"12px",opacity:.3}}>🔍</span>
          </div>
          <div style={{display:"flex",gap:"3px",flexWrap:"wrap"}}>
            {SO.map(o=><button key={o.key} onClick={()=>setSort(o.key)} style={{padding:"7px 12px",borderRadius:"7px",border:sort===o.key?`1px solid ${sec.color}30`:"1px solid rgba(255,255,255,.05)",background:sort===o.key?sec.cd:"transparent",color:sort===o.key?sec.color:"#6B7280",fontSize:"12px",fontWeight:600,cursor:"pointer",outline:"none"}}>{o.label}</button>)}
          </div>
        </div>
        <Summ stocks={fs} color={sec.color}/>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(340px,1fr))",gap:"12px"}}>
          {fs.map((s,i)=><Card key={s.ticker} s={s} sc={sec.color} i={i}/>)}
          {!fs.length&&<div style={{gridColumn:"1/-1",textAlign:"center",padding:"40px",color:"#6B7280",fontSize:"14px"}}>검색 결과 없음</div>}
        </div>
      </>}
    </div>
    <div style={{padding:"14px 20px",borderTop:"1px solid rgba(255,255,255,.03)",textAlign:"center",fontSize:"10px",color:"#4B5563"}}>2026년 4월 기준 · 투자 조언 아님 · 컨센서스 기반</div>
  </div>;
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
