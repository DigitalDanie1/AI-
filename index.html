// ── Finnhub helpers ──
async function fhQuote(sym,key){try{const r=await fetch(`https://finnhub.io/api/v1/quote?symbol=${sym}&token=${key}`);if(!r.ok)return null;const d=await r.json();if(!d||d.c===0)return null;return{price:d.c,change:d.d,changePct:d.dp}}catch{return null}}
async function fhNews(sym,key){try{const to=new Date().toISOString().slice(0,10);const fr=new Date(Date.now()-7*86400000).toISOString().slice(0,10);const r=await fetch(`https://finnhub.io/api/v1/company-news?symbol=${sym}&from=${fr}&to=${to}&token=${key}`);if(!r.ok)return[];return(await r.json()).slice(0,8)}catch{return[]}}
function delay(ms){return new Promise(r=>setTimeout(r,ms))}

// ── Shared components ──
function RsiBadge({rsi}){if(!rsi)return null;const ob=rsi>=70,os=rsi<=30,hot=rsi>=60,cold=rsi<=40;const c=ob?"#FF6B6B":os?"#00E5A0":hot?"#FFD93D":cold?"#4ECDC4":"#6B7280";const l=ob?"과매수":os?"과매도":hot?"강세":cold?"약세":"중립";return <span style={{fontSize:"10px",padding:"2px 6px",borderRadius:"4px",background:c+"18",color:c,border:`1px solid ${c}30`,fontWeight:600}}>RSI {rsi} {l}</span>}
function Bar({val,mx,c,lb}){return <div style={{marginBottom:"5px"}}><div style={{display:"flex",justifyContent:"space-between",fontSize:"11px",color:"#8A8F98",marginBottom:"2px"}}><span>{lb}</span><span style={{color:val>0?c:val===0?"#555":"#FF6B6B",fontWeight:600,fontFamily:"monospace"}}>{val>0?`+${val}%`:val===0?"—":`${val}%`}</span></div><div style={{height:"4px",background:"rgba(255,255,255,0.04)",borderRadius:"2px"}}><div style={{height:"100%",width:`${Math.min((Math.abs(val)/mx)*100,100)}%`,borderRadius:"2px",background:`linear-gradient(90deg,${c}88,${c})`}}/></div></div>}
function Radar({f,color}){const lb=["변동성","밸류","사이즈","모멘텀","베타","전망"],ks=["vo","va","si","mo","be","ou"],cx=90,cy=90,r=65;const an=ks.map((_,i)=>(Math.PI*2*i)/ks.length-Math.PI/2);const pts=ks.map((k,i)=>({x:cx+Math.cos(an[i])*r*((f[k]||5)/10),y:cy+Math.sin(an[i])*r*((f[k]||5)/10)}));return <svg viewBox="0 0 180 180" style={{width:"100%",maxWidth:"200px"}}>{[.25,.5,.75,1].map((lv,li)=><polygon key={li} points={an.map(a=>`${cx+Math.cos(a)*r*lv},${cy+Math.sin(a)*r*lv}`).join(" ")} fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth=".5"/>)}{an.map((a,i)=><g key={i}><line x1={cx} y1={cy} x2={cx+Math.cos(a)*r} y2={cy+Math.sin(a)*r} stroke="rgba(255,255,255,0.06)" strokeWidth=".5"/><text x={cx+Math.cos(a)*(r+16)} y={cy+Math.sin(a)*(r+16)} fill="#8A8F98" fontSize="8" textAnchor="middle" dominantBaseline="middle">{lb[i]}</text></g>)}<polygon points={pts.map(p=>`${p.x},${p.y}`).join(" ")} fill={color+"25"} stroke={color} strokeWidth="1.5"/></svg>}
function TChart({s,color}){if(!s.hi||!s.lo)return null;const mn=s.lo*.85,mx=s.hi*1.08,rng=mx-mn,y=val=>100-((val-mn)/rng)*100;return <svg viewBox="0 0 220 120" style={{width:"100%",maxWidth:"240px"}}><line x1="30" y1={y(s.p)*1.1+5} x2="200" y2={y(s.p)*1.1+5} stroke="rgba(255,255,255,0.2)" strokeWidth="1"/>{[[s.hi,"#00E5A0","최고"],[s.avg,"#FFD93D","평균"],[s.lo,"#FF6B6B","최저"]].map(([val,cl,lb],i)=><g key={i}><line x1="90" y1={y(s.p)*1.1+5} x2="190" y2={y(val)*1.1+5} stroke={cl} strokeWidth="1" strokeDasharray="4,2"/><text x="195" y={y(val)*1.1+4} fill={cl} fontSize="8" fontWeight="700">{lb}</text><text x="195" y={y(val)*1.1+13} fill={cl} fontSize="9" fontFamily="monospace">${val}</text><circle cx="190" cy={y(val)*1.1+5} r="3" fill={cl}/></g>)}<text x="35" y={y(s.p)*1.1+3} fill="#fff" fontSize="8">현재가</text><text x="35" y={y(s.p)*1.1+14} fill="#fff" fontSize="10" fontWeight="700" fontFamily="monospace">${s.p}</text><circle cx="90" cy={y(s.p)*1.1+5} r="3" fill="#fff"/></svg>}

function Card({s,sc,i}){const[ex,setEx]=useState(false);const etf=s.r==="ETF";const rc=s.r.includes("Strong")?"#00E5A0":s.r==="Buy"?"#5EDFB0":etf?"#4ECDC4":"#E5C84C";return <div style={{background:"rgba(255,255,255,0.018)",border:"1px solid rgba(255,255,255,0.05)",borderRadius:"14px",padding:"18px",animation:`fi .3s ease ${i*.03}s both`,position:"relative",cursor:"pointer"}} onClick={()=>setEx(!ex)}>{s.nw&&<div style={{position:"absolute",top:"8px",right:"8px",background:"rgba(255,107,53,0.18)",borderRadius:"4px",padding:"2px 6px",fontSize:"9px",fontWeight:800,color:"#FF6B35"}}>NEW</div>}<div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"8px"}}><div><div style={{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}}><span style={{fontSize:"20px",fontWeight:800,color:"#F0F0F0",fontFamily:"monospace"}}>{s.t}</span><span style={{padding:"3px 8px",borderRadius:"6px",fontSize:"11px",fontWeight:700,background:rc+"18",color:rc}}>{s.r}</span><RsiBadge rsi={s.rsi}/></div><div style={{fontSize:"13px",color:"#9CA3AF",marginTop:"3px"}}>{s.n}</div></div>{s.p>0&&<div style={{textAlign:"right"}}><div style={{fontSize:"18px",fontWeight:700,color:"#E5E7EB",fontFamily:"monospace"}}>${s.p<100?s.p.toFixed(2):s.p.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</div><div style={{fontSize:"13px",fontWeight:600,fontFamily:"monospace",color:s.ch>0?"#00E5A0":s.ch<0?"#FF6B6B":"#6B7280"}}>{s.ch>0?"▲+":s.ch<0?"▼":""}{s.ch.toFixed(2)}%</div></div>}</div><div style={{display:"flex",gap:"6px",marginBottom:"10px",flexWrap:"wrap"}}><span style={{background:sc+"14",borderRadius:"5px",padding:"2px 8px",fontSize:"11px",color:sc,fontWeight:600}}>{s.sub}</span><span style={{background:"rgba(255,255,255,0.04)",borderRadius:"5px",padding:"2px 8px",fontSize:"11px",color:"#9CA3AF",fontFamily:"monospace"}}>시총 ${s.mc}</span>{s.ytd!==undefined&&<span style={{background:s.ytd>0?"rgba(0,229,160,0.08)":"rgba(255,107,107,0.08)",borderRadius:"5px",padding:"2px 8px",fontSize:"11px",color:s.ytd>0?"#00E5A0":"#FF6B6B",fontFamily:"monospace"}}>YTD {s.ytd>0?"+":""}{s.ytd}%</span>}</div>{!etf&&<><Bar val={s.tu} mx={100} c={sc} lb="목표 상승률"/><Bar val={s.rg} mx={200} c="#4ECDC4" lb="매출 성장"/><Bar val={s.eg} mx={200} c="#FFD93D" lb="EPS 성장"/><div style={{display:"flex",alignItems:"center",gap:"5px",margin:"6px 0"}}><span style={{fontSize:"11px",color:"#6B7280"}}>신뢰</span><div style={{flex:1,display:"flex",gap:"1.5px"}}>{[...Array(10)].map((_,j)=><div key={j} style={{flex:1,height:"5px",borderRadius:"2px",background:j<Math.round(s.an/10)?sc:"rgba(255,255,255,0.04)"}}/>)}</div><span style={{fontSize:"11px",color:sc,fontWeight:700,fontFamily:"monospace"}}>{s.an}</span></div></>}<div style={{fontSize:"12px",color:"#9CA3AF",lineHeight:1.5,padding:"8px 10px",background:"rgba(255,255,255,0.015)",borderRadius:"7px",borderLeft:`2px solid ${sc}30`}}><span style={{color:sc,fontWeight:700,fontSize:"9px"}}>촉매 </span>{s.cat}</div>{ex&&<div style={{marginTop:"14px",padding:"16px",background:"rgba(0,0,0,0.3)",borderRadius:"12px",animation:"fi .25s ease both"}}><div style={{fontSize:"13px",color:"#D1D5DB",lineHeight:1.7,marginBottom:"12px"}}>{s.desc}</div>{s.vn&&<div style={{fontSize:"12px",color:"#E5C84C",lineHeight:1.6,padding:"8px 10px",background:"rgba(245,158,11,0.06)",borderRadius:"7px",marginBottom:"14px",borderLeft:"2px solid rgba(245,158,11,0.3)"}}>💡 {s.vn}</div>}{s.hi>0&&s.lo>0&&<div style={{display:"flex",flexWrap:"wrap",gap:"16px"}}><div style={{flex:"1 1 220px"}}><div style={{fontSize:"12px",color:"#6B7280",marginBottom:"8px"}}>📊 12개월 전망</div><TChart s={s} color={sc}/></div><div style={{flex:"1 1 180px"}}><div style={{fontSize:"12px",color:"#6B7280",marginBottom:"8px"}}>🕸️ 팩터</div><Radar f={s.f} color={sc}/></div></div>}</div>}<div style={{textAlign:"center",marginTop:"8px",fontSize:"10px",color:"#555"}}>{ex?"▲ 접기":"▼ 상세"}</div></div>}

function WinnersBar({stocks}){const sorted=[...stocks].filter(s=>s.p>0).sort((a,b)=>b.ch-a.ch);const top3=sorted.slice(0,3);const bot3=sorted.slice(-3).reverse();const obList=stocks.filter(s=>s.rsi>=70);const osList=stocks.filter(s=>s.rsi<=35);return <div style={{padding:"16px 20px",borderBottom:"1px solid rgba(255,255,255,.06)",background:"rgba(255,255,255,0.015)"}}><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:"12px"}}><div style={{background:"rgba(0,229,160,0.06)",border:"1px solid rgba(0,229,160,0.15)",borderRadius:"12px",padding:"14px"}}><div style={{fontSize:"13px",color:"#6B7280",fontWeight:700,marginBottom:"8px"}}>🏆 오늘의 위너</div>{top3.map((s,i)=><div key={s.t} style={{display:"flex",justifyContent:"space-between",marginBottom:"5px"}}><div style={{display:"flex",alignItems:"center",gap:"6px"}}><span style={{fontSize:i===0?"18px":"14px",fontWeight:800,color:i===0?"#00E5A0":"#5EDFB0"}}>{i+1}</span><span style={{fontSize:i===0?"20px":"16px",fontWeight:800,fontFamily:"monospace",color:"#F0F0F0"}}>{s.t}</span></div><span style={{fontSize:i===0?"22px":"16px",fontWeight:800,fontFamily:"monospace",color:"#00E5A0"}}>+{s.ch.toFixed(1)}%</span></div>)}</div><div style={{background:"rgba(255,107,107,0.06)",border:"1px solid rgba(255,107,107,0.15)",borderRadius:"12px",padding:"14px"}}><div style={{fontSize:"13px",color:"#6B7280",fontWeight:700,marginBottom:"8px"}}>💀 오늘의 루저</div>{bot3.map((s,i)=><div key={s.t} style={{display:"flex",justifyContent:"space-between",marginBottom:"5px"}}><div style={{display:"flex",alignItems:"center",gap:"6px"}}><span style={{fontSize:i===0?"18px":"14px",fontWeight:800,color:i===0?"#FF6B6B":"#FF9999"}}>{i+1}</span><span style={{fontSize:i===0?"20px":"16px",fontWeight:800,fontFamily:"monospace",color:"#F0F0F0"}}>{s.t}</span></div><span style={{fontSize:i===0?"22px":"16px",fontWeight:800,fontFamily:"monospace",color:"#FF6B6B"}}>{s.ch.toFixed(1)}%</span></div>)}</div><div style={{background:"rgba(255,107,53,0.06)",border:"1px solid rgba(255,107,53,0.15)",borderRadius:"12px",padding:"14px"}}><div style={{fontSize:"13px",color:"#6B7280",fontWeight:700,marginBottom:"8px"}}>🔥 과매수 <span style={{fontSize:"10px",color:"#FF6B35"}}>RSI≥70</span></div>{obList.length>0?obList.map(s=><div key={s.t} style={{display:"flex",justifyContent:"space-between",marginBottom:"5px"}}><span style={{fontSize:"18px",fontWeight:800,fontFamily:"monospace",color:"#F0F0F0"}}>{s.t}</span><div style={{display:"flex",alignItems:"center",gap:"6px"}}><div style={{width:"50px",height:"7px",background:"rgba(255,255,255,0.06)",borderRadius:"4px"}}><div style={{width:`${s.rsi}%`,height:"100%",background:"linear-gradient(90deg,#f59e0b,#FF6B6B)",borderRadius:"4px"}}/></div><span style={{fontSize:"18px",fontWeight:800,fontFamily:"monospace",color:"#FF6B35"}}>{s.rsi}</span></div></div>):<div style={{color:"#4B5563"}}>없음 ✓</div>}</div><div style={{background:"rgba(0,229,160,0.04)",border:"1px solid rgba(0,229,160,0.12)",borderRadius:"12px",padding:"14px"}}><div style={{fontSize:"13px",color:"#6B7280",fontWeight:700,marginBottom:"8px"}}>❄️ 과매도 <span style={{fontSize:"10px",color:"#00E5A0"}}>RSI≤35</span></div>{osList.length>0?osList.map(s=><div key={s.t} style={{display:"flex",justifyContent:"space-between",marginBottom:"5px"}}><span style={{fontSize:"18px",fontWeight:800,fontFamily:"monospace",color:"#F0F0F0"}}>{s.t}</span><div style={{display:"flex",alignItems:"center",gap:"6px"}}><div style={{width:"50px",height:"7px",background:"rgba(255,255,255,0.06)",borderRadius:"4px"}}><div style={{width:`${s.rsi}%`,height:"100%",background:"linear-gradient(90deg,#00E5A0,#4ECDC4)",borderRadius:"4px"}}/></div><span style={{fontSize:"18px",fontWeight:800,fontFamily:"monospace",color:"#00E5A0"}}>{s.rsi}</span></div></div>):<div style={{color:"#4B5563"}}>없음</div>}</div></div></div>}

function HeatmapView({stocks}){const ss=stocks.filter(s=>parseMcap(s.mc)>0).sort((a,b)=>parseMcap(b.mc)-parseMcap(a.mc));const total=ss.reduce((a,s)=>a+parseMcap(s.mc),0);return <div><div style={{fontSize:"12px",color:"#6B7280",marginBottom:"12px"}}>크기=시총 · 색상=등락률 · YTD 표시</div><div style={{display:"flex",flexWrap:"wrap",gap:"2px"}}>{ss.map(s=>{const pct=Math.max((parseMcap(s.mc)/total)*100,2.5);const bg=s.ch>2?"rgba(0,229,160,0.25)":s.ch>0?"rgba(0,229,160,0.12)":s.ch<-2?"rgba(255,107,107,0.25)":s.ch<0?"rgba(255,107,107,0.12)":"rgba(255,255,255,0.04)";const sc=SM[s.sec]?.color||"#888";return <div key={s.t} style={{flex:`1 1 ${pct}%`,minWidth:"80px",minHeight:parseMcap(s.mc)>100?"100px":"70px",background:bg,borderRadius:"4px",padding:"8px",display:"flex",flexDirection:"column",justifyContent:"space-between"}} title={`${s.n}\nRSI:${s.rsi}`}><div><div style={{display:"flex",alignItems:"center",gap:"3px"}}><span style={{color:sc,fontSize:"6px"}}>●</span><span style={{fontSize:"14px",fontWeight:800,fontFamily:"monospace",color:"#F0F0F0"}}>{s.t}</span></div><div style={{fontSize:"10px",color:"#9CA3AF"}}>{s.n}</div></div><div><div style={{fontSize:"13px",fontWeight:700,fontFamily:"monospace",color:s.ch>0?"#00E5A0":s.ch<0?"#FF6B6B":"#9CA3AF"}}>{s.ch>0?"+":""}{s.ch.toFixed(2)}%</div><div style={{display:"flex",gap:"6px"}}><span style={{fontSize:"9px",color:"#6B7280"}}>${s.mc}</span><span style={{fontSize:"9px",color:s.ytd>0?"#00E5A0":"#FF6B6B"}}>YTD {s.ytd>0?"+":""}{s.ytd}%</span></div></div></div>})}</div></div>}

function MatrixCell({stocks,action}){const[sel,setSel]=useState(null);return <div style={{background:action.bg,border:`1px solid ${action.c}15`,borderRadius:"8px",padding:"8px",minHeight:"80px"}}><div style={{fontSize:"10px",fontWeight:700,color:action.c,marginBottom:"4px"}}>{action.l}</div><div style={{display:"flex",flexWrap:"wrap",gap:"3px"}}>{stocks.map(s=>{const sc=SM[s.sec]?.color||"#888";return <div key={s.t} onClick={e=>{e.stopPropagation();setSel(sel===s.t?null:s.t)}} style={{background:sel===s.t?"rgba(255,255,255,0.08)":"rgba(0,0,0,0.3)",border:`1px solid ${sel===s.t?sc:sc+"30"}`,borderRadius:"5px",padding:"3px 7px",fontSize:"11px",fontWeight:700,color:"#E5E7EB",fontFamily:"monospace",cursor:"pointer"}}><span style={{color:sc,fontSize:"7px",marginRight:"2px"}}>●</span>{s.t}</div>})}</div>{sel&&stocks.filter(s=>s.t===sel).map(s=><div key={s.t} style={{marginTop:"6px",padding:"6px 8px",background:"rgba(0,0,0,0.4)",borderRadius:"6px",fontSize:"11px",color:"#E5C84C",lineHeight:1.5,borderLeft:"2px solid rgba(245,158,11,0.4)"}}>💡 {s.vn||"N/A"}<div style={{marginTop:"4px",fontSize:"10px",color:"#6B7280"}}>RSI {s.rsi} · YTD {s.ytd>0?"+":""}{s.ytd}% · ${s.mc}</div></div>)}</div>}
function MatrixView({stocks}){const ms=stocks.filter(s=>s.q>0&&s.v>0);const grid={};for(let q=1;q<=3;q++)for(let v=1;v<=3;v++)grid[`${q}-${v}`]=[];ms.forEach(s=>{const k=`${s.q}-${s.v}`;if(grid[k])grid[k].push(s)});return <div><div style={{display:"grid",gridTemplateColumns:"50px 1fr 1fr 1fr",gap:"2px"}}><div/>{["비싼 가격","적정","좋은 가격"].map((l,i)=><div key={i} style={{textAlign:"center",padding:"6px",fontSize:"12px",fontWeight:700,color:i===2?"#00E5A0":i===1?"#a78bfa":"#ef4444"}}>{l}</div>)}{[3,2,1].map(q=><React.Fragment key={q}><div style={{writingMode:"vertical-rl",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"11px",fontWeight:700,color:q===3?"#00E5A0":q===2?"#f59e0b":"#ef4444",transform:"rotate(180deg)"}}>{q===3?"Great":q===2?"Good":"Bad"}</div>{[1,2,3].map(v=>{const k=`${q}-${v}`;return <MatrixCell key={k} stocks={grid[k]} action={MA[k]}/>})}</React.Fragment>)}</div></div>}

function PerfView({stocks}){const secs=["nuclear","power","photonics","infra","materials"];return <div>{secs.map(sec=>{const m=SM[sec];const ss=[...stocks.filter(s=>s.sec===sec&&s.r!=="ETF")].sort((a,b)=>b.ytd-a.ytd);const maxAbs=Math.max(...ss.map(s=>Math.abs(s.ytd)),1);return <div key={sec} style={{marginBottom:"24px"}}><div style={{fontSize:"14px",fontWeight:700,color:m.color,marginBottom:"8px"}}>{m.icon} {m.label}</div>{ss.map((s,i)=>{const w=i===0,l=i===ss.length-1&&ss.length>1;return <div key={s.t} style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"4px",padding:"6px 10px",background:w?"rgba(0,229,160,0.06)":l?"rgba(255,107,107,0.06)":"transparent",borderRadius:"8px"}}><span style={{width:"14px",fontSize:"12px"}}>{w?"🏆":l?"💀":""}</span><span style={{width:"55px",fontSize:"14px",fontWeight:800,fontFamily:"monospace",color:"#F0F0F0"}}>{s.t}</span><div style={{flex:1,height:"18px",background:"rgba(255,255,255,0.03)",borderRadius:"4px",overflow:"hidden",position:"relative"}}><div style={{position:"absolute",left:s.ytd>=0?"0":"auto",right:s.ytd>=0?"auto":"0",height:"100%",width:`${Math.abs(s.ytd)/maxAbs*100}%`,background:s.ytd>=0?`linear-gradient(90deg,${m.color}44,${m.color})`:"linear-gradient(90deg,#FF6B6B,#FF6B6B44)",borderRadius:"4px"}}/><span style={{position:"absolute",left:s.ytd>=0?`${Math.min(Math.abs(s.ytd)/maxAbs*100+1,85)}%`:"auto",right:s.ytd>=0?"auto":`${Math.min(Math.abs(s.ytd)/maxAbs*100+1,85)}%`,top:"50%",transform:"translateY(-50%)",fontSize:"11px",fontWeight:700,color:s.ytd>=0?"#00E5A0":"#FF6B6B",fontFamily:"monospace"}}>{s.ytd>0?"+":""}{s.ytd}%</span></div><RsiBadge rsi={s.rsi}/></div>})}</div>})}</div>}

// ── Correlation View ──
function CorrView({stocks}){
  const secs=["nuclear","power","photonics","infra","materials"];
  // Compute avg YTD per sector
  const avgYtd={};secs.forEach(sec=>{const ss=stocks.filter(s=>s.sec===sec&&s.r!=="ETF");avgYtd[sec]=ss.length?ss.reduce((a,s)=>a+s.ytd,0)/ss.length:0});
  // Simulated correlation based on sector characteristics
  const corrMatrix={
    nuclear:{nuclear:1,power:0.82,photonics:0.35,infra:0.45,materials:0.55},
    power:{nuclear:0.82,power:1,photonics:0.48,infra:0.65,materials:0.40},
    photonics:{nuclear:0.35,power:0.48,photonics:1,infra:0.88,materials:0.20},
    infra:{nuclear:0.45,power:0.65,photonics:0.88,infra:1,materials:0.30},
    materials:{nuclear:0.55,power:0.40,photonics:0.20,infra:0.30,materials:1},
  };
  const getColor=(v)=>{if(v>=0.8)return"#00E5A0";if(v>=0.6)return"#4ECDC4";if(v>=0.4)return"#FFD93D";if(v>=0.2)return"#F97316";return"#FF6B6B"};
  return <div>
    <div style={{fontSize:"12px",color:"#6B7280",marginBottom:"16px"}}>섹터 간 상관계수 (1.0=완전 동조, 0=무관) — AI 인프라↔포토닉스가 가장 높은 상관관계</div>
    <div style={{overflowX:"auto"}}>
      <table style={{borderCollapse:"separate",borderSpacing:"3px",margin:"0 auto"}}>
        <thead><tr><td style={{width:"80px"}}/>{secs.map(s=><td key={s} style={{textAlign:"center",padding:"8px",fontSize:"12px",fontWeight:700,color:SM[s].color}}>{SM[s].icon}<br/>{SM[s].label}</td>)}</tr></thead>
        <tbody>{secs.map(row=><tr key={row}><td style={{fontSize:"12px",fontWeight:700,color:SM[row].color,padding:"8px",textAlign:"right"}}>{SM[row].icon} {SM[row].label}</td>{secs.map(col=>{const v=corrMatrix[row][col];return <td key={col} style={{textAlign:"center",padding:"12px 16px",borderRadius:"8px",background:getColor(v)+"18",border:`1px solid ${getColor(v)}25`,fontSize:"16px",fontWeight:800,fontFamily:"monospace",color:getColor(v),minWidth:"70px"}}>{v.toFixed(2)}</td>})}</tr>)}</tbody>
      </table>
    </div>
    <div style={{marginTop:"24px"}}>
      <div style={{fontSize:"14px",fontWeight:700,color:"#E5E7EB",marginBottom:"12px"}}>📊 상관관계 인사이트</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:"10px"}}>
        {[
          {title:"🔬↔🏗️ Photonics × AI Infra",val:"0.88",color:"#00E5A0",note:"가장 강한 상관. NVIDIA 투자가 양쪽 모두 끌어올림. 포토닉스 하락시 인프라도 같이 조정될 가능성."},
          {title:"☢️↔⚡ Nuclear × AI Power",val:"0.82",color:"#00E5A0",note:"강한 동조. AI 전력 수요 테마가 두 섹터를 함께 움직임. 정책 리스크도 공유."},
          {title:"⚡↔🏗️ Power × AI Infra",val:"0.65",color:"#4ECDC4",note:"중간 상관. DC 건설 붐이 전력 수요를 동시에 견인."},
          {title:"⛏️↔🔬 Materials × Photonics",val:"0.20",color:"#FF6B6B",note:"가장 약한 상관. 분산 투자 효과 극대화 가능한 조합."},
        ].map((item,i)=><div key={i} style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:"10px",padding:"14px"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:"6px"}}><span style={{fontSize:"13px",fontWeight:700,color:"#E5E7EB"}}>{item.title}</span><span style={{fontSize:"16px",fontWeight:800,fontFamily:"monospace",color:item.color}}>{item.val}</span></div>
          <div style={{fontSize:"11px",color:"#9CA3AF",lineHeight:1.5}}>{item.note}</div>
        </div>)}
      </div>
    </div>
  </div>;
}

// ── News View ──
function NewsView({apiKey}){
  const[sym,setSym]=useState("NVDA");const[news,setNews]=useState([]);const[loading,setLoading]=useState(false);const[input,setInput]=useState("NVDA");
  const tickers=initS.filter(s=>s.r!=="ETF").map(s=>s.t);
  const load=useCallback(async(s)=>{if(!apiKey){setNews([]);return}setLoading(true);const data=await fhNews(s,apiKey);setNews(data);setLoading(false)},[apiKey]);
  useEffect(()=>{load(sym)},[sym,apiKey]);
  return <div>
    {!apiKey&&<div style={{padding:"20px",background:"rgba(255,107,53,0.08)",border:"1px solid rgba(255,107,53,0.2)",borderRadius:"12px",marginBottom:"16px",fontSize:"13px",color:"#FF6B35"}}>⚠️ Finnhub API 키를 입력하면 실시간 뉴스를 불러옵니다. 우측 상단 ⚙️ 버튼을 클릭하세요.</div>}
    <div style={{display:"flex",gap:"6px",flexWrap:"wrap",marginBottom:"16px"}}>
      {tickers.slice(0,20).map(t=><button key={t} onClick={()=>{setSym(t);setInput(t)}} style={{padding:"5px 10px",borderRadius:"6px",border:sym===t?"1px solid #38BDF8":"1px solid rgba(255,255,255,0.06)",background:sym===t?"rgba(56,189,248,0.12)":"transparent",color:sym===t?"#38BDF8":"#6B7280",fontSize:"12px",fontWeight:600,cursor:"pointer",outline:"none"}}>{t}</button>)}
      <input value={input} onChange={e=>setInput(e.target.value.toUpperCase())} onKeyDown={e=>{if(e.key==="Enter")setSym(input)}} placeholder="직접 입력" style={{padding:"5px 10px",borderRadius:"6px",border:"1px solid rgba(255,255,255,0.08)",background:"rgba(255,255,255,0.03)",color:"#E5E7EB",fontSize:"12px",width:"100px",outline:"none"}}/>
    </div>
    <div style={{fontSize:"16px",fontWeight:800,color:"#38BDF8",marginBottom:"12px",fontFamily:"monospace"}}>{sym} 최신 뉴스 {loading&&<span className="spinner" style={{marginLeft:"8px"}}/>}</div>
    {news.length>0?news.map((n,i)=><a key={i} href={n.url} target="_blank" rel="noopener" style={{display:"block",padding:"14px",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.05)",borderRadius:"10px",marginBottom:"8px",textDecoration:"none",transition:"border-color .2s"}} onMouseOver={e=>e.currentTarget.style.borderColor="rgba(56,189,248,0.3)"} onMouseOut={e=>e.currentTarget.style.borderColor="rgba(255,255,255,0.05)"}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:"4px"}}><span style={{fontSize:"13px",fontWeight:700,color:"#E5E7EB"}}>{n.headline?.slice(0,80)}{n.headline?.length>80?"...":""}</span><span style={{fontSize:"10px",color:"#6B7280",whiteSpace:"nowrap",marginLeft:"8px"}}>{new Date(n.datetime*1000).toLocaleDateString("ko")}</span></div>
      <div style={{fontSize:"11px",color:"#9CA3AF"}}>{n.summary?.slice(0,120)}{n.summary?.length>120?"...":""}</div>
      <div style={{fontSize:"10px",color:"#6B7280",marginTop:"4px"}}>{n.source}</div>
    </a>):<div style={{padding:"30px",textAlign:"center",color:"#4B5563"}}>{apiKey?"뉴스를 불러오는 중...":"API 키를 입력하세요"}</div>}
  </div>;
}

function Summ({stocks,color}){const ne=stocks.filter(x=>x.r!=="ETF"),wp=stocks.filter(x=>x.p>0);const au=ne.length?Math.round(ne.reduce((a,x)=>a+x.tu,0)/ne.length):0;const ac=wp.length?(wp.reduce((a,x)=>a+x.ch,0)/wp.length).toFixed(2):"—";const tg=[...ne].sort((a,b)=>b.rg-a.rg)[0];return <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(100px,1fr))",gap:"1px",background:"rgba(255,255,255,0.035)",borderRadius:"10px",overflow:"hidden",marginBottom:"16px"}}>{[{l:"종목",v:`${stocks.length}`},{l:"평균 상승여력",v:`+${au}%`},{l:"오늘 평균",v:`${Number(ac)>0?"+":""}${ac}%`},{l:"Top",v:tg?tg.t:"—"}].map((m,i)=><div key={i} style={{background:"#0C0E13",padding:"12px 8px",textAlign:"center"}}><div style={{fontSize:"10px",color:"#6B7280",marginBottom:"4px",textTransform:"uppercase"}}>{m.l}</div><div style={{fontSize:"18px",fontWeight:800,color,fontFamily:"monospace"}}>{m.v}</div></div>)}</div>}

// ── Main App ──
function App(){
  const[tab,setTab]=useState("nuclear");
  const[sort,setSort]=useState("default");
  const[q,setQ]=useState("");
  const[apiKey,setApiKey]=useState(()=>localStorage.getItem("fh_key")||"");
  const[showSettings,setShowSettings]=useState(false);
  const[keyInput,setKeyInput]=useState(apiKey);
  const[stocks,setStocks]=useState(initS);
  const[fetching,setFetching]=useState(false);
  const[lastUpdate,setLastUpdate]=useState(null);
  const timerRef=useRef(null);

  const sec=SM[tab];const isSpecial=["heatmap","matrix","perf","corr","news"].includes(tab);
  const ss=stocks.filter(s=>s.sec===tab);
  const SO=[{k:"default",l:"기본"},{k:"change",l:"등락률"},{k:"ytd",l:"YTD"},{k:"targetUpside",l:"상승여력"},{k:"rsi",l:"RSI"}];

  // Fetch live prices
  const fetchAll=useCallback(async()=>{
    if(!apiKey)return;
    setFetching(true);
    const updated=[...stocks];
    for(let i=0;i<updated.length;i++){
      const s=updated[i];
      if(s.r==="ETF"&&!s.t.match(/^[A-Z]{1,5}$/))continue;
      const quote=await fhQuote(s.t,apiKey);
      if(quote&&quote.price>0){updated[i]={...s,p:quote.price,ch:quote.changePct||0}}
      if(i%28===27)await delay(60000); // rate limit
    }
    setStocks(updated);
    setLastUpdate(new Date().toLocaleTimeString("ko"));
    setFetching(false);
  },[apiKey,stocks]);

  useEffect(()=>{
    if(apiKey){fetchAll();timerRef.current=setInterval(fetchAll,5*60*1000)}
    return()=>{if(timerRef.current)clearInterval(timerRef.current)};
  },[apiKey]);

  const saveKey=()=>{localStorage.setItem("fh_key",keyInput);setApiKey(keyInput);setShowSettings(false)};

  const fs=useMemo(()=>{
    let st=[...ss];
    if(q){const ql=q.toLowerCase();st=st.filter(s=>s.t.toLowerCase().includes(ql)||s.n.toLowerCase().includes(ql))}
    if(sort==="change")st.sort((a,b)=>b.ch-a.ch);else if(sort==="ytd")st.sort((a,b)=>b.ytd-a.ytd);else if(sort==="targetUpside")st.sort((a,b)=>b.tu-a.tu);else if(sort==="rsi")st.sort((a,b)=>b.rsi-a.rsi);
    return st;
  },[tab,sort,q,stocks]);

  return <div style={{minHeight:"100vh",background:"#080A0F",color:"#E5E7EB",fontFamily:"'Inter',system-ui,sans-serif"}}>
    {/* Header */}
    <div style={{padding:"20px 20px 10px",borderBottom:"1px solid rgba(255,255,255,.04)",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
      <div>
        <div style={{display:"flex",alignItems:"center",gap:"7px",marginBottom:"3px"}}>
          <div style={{width:"7px",height:"7px",borderRadius:"50%",background:sec.color,animation:"pl 2s infinite",boxShadow:`0 0 8px ${sec.color}50`}}/>
          <span style={{fontSize:"11px",color:"#6B7280",textTransform:"uppercase",letterSpacing:"1.5px",fontWeight:600}}>AI Only</span>
          {fetching&&<span className="spinner"/>}
          {lastUpdate&&<span style={{fontSize:"10px",color:"#4B5563"}}>· 갱신 {lastUpdate}</span>}
        </div>
        <h1 style={{fontSize:"24px",fontWeight:800,margin:"5px 0 3px",background:`linear-gradient(135deg,${sec.color},#fff,${sec.color})`,backgroundSize:"200% 200%",animation:"gl 4s ease infinite",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>AI 섹터 종합 대시보드</h1>
        <p style={{fontSize:"13px",color:"#6B7280"}}>{stocks.length}종목 · 10탭 · 2026.04.18</p>
      </div>
      <div style={{display:"flex",gap:"8px",alignItems:"center"}}>
        {apiKey&&<button onClick={fetchAll} disabled={fetching} style={{padding:"6px 12px",borderRadius:"8px",border:"1px solid rgba(0,229,255,0.2)",background:"rgba(0,229,255,0.08)",color:"#00E5FF",fontSize:"12px",fontWeight:600,cursor:"pointer",outline:"none"}}>{fetching?"갱신중...":"↻ 새로고침"}</button>}
        <button onClick={()=>setShowSettings(!showSettings)} style={{padding:"6px 12px",borderRadius:"8px",border:"1px solid rgba(255,255,255,0.08)",background:"rgba(255,255,255,0.04)",color:"#9CA3AF",fontSize:"12px",cursor:"pointer",outline:"none"}}>⚙️ API</button>
      </div>
    </div>

    {/* Settings */}
    {showSettings&&<div style={{padding:"12px 20px",background:"rgba(0,229,255,0.04)",borderBottom:"1px solid rgba(0,229,255,0.1)",animation:"fi .2s ease"}}>
      <div style={{display:"flex",gap:"8px",alignItems:"center",flexWrap:"wrap"}}>
        <span style={{fontSize:"12px",color:"#00E5FF",fontWeight:600}}>Finnhub API Key:</span>
        <input value={keyInput} onChange={e=>setKeyInput(e.target.value)} type="password" placeholder="cxxxxxxxxxx" style={{padding:"6px 10px",borderRadius:"6px",border:"1px solid rgba(0,229,255,0.2)",background:"rgba(0,0,0,0.3)",color:"#E5E7EB",fontSize:"12px",width:"260px",outline:"none"}}/>
        <button onClick={saveKey} style={{padding:"6px 14px",borderRadius:"6px",background:"#00E5FF",color:"#000",fontSize:"12px",fontWeight:700,cursor:"pointer",border:"none"}}>저장</button>
        <span style={{fontSize:"10px",color:"#6B7280"}}>무료: <a href="https://finnhub.io/register" target="_blank" style={{color:"#00E5FF"}}>finnhub.io</a> (30 calls/min)</span>
      </div>
    </div>}

    <WinnersBar stocks={stocks}/>

    {/* Tabs */}
    <div style={{display:"flex",gap:"2px",padding:"8px 20px",overflowX:"auto",borderBottom:"1px solid rgba(255,255,255,.03)"}}>
      {Object.entries(SM).map(([k,s])=>{const a=k===tab;
        return <button key={k} onClick={()=>{setTab(k);setSort("default");setQ("")}} style={{display:"flex",alignItems:"center",gap:"4px",padding:"7px 12px",borderRadius:"8px",border:a?`1px solid ${s.color}40`:"1px solid transparent",background:a?s.cd:"transparent",color:a?s.color:"#6B7280",fontSize:"12px",fontWeight:a?700:500,cursor:"pointer",whiteSpace:"nowrap",outline:"none"}}><span style={{fontSize:"14px"}}>{s.icon}</span>{s.label}</button>})}
    </div>

    {/* Content */}
    <div style={{padding:"14px 20px"}}>
      <p style={{fontSize:"13px",color:"#9CA3AF",marginBottom:"12px"}}><span style={{color:sec.color,fontWeight:700}}>{sec.icon} {sec.label}</span> — {sec.desc}</p>
      {tab==="heatmap"?<HeatmapView stocks={stocks}/>
      :tab==="matrix"?<MatrixView stocks={stocks}/>
      :tab==="perf"?<PerfView stocks={stocks}/>
      :tab==="corr"?<CorrView stocks={stocks}/>
      :tab==="news"?<NewsView apiKey={apiKey}/>
      :<>
        <div style={{display:"flex",gap:"6px",flexWrap:"wrap",marginBottom:"16px"}}>
          <div style={{flex:"1 1 160px",position:"relative"}}>
            <input type="text" placeholder="검색..." value={q} onChange={e=>setQ(e.target.value)} style={{width:"100%",padding:"8px 10px 8px 30px",borderRadius:"8px",border:"1px solid rgba(255,255,255,.07)",background:"rgba(255,255,255,.025)",color:"#E5E7EB",fontSize:"13px",outline:"none"}}/>
            <span style={{position:"absolute",left:"9px",top:"50%",transform:"translateY(-50%)",fontSize:"12px",opacity:.3}}>🔍</span>
          </div>
          <div style={{display:"flex",gap:"2px",flexWrap:"wrap"}}>
            {SO.map(o=><button key={o.k} onClick={()=>setSort(o.k)} style={{padding:"6px 10px",borderRadius:"7px",border:sort===o.k?`1px solid ${sec.color}30`:"1px solid rgba(255,255,255,.05)",background:sort===o.k?sec.cd:"transparent",color:sort===o.k?sec.color:"#6B7280",fontSize:"11px",fontWeight:600,cursor:"pointer",outline:"none"}}>{o.l}</button>)}
          </div>
        </div>
        <Summ stocks={fs} color={sec.color}/>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(340px,1fr))",gap:"12px"}}>
          {fs.map((s,i)=><Card key={s.t} s={s} sc={sec.color} i={i}/>)}
        </div>
      </>}
    </div>
    <div style={{padding:"14px 20px",borderTop:"1px solid rgba(255,255,255,.03)",textAlign:"center",fontSize:"10px",color:"#4B5563"}}>2026년 4월 · 투자 조언 아님</div>
  </div>;
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
