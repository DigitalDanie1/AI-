    async function fhQuote(sym,key){
      try{
        const r = await fetch(`https://finnhub.io/api/v1/quote?symbol=${sym}&token=${key}`);
        if(!r.ok) return null;
        const d = await r.json();
        if(!d || !d.c) return null;
        return { price:d.c, change:d.d || 0, changePct:d.dp || 0 };
      }catch{
        return null;
      }
    }

    async function fhNews(sym,key){
      try{
        const to = new Date().toISOString().slice(0,10);
        const fr = new Date(Date.now()-7*86400000).toISOString().slice(0,10);
        const r = await fetch(`https://finnhub.io/api/v1/company-news?symbol=${sym}&from=${fr}&to=${to}&token=${key}`);
        if(!r.ok) return [];
        const d = await r.json();
        return Array.isArray(d) ? d.slice(0,8) : [];
      }catch{
        return [];
      }
    }

    function delay(ms){
      return new Promise(r => setTimeout(r,ms));
    }

    function getInitials(name,ticker){
      if(ticker && ticker.length <= 4) return ticker.slice(0,2).toUpperCase();
      if(!name) return '?';
      const parts = String(name).trim().split(/\s+/).filter(Boolean);
      if(parts.length === 1) return parts[0].slice(0,2).toUpperCase();
      return (parts[0][0] + parts[1][0]).toUpperCase();
    }

    function Logo({ ticker, name, size=28, accent='#00E5FF' }){
      const [failed,setFailed] = useState(false);
      const src = LOGOS[ticker];

      if(!src || failed){
        return (
          <div style={{
            width:size,height:size,minWidth:size,borderRadius:'50%',
            display:'flex',alignItems:'center',justifyContent:'center',
            background:`linear-gradient(135deg, ${accent}28, rgba(255,255,255,0.06))`,
            border:`1px solid ${accent}30`,
            color:'#E5E7EB',fontSize:10,fontWeight:800,letterSpacing:'.3px',overflow:'hidden'
          }}>
            {getInitials(name,ticker)}
          </div>
        );
      }

      return (
        <div style={{
          width:size,height:size,minWidth:size,borderRadius:'50%',overflow:'hidden',
          background:'#fff',border:'1px solid rgba(255,255,255,0.10)'
        }}>
          <img
            src={src}
            alt={name}
            loading="lazy"
            referrerPolicy="no-referrer"
            onError={() => setFailed(true)}
            style={{ width:'100%',height:'100%',objectFit:'cover',display:'block' }}
          />

    function RsiBadge({ rsi }){
      if(rsi == null) return null;
      const ob = rsi >= 70;
      const os = rsi <= 30;
      const hot = rsi >= 60;
      const cold = rsi <= 40;
      const c = ob ? '#FF6B6B' : os ? '#00E5A0' : hot ? '#FFD93D' : cold ? '#4ECDC4' : '#6B7280';
      const l = ob ? 'Hot' : os ? 'OS' : hot ? 'Warm' : cold ? 'Cool' : '';
      return (
        <span style={{
          fontSize:'10px',padding:'2px 6px',borderRadius:'4px',
          background:`${c}18`,color:c,border:`1px solid ${c}30`,fontWeight:600
        }}>
          RSI {rsi}{l ? ` ${l}` : ''}
        </span>
      );
    }

    function Bar({ val, mx, c, lb }){
      return (
        <div style={{ marginBottom:'5px' }}>
          <div style={{ display:'flex',justifyContent:'space-between',fontSize:'11px',color:'#8A8F98',marginBottom:'2px' }}>
            <span>{lb}</span>
            <span style={{ color: val > 0 ? c : val < 0 ? '#FF6B6B' : '#555', fontWeight:600, fontFamily:'monospace' }}>
              {val > 0 ? '+' : ''}{val}
            </span>
          </div>
          <div style={{ height:'4px',background:'rgba(255,255,255,0.04)',borderRadius:'2px' }}>
            <div style={{
              height:'100%',
              width:`${Math.min(Math.abs(val)/mx*100,100)}%`,
              borderRadius:'2px',
              background:`linear-gradient(90deg, ${c}88, ${c})`
            }} />
          </div>
        </div>
      );
    }

    function Radar({ f, color }){
      const lb = ['Fwd','Val','Str','Mom','Beta','Ups'];
      const ks = f || [];
      const cx = 90, cy = 90, r = 65;
      const an = ks.map((_,i) => Math.PI * 2 * i / ks.length - Math.PI / 2);
      const pts = ks.map((k,i) => ({
        x: cx + Math.cos(an[i]) * r * (k / 10),
        y: cy + Math.sin(an[i]) * r * (k / 10)
      }));

      return (
        <svg viewBox="0 0 180 180" style={{ width:'100%',maxWidth:'200px' }}>
          {[.25,.5,.75,1].map((lv,li) => (
            <polygon
              key={li}
              points={an.map(a => `${cx + Math.cos(a)*r*lv},${cy + Math.sin(a)*r*lv}`).join(' ')}
              fill="none"
              stroke="rgba(255,255,255,0.08)"
              strokeWidth=".5"
            />
          ))}
          {an.map((a,i) => (
            <g key={i}>
              <line x1={cx} y1={cy} x2={cx + Math.cos(a)*r} y2={cy + Math.sin(a)*r} stroke="rgba(255,255,255,0.06)" strokeWidth=".5" />
              <text x={cx + Math.cos(a)*(r+16)} y={cy + Math.sin(a)*(r+16)} fill="#8A8F98" fontSize="8" textAnchor="middle" dominantBaseline="middle">{lb[i]}</text>
            </g>
          ))}
          <polygon points={pts.map(p => `${p.x},${p.y}`).join(' ')} fill={`${color}25`} stroke={color} strokeWidth="1.5" />
        </svg>
      );
    }

    function TChart({ s, color }){
      if(!s.hi || !s.lo) return null;
      const mn = s.lo * .85, mx = s.hi * 1.08, rng = mx - mn;
      const y = val => 100 - ((val - mn) / rng) * 100;

      return (
        <svg viewBox="0 0 220 120" style={{ width:'100%',maxWidth:'240px' }}>
          <line x1="30" y1={y(s.p)*1.15} x2="200" y2={y(s.p)*1.15} stroke="rgba(255,255,255,0.2)" strokeWidth="1" />
          {[
            [s.hi,'#00E5A0','High'],
            [s.avg,'#FFD93D','Avg'],
            [s.lo,'#FF6B6B','Low']
          ].map(([val,cl,lb],i) => (
            <g key={i}>
              <line x1="90" y1={y(val)*1.15} x2="190" y2={y(val)*1.15} stroke={cl} strokeWidth="1" strokeDasharray="4,2" />
              <text x="195" y={y(val)*1.14} fill={cl} fontSize="8" fontWeight="700">{lb}</text>
              <text x="195" y={y(val)*1.13 + 6} fill={cl} fontSize="9" fontFamily="monospace">{val}</text>
              <circle cx="190" cy={y(val)*1.15} r="3" fill={cl} />
            </g>
          ))}
          <text x="35" y={y(s.p)*1.13} fill="#fff" fontSize="8">Now</text>
          <text x="35" y={y(s.p)*1.14 + 7} fill="#fff" fontSize="10" fontWeight="700" fontFamily="monospace">{s.p}</text>
          <circle cx="90" cy={y(s.p)*1.15} r="3" fill="#fff" />
        </svg>
      );
    }

    function Summ({ stocks, color }){
      const ne = stocks.filter(x => x.r !== 'ETF');
      const wp = stocks.filter(x => x.p > 0);
      const au = ne.length ? Math.round(ne.reduce((a,x) => a + x.tu, 0) / ne.length) : 0;
      const ac = wp.length ? (wp.reduce((a,x) => a + x.ch, 0) / wp.length).toFixed(2) : '0.00';
      const tg = [...ne].sort((a,b) => b.rg - a.rg)[0];

      const items = [
        { l:'Stocks', v:stocks.length },
        { l:'Avg Upside', v:`${au}%` },
        { l:'Avg Chg', v:`${Number(ac) > 0 ? '+' : ''}${ac}%` },
        { l:'Top Rev', v:tg ? tg.t : '—' }
      ];

      return (
        <div style={{ display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(100px,1fr))',gap:'1px',background:'rgba(255,255,255,0.035)',borderRadius:'10px',overflow:'hidden',marginBottom:'16px' }}>
          {items.map((m,i) => (
            <div key={i} style={{ background:'#0C0E13',padding:'12px 8px',textAlign:'center' }}>
              <div style={{ fontSize:'10px',color:'#6B7280',marginBottom:'4px',textTransform:'uppercase' }}>{m.l}</div>
              <div style={{ fontSize:'18px',fontWeight:800,color:color,fontFamily:'monospace' }}>{m.v}</div>
            </div>
          ))}
        </div>
      );
    }

    function App(){
      const [tab,setTab] = useState('nuclear');
      const [sort,setSort] = useState('default');
      const [q,setQ] = useState('');
      const [apiKey,setApiKey] = useState(localStorage.getItem('fhkey') || '');
      const [showSettings,setShowSettings] = useState(false);
      const [keyInput,setKeyInput] = useState(apiKey);
      const [stocks,setStocks] = useState(initS);
      const [fetching,setFetching] = useState(false);
      const [lastUpdate,setLastUpdate] = useState(null);
      const timerRef = useRef(null);

      const sec = SM[tab];
      const isSpecial = ['heatmap','matrix','perf','corr','news'].includes(tab);
      const ss = stocks.filter(s => s.sec === tab);

      const SO = [
        { k:'default', l:'Default' },
        { k:'change', l:'Change' },
        { k:'ytd', l:'YTD' },
        { k:'targetUpside', l:'Target' },
        { k:'rsi', l:'RSI' }
      ];

      const fetchAll = useCallback(async () => {
        if(!apiKey) return;
        setFetching(true);
        const updated = [...stocks];

        for(let i=0;i<updated.length;i++){
          const s = updated[i];
          if(s.r === 'ETF' || !String(s.t).match(/^[A-Z]{1,5}$/)) continue;
          const quote = await fhQuote(s.t, apiKey);
          if(quote && quote.price > 0){
            updated[i] = { ...s, p:quote.price, ch:quote.changePct || 0 };
          }
          if(i === 28 || i === 56) await delay(60000);
        }

        setStocks(updated);
        setLastUpdate(new Date().toLocaleTimeString('en-US'));
        setFetching(false);
      },[apiKey,stocks]);

      useEffect(() => {
        if(apiKey){
          fetchAll();
          timerRef.current = setInterval(fetchAll, 5 * 60 * 1000);
        }
        return () => {
          if(timerRef.current) clearInterval(timerRef.current);
        };
      },[apiKey]);

      const saveKey = () => {
        localStorage.setItem('fhkey', keyInput);
        setApiKey(keyInput);
        setShowSettings(false);
      };

      const fs = useMemo(() => {
        let st = [...ss];
        if(q){
          const ql = q.toLowerCase();
          st = st.filter(s =>
            s.t.toLowerCase().includes(ql) ||
            s.n.toLowerCase().includes(ql) ||
            s.sub.toLowerCase().includes(ql)
          );
        }
        if(sort === 'change') st.sort((a,b) => b.ch - a.ch);
        else if(sort === 'ytd') st.sort((a,b) => b.ytd - a.ytd);
        else if(sort === 'targetUpside') st.sort((a,b) => b.tu - a.tu);
        else if(sort === 'rsi') st.sort((a,b) => b.rsi - a.rsi);
        return st;
      },[tab,sort,q,stocks]);

      return (
        <div style={{ minHeight:'100vh',background:'#080A0F',color:'#E5E7EB',fontFamily:'Inter, system-ui, sans-serif' }}>
          <div
