    async function fhQuote(sym, key) {
      try {
        const r = await fetch(`https://finnhub.io/api/v1/quote?symbol=${sym}&token=${key}`);
        if (!r.ok) return null;
        const d = await r.json();
        if (!d || !d.c) return null;
        return { price: d.c, change: d.d || 0, changePct: d.dp || 0 };
      } catch {
        return null;
      }
    }

    async function fhNews(sym, key) {
      try {
        const to = new Date().toISOString().slice(0, 10);
        const fr = new Date(Date.now() - 7 * 86400000).toISOString().slice(0, 10);
        const r = await fetch(`https://finnhub.io/api/v1/company-news?symbol=${sym}&from=${fr}&to=${to}&token=${key}`);
        if (!r.ok) return [];
        const d = await r.json();
        return Array.isArray(d) ? d.slice(0, 8) : [];
      } catch {
        return [];
      }
    }

    function getInitials(name, ticker) {
      if (ticker && ticker.length <= 4) return ticker.slice(0, 2).toUpperCase();
      if (!name) return '?';
      const parts = String(name).trim().split(/\s+/).filter(Boolean);
      if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
      return (parts[0][0] + parts[1][0]).toUpperCase();
    }

      const hot = rsi >= 60;

      const l = ob ? 'Hot' : os ? 'Oversold' : hot ? 'Warm' : cold ? 'Cool' : '';
      return (

          color:c,
